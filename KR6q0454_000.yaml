body:
  text: 三山禪師語録敘於戲宗風之盛未有如今日者也欽惟世祖章皇帝崇信桑門屈己徵訪而江漢之東緇流如織靡不走名山敦實行無論有種苾芻略筌蹄探要領即負舂職爨之鈍漢咸知側耳傾心欲於言下了明大義至今匡廬衡霍之間士大夫高蹈林泉者往往持珠茹素倣東林而證西旨信乎宗風之盛未有如今日者也雖然五葉相傳流波漸遠虛衷汲引者未免弘甄拔以導群迷獵志聲華者輒冀越庭階而窺堂奧極盛而衰日趨於下至欲以鄭五歇後作菩提啞謎嗇夫利口詮無遮上乘逞辨言為機鋒剿陳説為把柄謬相承襲妄自誇張而謂直指單傳不煩漸臻而躐致也可勝慨哉是以海內之士留心斯道者日引領夫作家宗匠奮大力以挽頽風乃若出世入世因人度人震吼獅音俾群狐辟易則端有望於今之三山禪師矣師乃大慧十六世之嫡嗣於聚雲吹萬大師為孫慶忠鐵壁大師為子其源流行實具載諸名流論列中余無容復贅余惟幸聚雲之派得師而益昌大慧之傳得師而不謬也余與師遊者有年而卒莫能窺其涯際今試讀其語録覺指點棒喝之下頓使黠者泣慧者騃惘然喪其懷來者如羈旅之人偶聞鄉語而戚戚即不能遽返故國亦庶幾時切思歸之隱焉師之弘宣法化大唱宗猷不執公案而終不悖公案不廢言詮而究不墮言詮者其本諸積漸而然耶其無所擬議而然耶余於師真莫能窺其涯際也間嘗以臆度之蓋師早年役志於儒六經之旨無所不窮百氏之書無所不讀旁搜博採研精殫思而後洞見本源所謂歷盡群山而始識太嶽之高涉盡群川而後知東洋之大故其言之條分縷晰而不離其宗橫見側出而悉軌於正以視今之扣槃揣籥而為優孟衣冠以欺世惑衆者其相去為何如耶師之語録且充棟舊雖刻而未全茲請略為編次以付諸梓而公於世余惟願讀語録者勿於印板上尋行數墨以語言文字求吾師當思吾師一棒一喝不放空橫説豎説不放鬆是必有本來真面目而不在區區語言文字間也十方同志儻能信及余言庶吾師歷年來所以現清淨身吐廣長舌者一片婆心得以昭揭於天下今日宗風之日即於濫得聚雲之冢孫為之砥柱狂瀾可以克昌厥後而勿替也特書之以附於簡端時大清康熙戊申上元日南浦養元居士談詣題於雲安之靜修齋三山來禪師語録目録卷一上堂卷二上堂卷三小參茶話卷四示衆法語卷五機緣勘辨問答卷六佛事題讚南浙二師塔銘卷七五宗頌卷八宗統頌卷九頌古著拈卷十頌古著拈卷十一頌古著拈卷十二頌古著拈卷十三書問行實卷十四雜偈石龍吟念佛歌卷十五雜述卷十六住浙江嘉興府天寧禪院語録卷十七嗣刻詩歌行卷十八松嶺間評卷十九祝延增補法華歌拈頌卷二十文引碑卷二十一表卷二十二表卷二十三正燈集拈頌上卷二十四正燈集拈頌中卷二十五正燈集拈頌下卷二十六五家宗旨纂要上卷二十七五家宗旨纂要中卷二十八五家宗旨纂要下目録畢
