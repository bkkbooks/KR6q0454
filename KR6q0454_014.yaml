body:
  text: 書記普定編雜偈法身偈石輥推車過洞庭一風吹上九霄雲炎天六月飛紅雪凍得猛火熱似冰向上偈飢來喫飯困來眠山路乘馬水路船眼睛一雙耳兩片鼻頭朝下髮朝天示吳居士燈籠偈光明遍照十方國擬欲覆藏藏不得一點從中仔細看燈籠有口難分説示寶善居士一切見處一切悟一切悟處一切無識得無悟無一切香爐似漆嘴都盧示一齋大德鉢底滿盛無米飯杖頭抽出不萌枝袈裟底下無多事會取山僧未遇時示幻修禪人萬里無雲仰碧空疏星淡月影玲瓏回頭好看東方白處處青山滿面紅示獨存禪人跋涉關山幾度來芒鞋到處野雲開腳跟可是無思算踏破從前夢一回示笑梅禪人老幹蒼蒼挺秀奇雪霜林裏逗香肌一朝笑破無生面緑竹青松與共期示武居士本不去兮本不來何須特地更疑猜千山萬水依然在鳥自啼春花自開示談居士山河大地法王身處處相逢處處真不識其中端的旨穿衣喫飯枉勞心示碧波禪人炭擁紅爐霜氣薄詞沾白紙別情長碧波江上乘槎事留待他年作話揚示默識禪人坐對星河影漸微樓頭更鼓落槌稀分明只在聲聲裏敲破玄關第一機示穎如禪人春風一度百花香處處啼鵑叫斷腸血染枝頭猶未住行人依舊為誰忙示蘿菴禪人薜蘿崖畔月初圓菴裡主人慣學顛長嘯一聲天未曉泥牛驚起不成眠示徹微禪人西來大意沒些兒任運隨緣上上機剛道從中尋落處無端又惹許多疑示鏡空禪人打破鏡來一物無何須特地也之乎娘生面目依然在不落思惟是丈夫示松影禪人千尺松頭月影高濃陰樹底野猿號一聲喚醒幽人夢疑是風吹泛野濤示野水禪人一葉扁舟把釣過餐風宿露鬢頭皤金鱗不見貪香餌野水茫茫奈若何示隱居禪人熊耳庵頭乍見時丹心一片有誰知芒鞋莫畏雲山杳踏斷山雲可自期示惟一道人玄宮結搆嶺頭西萬緑垂陰樹色低滿目煙霞看不盡平分天地水雲齊示悟玄道人玄關悟徹沒他宗只在靈源不借中一點真丹無面貌非青非白亦非紅雪後晤炳如禪人幾曾共住不知名此日依稀遇故人覿面相看無個事霙花落盡樹頭輕示悟初沙彌迷亦非兮悟亦非本來面目莫相違焚香掃地無餘事便是當人上上機示林月禪人無文無字適相當直指西來夢一場坐斷兩頭都不立一輪明月滿林霜示群石禪人群石磷磷獨出頭橫如獅臥側如牛虛空破後長相峙留作人間夜不收示雲壑禪人千溪萬壑野雲深斗大茅廬何處尋撥草幾回看不見一朝覿面動豪吟示秀峰大德雲門糊餅趙州茶渴飲飢餐許作家若有絲毫放不下著衣持鉢亂如麻示雲窩靜主尖頭屋縛許多年壁落泥穿甕裡天只為林深光未透不將面目到人前示遊山道人木魚敲破為誰呼大夢場頭喚醒無叫得口門開不得疏星幾點映前湖示瑞雪禪人三間茅屋野人家坐對西峰日影斜莫把流光空賣卻庵前直慣數歸鴉示雲丘道士藥壺高挂樂林丘枕石眠雲空白頭畢竟長生無落處靈丹一粒許誰收示補衲老僧亂雲堆裡雪風寒人怕年高衣怕單眼老昏花愁補衲就中一線最難穿雪中過伏虎庵隨行行者請偈破霧穿雲霜路長渾身猶帶雪花香偶來踏碎山頭玉腳底芒鞋樂未央到伏虎庵再示瓊苑瑤林白玉階層崚虎踞路崔嵬庵前立雪人何在滿地寒枝盡放梅贈一喝居士二月桃花春水流紛紛紅雨下溪頭不因睜破靈雲眼那得相逢一笑休拈偈壽禪悅居士榴開四月映朱明景物亨嘉色色新縱有碧桃堪獻果何如禪悅證無生贈磐石主人雲入峰頭水入川悠悠環帶喜相聯憑君極目登臺望萬里星河共一天冬至日拈偈青陽剛被線牽回凍嶺梅花笑欲開自是枝頭藏不住一團生意漫疑猜寓雲嵒洞偶拈雲崖洞中間沒事烹茶掃地爇罏香有人問我西來意拍掌呵呵笑一場不是笑嵒前時聽鳴禽調不用掌樹底風經弄聲響告與知音知不知弄盡虛頭間伎倆三不三四不四薦取聲前那一句啞人開口聾人聽平空捏謊難取次二十年覓此難今朝拈出與人看看得分明莫受瞞星在稱兮不在盤寄汾陽和尚我住尖山山上嶺熱時熱兮冷時冷或披破衲或麻衣卻把煩惱一並屏問我住山事若何隨寒隨暑逐時過寒時不道寒時苦暑時不被暑時磨看來寒暑與誰同青山不見採樵翁茫茫無數人何去利名場上喜相逢多為浮生利與名誰從林下著青晴翻思古昔居山者數十年來只單丁我昔與君曾有約久把尖頭屋自縛尖頭屋就君不來想是君家嫌寂寞寂寞崖巒心已灰間花野草共徘徊忽然話到思君處柴門依舊為君開高峰間詠撥草尋幽入翠峰峰頭草色自茸茸茸茸草色遮山徑往來行人罕相問只有我住白雲窩日看浮雲逐眼過浮雲笑我棲荊棘我笑浮雲茫太極飛來飛去太茫茫茫茫一去無消息何如我住山不同有時呼雨又呼風呼得風來吹我襟呼得雨來沐我容既我容顏無塵色對水自看看自悅為問流水意如何流水溪頭長吐舌舌底溪頭響潺潺問我因甚老容顏我道容顏依山老朝入林皋暮復還林皋出入無朝暮光陰直在林皋度夜深就枕一覺眠生涯明日還如故黃昏蚤起問生涯钁頭斧子忒慣家相將攜入亂峰去長林豐草鬧如麻學人募衣偈山前種得一蕉芭從來有葉又無丫笑殺東京王長老與渠共一破袈裟賣身猶憶古南泉貴賤無人肯著錢忽遇趙州長賒歉縫個布衫待明年趙老無端好拈弄青州衫子七斤重個裡短長仔細裁切莫將鐘喚作甕誰道縫衣縫不成一朝拾得麻三斤渾身織就煙霞錦補衲何須剪五雲寄寶聖諸弟侄我自離高峰攜笻到石寶芒鞋俏不禁溪山共潦倒好雨若相迎好風若相送奈此風雨何日夕交相鬨澆我煙霞色吹我襤襂衣煙霞襤襂子飄飄欲何之固我目雲漢雲漢不我留非我輕曳裾而向彼王侯其如尊貴人相催人如織延我入磐沱揖我磐山陟磐山山又高磐水水又深高深磐山水誰結為知音為彼知音者穴淚頻傾下當我欲行時有手疇共把乃勞弟若侄送行在竹林相對一片席相將一片心即欲為之言欲言言不得擬作臨岐辭推敲無平仄我今入磐矣弟侄相違矣相違憶相逢相逢何日矣江之南寶聖兮江之北曇華兮盈盈一帶水夾岸猿聲啼啼不住寄語江頭將尺素江上重重疊疊山遮不斷縈懷路寄草堂和尚君居山以北我居山以東總此山一個東北自相通何時踰山巔拽君到山下過我五雲中與君共相把把手不談地把手不談天不談天與地相視但冷然不則我越山與君共一笑冷笑卻如何誰人能意料我今既不往望君亦不來但遣春風去好向扇頭開畫蘭惟爾幽蘭清且香庸庸衆卉莫與齊芳野人珍之味益長喜爾倚乎石床畫牡丹有石山芝草君家誠可愛富貴在山中況與芝蘭友清香迥不同何不同筆底明明有化工冉西庚持扇請偈偏自知寒知熱是誰能放能收把柄非關掌握清風不自扇頭畫軸玄經有相問奇有心有相有心不是知音高山流水斷橋橫樓閣有門莫教長坐草亭示性常念佛修行偈以何為修以何為行行住坐臥彌陀一聲無念念佛不修而修修行念佛莫作兩頭魚池池中有水水中有魚推窗寓目忘讀佛書不知為野人之居觀鵲移巢感賦鵲之巢兮東徙於南胡為乎營營而自甘釋免感偈人説爾乖我嫌爾狡遇犬逢鷹落他牙爪幸得曇華不捨慈姑且放爾歸荒草莫用巧忘了百日飢但知一日飽雞鳴感偈六首愁中靜夜聽雞啼長短高低喚不齊可惜而今多醉漢蒙頭一覺睡如泥愁思紛紛到五更千條萬緒苦傷情兒啼況是啼難禁又聽寒雞深夜鳴癡兒幾度坐長連選佛場頭望眼穿雞唱一聲天欲曉夢魂依舊被誰牽百八金鐘聽也麼鐘聲響處雞聲多聲聲入耳驚人夢喚不回頭怎奈何不是狼兮不是豺雞鳴清夜可捫懷從今面目都拋卻甘把平生受活埋一度思量一度憂不成眠處許多愁可憐淚雨頻頻落落到雞鳴尚未休晚眺拈偈西山日暮已斜陽牧唱樵歌返故鄉多少風塵塵內客不知回首為誰忙示看經偈尋行數墨類如麻看得分明是作家不識真經無一字雙睛依舊被雲遮示念佛偈念念彌陀千萬聲東西兩土一齊平若能一念歸無念九品蓮花信步生示打坐偈豎起如山鐵脊梁六門緊閉盡收藏就中一點靈光透枯木花開朵朵香示參禪偈獨角泥牛晝夜眠無頭無尾鼻難穿翻身一踏虛空破笑殺從前顛倒顛示止靜偈野馬狂猿蕩不休牢拴鐵柱苦追求等間頓得金繩斷脫出藩籬始徹頭示放參放下來時一物無霜珠葉上月輪孤蒙頭衲被齊掀卻依舊清光映滿湖示經行偈去去來來往復還鐵鞋踏到幾時穿腳跟底下無他事一段風流信自然石龍吟我住高梁間凡來已三載有時觀青山有時看雲靉雲山景色何曾改有野鹿有鳴禽有石磴有松陰呼朋喚友助豪吟想是少知音出而作入而息低可步兮高可陟優遊極拄杖芒鞋往來如織不説法不談禪口挂壁上鼻孔遼天萬萬千千莫嚇小兒把空拳不念佛不打坐飢來喫飯困來臥只這個何須更要立功課地僻林深一溝流水沒絃琴鳳眼龍睛無手人操自古自今散步踏煙霞樹影參差腳頭腳底蹴碎滿林花漫咨嗟古徑條條映日斜我有小園或前或後或左或右周圍菴中時菜瓜豆將就將就淡淡肝腸隨透倦來煮芹氣味芬芬三盞兩盞侍者頻供殷勤縱有膏梁不願聞春耕夏耘秋收冬藏現成公案莫思量若思量眼前錯過何處可承當尋常度日隨時住無他欣慕間舉步踏破蒼苔不過那木梯小路道傍籬畔苦瓜旦旦細吐新花看蜂忙來且去採其華古樹如龍撑天緑葉影重重無春無夏無秋無冬枝頭常帶白雲封傾出心肝當頭一句漫偷安鋤桑莫鋤蘭豈為苦衣單惜爾飽餐須知日用事艱難間攜短杖看禾滿目意如何臨風嫩稼泛清波莫蹉跎人生能得幾回過讀書誦詩正是消間時問吾徒畢竟緊誰師有餘師而亦何嘗師或詁辭或訓字之乎也者甚麼意義誶原來就是西來意上大人丘乙己未知生焉知死忘卻了也依舊從頭起我方丈假為函丈我法堂權作書堂彬彬楚楚依稀桃李門墻方袍圓頂文章佛不喜聞祖不肯作嘆這些絡索從甚麼處著文字何堪空咀嚼放下也仍是舊家風伐鼓考鐘蠟燭滿堂紅興無窮及第悟心空心空及第良可賀看來沒甚些兒個行住坐臥一曲無生幾人和石眠雲春復秋名和利不上我心頭思悠悠砥砫中流誰與儔辨地從苗幾人立得雪齊腰且逍遙漁竿上挂著飲瓢伐竹南山乘興下長灣架扁舟朝去暮還得意歸來展笑顏一碗清泉一炷罏煙受用家常樂自然致翩翩不記月和年了便了從來箇事人知少抬頭看天欲曉淡淡蟾蜍光皎皎土砌茅枅往來月過階前呼童掃去嬋娟惹得玉花帚上旋絶點純清銀空萬里漏虛明才著眼刺瞎雙睛看來依舊可憐生月落金雞黑漫漫沒個端倪瞻南看北頭東眼西絶悟迷如癡如醉如泥晨興起事如何盥手焚香折腰禮彌陀笑呵呵大家娑婆訶罷罷罷風流無限和衷瀉句句兒無高下隨他八月秋風吹吹入叢林一任嘻笑一任怒罵間僧念佛歌一溪水一帶山茸茸草色幕幕松煙到這裡萬慮都捐念一聲彌陀佛神恬氣恬説甚麼塵情擾攘世事熬煎讓阿僧一個間一株樹一畝田彎彎野徑短短柴柵住下了朽屋三間念一聲彌陀佛魂安夢安説甚麼是非惱亂名利攀援讓阿僧一箇間一磐石一茅庵清清澗底落落峰尖全不像風雨塵寰念一聲彌陀佛志堅願堅説甚麼黧奴跳網猢猻簸錢讓阿僧一箇間一尊佛一座簾低低木榻小小金龕更沒箇俗客往還念一聲彌陀佛因圓果圓説甚麼規矩束縛文貌拘牽讓阿僧一箇間一鉢粥一罏煙朝朝柏子日日清泉常把作二時焚獻念一聲彌陀佛這邊那邊説甚麼生死未了佛法當參讓阿僧一箇間一趺坐一枕眠層層破衲舊舊蒲團並無那百樣千般念一聲彌陀佛心寬意寬説甚麼煩惱不斷妄想縈纏讓阿僧一箇間一晨供一晚餐疏疏菜圃淡淡瓜園那管他宰割烹鮮念一聲彌陀佛口甘舌甘説甚麼膏梁堪羡好爵垂涎讓阿僧一箇間一篇話一句禪言言説理字字談玄總不似家常茶飯念一聲彌陀佛當前現前説甚麼未來思算過後變遷讓阿僧一箇間一布袋一文錢單單弄怪特特裝憨莫再教街頭掣顛念一聲彌陀佛隨緣就緣説甚麼神通妙用方便機關讓阿僧一箇間一寶筏一慈船悠悠度日忽忽忘年相對著鳥語花顏念一聲彌陀佛功全行全説甚麼攀龍學士跨鶴神仙讓阿僧一箇間偈曰念佛間僧念不間不間念佛自間間間中佛念間無念無念僧間念亦間四川向化侯談公諱詣捐俸刻
