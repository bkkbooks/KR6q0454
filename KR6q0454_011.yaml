body:
  text: 書記普定編頌古拈著舉雲門問乾峰請師答話五更侵早起峰云到老僧也未已有夜行人門云恁麼則某甲在遲也自首者免罪峰云恁麼那恁麼那有理不在高聲門云將謂猴白更有猴黑知彼知此拈云雲門斧鑿太深乾峰太深斧鑿刻劃不入雕琢無痕錯錯且道雲門錯乾峰錯狹路相逢雅快哉龍吟虎嘯共徘徊傾湫倒嶽兮風馳驟雨谷應山鳴兮電卷奔雷漁歌一曲知何處兩岸蘆花傍水開舉藥山久不陞座吾無隱乎爾院主白云大眾久思和尚示誨窮斯煎請和尚為眾說法餓斯炒山令打鐘多事作麼眾方集大家團圞頭山陞座不勞拈出良久還見麼下座歸方丈救得一半院主隨後問云和尚適來許為眾說法云何不垂一言汝從甚處去來山云經有經師長三丈論有論師闊八尺又爭怪得老僧別是一家風拈云藥山被院主拽出院主被藥山熱瞞即今有不受瞞者麼要見藥山也大難久臥深山逸志微野心應與世情違偶因踏破紅塵徑一笑翩翩獨自歸舉雲巖到溈山道曠無涯逢人不盡山云聞長老在藥山處弄獅子是否一人傳虛萬人傳實巖云是面赤不如語直山云長弄麼還有置時提起放下恐不著便巖云要弄即弄要置即置一場笑具拈云可知禮也雖然如是未是好手一家有事百家忙蓮社風高夏日長昨夜菡萏花正發香浮水國露新粧舉僧問投子月未圓時如何銀鉤沉碧海子云吞卻三個四個黑漫漫地一場懡㦬僧云圓後如何玉鏡照滄江子云吐卻七個八個光灼灼地一場懡㦬拈云吞也吞也不妨哽殺吐也吐也不妨噀殺還委悉麼風前黃葉時時落雨後青山處處明夜靜閑登百尺樓碧雲天際玉光浮當窗劈破虛空口吞吐從中沒兩頭舉風穴到黃龍伯牙遇子期龍云石角穿雲路垂藤意若何言中有響穴云紅霞籠玉像擁嶂照川原句裡呈機龍云恁麼則相隨來也被和尚看破穴云和尚低聲誰是知音者拈云山林廛市殊途煙霞雲水一致無往不復闇而日章黃龍舉作探竿風穴同聲相應機妙終始理絕參差陽春白雪之辭不是二老何人舉唱金烏玉兔隱蒼穹木馬泥牛趁曉風攜手同行山下路聲聲鶴唳自橫空舉法眼問覺上座船來陸來人將語探覺云船來真語者眼云船在甚麼處驗過始得覺云船在河裡實語者覺退後眼卻問旁僧云收得安南又憂塞北你道適來這僧具眼不具眼何曾一路行腳拈云這僧若不具眼爭解恁麼道若是具眼爭肯恁麼道這僧且置法眼因甚波及旁僧咦錯過底不少一句臨機話短長籬邊風動菊花香東村沽得張三酒醉倒西村李四郎舉僧問梁山如何是祖師西來意熊耳山下少室峰前山云莫亂道不語戒教誰持拈云恁麼道來梁山也是知而故犯直為西來惹是非掉唇弄舌動相違叮嚀莫向風前道吹入叢林喚不歸舉僧問青林學人徑往時如何且莫草草匆匆林云死蛇當大路勸子莫當頭切忌踏著僧云當頭時如何毒虫腦上揩癢林云喪子命根猛虎口裡失身僧云不當頭時如何不妨下腳林云亦無迴避處處處卻逢渠僧云正恁麼時如何惡因緣是好因緣林云失卻了也始悔從前錯用心僧云未審向甚麼處去也南北東西林云草深無覓處只在此山中僧云和尚也須隄防始得反害夫子林撫掌云一等是個毒氣大好隄防拈云青林有擒有縱這僧能死能生大都迴避不來隄防不及有不受這般毒氣者麼踏破頂𩕳無覓處腳尖何處不風流古路橫擔三尺蛇吞雲吸露更餐霞草深莫道難尋覓喪卻渾身在毒牙舉僧問雲門如何是佛銅鑄鐵寫底聻門云乾屎橛咬著即不可拈云雲門太煞臭口不怕薰破諸人鼻孔也須愛惜自己眉毛土面灰頭榼𣜂堆等閑覷著口難開巍巍丈六分明處一聽韶陽舉似來舉應菴問密菴如何是正法眼藏瞎密云破沙盆拈云托出了也團團直個破沙盆萬碎千零一口吞只為無人能著價七花八裂付兒孫舉龍牙問翠微如何是祖師西來意短短長長微云與我過禪板來分明向道牙過禪板與翠微師命謹遵微接得便打十分狼毒牙云打即任打痛癢不知要且無祖師意你試道看又問臨濟如何是祖師西來意長長短短濟云與我過蒲團來向道分明牙過蒲團與臨濟謹遵師命濟接得便打狼毒十分牙云打即任打不知痛癢要且無祖師意你再道看牙後住院私債未償官事臨頭有僧問和尚當年問翠微臨濟祖師意不堪重舉二尊宿明也未一任鑽龜打瓦牙云明即明矣甚處見得要且無祖師意到底僵倔拈云二老不約而同婆心相為龍牙車不改轍鐵骨承當羞殺禪板蒲團誰是西來祖意但看柳上黃金鎖好對峰尖碧玉壺一日風高一夜霜三秋令轉三冬涼紅爐火盡寒無盡猶向尊前話短長舉趙州問南泉知有底人向甚麼處去腳下可憐生泉云山前檀越家作一頭水牯牛去也非分外州云謝師答話恁麼會又爭得泉云昨夜三更月到窗相逢話不盡春色滿前岡拈云順水推船隨流則易逆風把柁挽舟實難欲期左右逢源須是不撥自轉莫有知輕識重底麼可向南泉趙州話會處討個方便戴角披毛異類行優游嶺上白雲輕迴途不見青山老一覺長鼾到月明舉僧問南陽忠國師如何是本身盧舍那國師云與我過淨瓶來莫動著僧將淨瓶到十分伶俐國師云卻安舊處著再聽支遣僧安舊處伶俐十分復問如何是本身盧舍那適纔作甚麼來國師云古佛過去久矣三生六十劫拈云烹茶掃地運水搬柴人人相好端嚴處處放光動地直為迷頭認影因之蹉過目前若能直下承當更被阿誰謾得黃昏露冷月華低小雀聲聲向曉啼日暮風停猶不住夕陽依舊影沉西舉盤山道向上一路千聖不傳低聲低聲慈明道向上一路千聖不然老漢有也未徑山道向上一路熱碗鳴聲這裡不聞別云三老各見一邊三山則不恁麼向上一路千聖也傳向上一路千聖皆然向上一路熱碗不鳴錯莫道破路出重關絕玅玄幾人踏過嶺頭巔相逢莫問三叉路雨露風晴共一天舉臨濟將示寂囑三聖祖禰不了殃及兒孫吾遷化後不得滅卻吾正法眼藏猿嘯和腸斷聖云爭敢滅卻和尚正法眼藏鵑啼帶血鳴濟云忽有人問汝作麼生對對即易對何不問來聖便喝真獅子兒善獅子吼濟云誰知吾正法眼藏向這瞎驢邊滅卻智過於師方堪傳授拈云臨濟為法求人心若不足三聖當仁不讓力實有餘一室傳心千古禍事為滅前身續後身卻因一語把衷陳饒君珠淚青絲落也是闡提不孝人舉僧問白馬儒如何是法身向上事上大人丘乙己儒云井底蝦蟆吞卻月依舊可憐生拈云井枯月落又作麼生會得即不難不會也相許踏破毘盧頂上關青山山外又青山鐵牛吼處紅塵斷石女含悲展笑顏舉僧問馬大師離四句千峰勢到嶽邊止絕百非萬派聲歸海上消請師直指西來意問甚麼大師云我今日勞倦不能為汝說問取智藏去賺殺人僧問藏蹉過了也藏云何不問和尚適從那邊來僧云和尚教來問多虛不如少實藏云我今日頭痛不能為汝說問取海兄去賺殺人僧問海蹉過了也海云我到這裡卻不會賺殺人僧舉似大師蹉過了也大師云藏頭白金烏光照處海頭黑玉兔影沉時拈云馬師父子展轉賺人咄哉阿僧三度蹉過且道離四句絕百非西來意在甚麼處良久云千聖亦不識愁緒無端強自支滿園春色亂披離風吹南北山頭草雨後青青映兩眉舉巖頭到德山遠涉不易跨門便問是凡是聖且莫造次山便喝金剛出匣頭禮拜壯士低頭洞山聞云若不是奯公大難承當是賊識賊頭云洞山老漢不識好惡被伊看破我當時一手抬未當好心一手捺報恩有分拈云巖頭軟處取土硬處拖鍬也直是個龍頭蛇尾漢卻被洞山覷破機關又來洗青賣白雖然如是未免拂跡成痕躍馬彎弓志量高衝鋒冒敵逞英豪一聲鼙鼓歸來也又向人前理戰袍舉世尊與眾行次以手指地云攔路鍬坑此處宜建一梵剎有良工覓一個帝釋將一莖草插於地云建梵剎已竟一上神通豈同小小世尊微笑不可慢匠輕師拈云經之營之不日成之世尊賞必加功帝釋弄巧成拙一時創造千古觀瞻虛空那著一微塵巧手開基紺殿新常住千年依舊在而今誰是住持人舉僧問法眼如何是佛騎牛覓牛眼云汝是慧超就窩打兔拈云將錢買糊餅放下是饅頭具眼底道看傀儡場頭帶笑看一般面目影團團為君決破槐安夢莫待雲樓酒碗乾舉文殊問無著近離甚處日遠途遙著云南方如實通供殊云南方佛法如何住持將錯就錯著云末法比丘少奉戒律家醜莫外揚殊云多少眾那些著云或三百或五百是多是少著問此間佛法如何住持今日機緣也須記著殊云凡聖同居龍蛇混雜回互不回互著云多少眾這些殊云前三三後三三不少不多拈云無著打失眼孔文殊喪卻舌頭信口道個前三後三孟八郎數也不識三三話出太無端錯算從來不是謾回首殘碑石上望白雲影裡竹千竿舉僧問趙州狗子還有佛性也無問取狗子州云有對一說僧云既有為甚麼卻撞入這箇皮袋狗子狗子州云為他知而故犯律有明條又僧問狗子還有佛性也無異口同音州云無倒一說僧云一切眾生皆有佛性恁麼那為甚狗子卻無狗子狗子州云為伊有業識在據款結案拈云有也千眼覷不著無也雙手拽將回這裡看得分明莫道趙州一口兩舌佛性有無沒重輕無星秤上兩頭平權衡落在趙州手多少癡人算不清舉雲門垂語云古佛與露柱相交是第幾機從頭數至尾自代云南山起雲北山下雨張三身李四拈云雲門恁麼道也是開眼說夢一曲臨場絕玅辭調高能得幾人知唱酬想是應難覓嘯月吟風自解頤舉僧問護國鶴立枯松時如何太低生國云地下底一場懡㦬坦殺人僧云滴冰滴凍時如何太煖生國云日出後一場懡㦬熱殺人僧云會昌沙汰時護法善神向甚麼處去也太近生國云三門頭兩個一場懡㦬逼殺人拈云拈過了也又作麼生傀儡棚中猢猻子著意探奇莫過頭青山蒼翠雨中收推車抵壁雖宜進策轡臨巖正好休君不見慣走龍蛇傭書客一朝投筆慶封侯舉僧問柏巖如何是禪衲僧鼻孔祖師眼睛巖云古塚不為家向甚麼處安身立命拈云虛空翻筋斗露柱打鞦韆三千里外逢人不得錯舉相逢便問禪鐵橛不須把脫灑跨神龍風流騎駿馬髑髏到處乾腸胃一齊瀉擾擾叢林中誰為達道者舉僧問趙州學人乍入叢林乞師指示討甚碗州云喫粥也未太瑣屑生僧云喫了也本色衲子州云洗缽盂去本分宗師僧於言下有省元來元來拈云恁麼恁麼移花兼蝶至不恁麼不恁麼買石得雲饒設使這僧喚不回頭那見趙州為人方便風雨蕭蕭四壁居先生篋裡自藏書傳經豈為功名貴續得心源樂有餘舉德山上堂云有問即過口是禍門不問又乖莫向鬼窟裡作活計僧出禮拜略較些子山便打今日令嚴僧云某話也未問為甚和尚便打平地孤堆山云待汝開口堪作何用已遲八刻拈云舉即不堪動則成疚德山彌天過犯這僧過犯彌天檢點將來合與一窖埋卻何故你若無心我也休為因岐路動悲哀多少亡羊喚不回踏斷窮途空灑淚低頭且自把心灰舉僧問乾峰十方薄伽梵見之無相呼之無名一路涅槃門闢則不開闔而不閉未審路頭在甚麼處看腳下峰以拄杖畫一畫云在這裡不勞拈出僧舉問雲門疑則別參門云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼會麼止徒口快拈云芍藥花開菩薩面棕櫚葉散夜叉頭看破二老風流不妨恁麼會取路出層山晚樹陰蹉跎展轉費登臨崗煙乍斷雲猶淡隔岸溪深響暮砧舉僧問歸宗如何是觀音玅智力我說你便聽宗敲鼎蓋三下云聞麼神通妙用法爾如然僧云聞真語者宗云我何不聞實語者拈云虛空沒口啞者先言淵嘿無聲聾者善聽恁麼薦得何勞敲翻鼎蓋塞破耳門如或未然也須別圖方便野寺頻敲夜半鐘覺來月色尚朦朧因風喚醒家山夢一枕相思恨莫窮舉僧問疏山如何是佛此語問者甚多山云何不問疏山老漢便請師答拈云恁麼那良久云也是替名通事濯足臨波浴上池風飄浣穀細如絲平壺織就鴛鴦譜不動機梭錦更奇舉僧問雪峰古人有言殘羹餿飯峰便臥因風倒枕良久起云問甚麼半夜巡欄僧再問面皮厚多少峰云虛生浪死漢苦口良藥拈云雪峰起倒不常這僧耳目聾聵看來有甚交涉潑油救火渾閑事雪上加霜愁殺人幾度臨江擬問津煙霞滿面盡蒙塵雲開未豁朦朧眼空作悠悠行路人舉溈山問仰山終日與子商量成得甚麼邊事鬧浩浩底長三短五仰向空中畫一畫更見不堪溈云若不是吾終被汝惑謾過也不知拈云仰山向空一畫正是商量邊事且道溈山還被惑也無萬丈疑坑想是橫身難出商量終日智猶疏劃斷長空總一如巧手難逃青白眼消閑徒自賣居諸舉僧問巖頭古帆不掛時如何苦哉佛馱耶頭云後園驢喫草活潑潑地拈云寒巖枯木令犯重陽死水澄潭老龍不住這裡直須倒翻筋斗任運逍遙還見麼林花著雨胭脂落水荇牽風翠帶長露滴疏桐葉落秋荒丘月夜使人愁縱橫不礙平原闊贏得風光劫外遊舉黃山參夾山門內有君子門外君子至夾云甚處來和尚不是仙陀黃云閩中來一款便招夾云還識老僧麼夾山夾山黃云和尚還識學人麼黃山黃山夾云不然折倒旗鎗且還老僧草鞋錢了也須知貴識賤然後老僧還汝廬陵米價不得將高就低黃云恁麼則不識和尚輸卻自己未審廬陵米作麼生價贏得他人夾云真獅子兒善獅子吼好惡也不識拈云眼自爭先得籌因打劫贏一句臨機也大奇龍吟虎嘯正相期垂鉤須是拋綸手敵勝還他獅子兒真洽浹匪離岐失便宜處得便宜草鞋錢換廬陵米買賣當行讓與誰舉鹽官問一座主蘊何經論追贓捉賊主云華嚴經把髻投衙官云華嚴經有幾種法界老婆舌頭主云略說有四座主座主廣說則重重無盡座主座主官豎起拂子云弄鬼作麼這個在第幾種法界中收主無對適纔忘卻拈云座主在鹽官彀中高亦得低亦得鹽官在座主口裡吞不能吐不能放下著看教阿誰放下理事全該不二門重重法界玅難論放開捏聚無尋處擊碎虛空總沒痕舉明州和尚將布袋並破蓆一領閑家具於通衢往來面皮厚多少布袋內是甚麼盛缽盂木履魚飯菜肉瓦石土木諸般總有卻少那一件或於稠人處眼睛多少打開布袋內物骨底骨董撒下云看看還見麼又一一將起問人云不勞拈出這個喚作甚麼太叮嚀生拈云明州老漢但知背脊朝天不覺腦門著地雖然如是見他婆心處麼人前拋出許多般一句分明啟口難覿面相逢皆陌路常啼猶自賣心肝舉僧問夾山撥塵見佛時如何莫教飄入眼山云直須揮劍放過即不可若不揮劍漁父棲巢太苦生僧問石霜撥塵見佛時如何更須問過霜云渠無國土眉毛上眼睛邊何處逢渠這不是僧後舉似夾山傳言送語漢山乃上堂舉了云也要大家知門庭施設不如老僧巧手手中分巧手入理深談猶較石霜百步紅心心裡中紅心拈云高高山頂立深深海底行面目不同鼻孔一樣還見夾山舉處麼若不同床臥爭知被底穿年來豪俠故鄉遊無數春光眼底收回首白雲行欲盡方知更上一層樓舉巖頭渡江白日不閑過見一婆子人來也頭舞橈而渡弄怪作麼婆云呈橈舞棹且置看來也不消得且道婆手中孩兒放下著從甚處來清官易斷頭便打不瞞易算婆云婆生七子六個不遇知音往者不可諫連這一個也不消得來者猶可追遂拋兒江中不奈船何打破戽斗拈云婆子辜負巖頭則易巖頭辜負婆子實難雖然令在必行未解抽身一路江干把釣事如何驚起鴛鴦弄碧波一曲漁歌聽不盡仙槎別駕渡銀河舉洞山問龍山和尚見個甚麼便住此山從苗辨地龍云我見兩個泥牛鬥入海直至而今無消息因語識人拈云龍山見處有甚巴鼻敢自膽大偷閑然消息雖無一點謾伊不得而今有識得消息底麼擅自住山未敢相許木人夜半入深山踏破莓苔去不還寂寂無音渾不識溪頭流水響潺湲舉翠微一日上堂經行次止恐平地喫交投子進前接禮圖個甚麼問西來密意不睹不聞滿眼滿耳師如何示人今日口不空微駐步顧視之暗度陳倉子云乞師指示布袋老鴉微云更要第二杓惡水那頂門一劄子忽省契擊碎髑髏拈云空中書字文彩已彰暗裡拋梭機絲不掛翠微不妨好手投子且作麼生省契夾路桃花風雨後馬蹄何處避殘紅百草頭端無限春形形色色盡敷陳等閑識得東君意道破虛空不動唇舉仰山問中邑如何是佛性義物物頭頭邑云沙彌我與你說個譬喻便請直捷道如室有六窗開即是閉即是中安一獼猴甚麼面孔外有人喚猩猩莫動著獼猴即應相隨來也如是六窗俱喚六窗俱應隨緣赴感靡不周仰云直如獼猴睡著時又作麼生今日不答話邑下禪床擒住這回放過覿面千山云猩猩和尚秪管喚我與你相見睡著了也拈云一淺一深一易一險行之而不著焉習矣而不察焉終身由之而不知其道者眾也佛性圓明內外周六窗應處匪輕酬臨機一句親相見釣罷歸來月一鉤舉僧問同安如何是天人師光眼的獨漢安云頭上角不全觸天觸地身上毛不出生也別云三山則不恁麼若有人問如何是天人師但向道頭角崢嶸看不見皮毛脫落放毫光道與同安相去多少蒙塵混跡有誰知懶御珍衫恰自持貼體垢衣嫌不脫看看踏破未生時舉雲蓋問石霜萬戶俱開即不問金烏飛銀漢萬戶俱閉時如何玉兔隱滄浪霜云堂中事作麼生撥轉關捩蓋無對且待他時經半年乃云作甚麼來無人接得渠有甚閑氣力霜云道即太煞道秖道得八成師是明眼蓋云和尚又作麼生十成一句聻霜云無人識得渠略較些子拈云無人接也肌膚莫近無人識也面目難窺雲蓋在長安酒家橫身臥著石霜從珍珠簾外脫體逍遙將軍躍馬成功聖主無為致化還委悉麼有心不若無心好進步何如退步高寥落荒堂一塌居翛然自得俗塵除隔身漫道風情薄何似相逢面更疏舉僧問仰山和尚還識字麼下不論上山云隨分謙尊而光僧左旋一匝云東溪花逐西溪水此是甚麼字如虫禦木山於地上書個十字買帽相頭僧右旋一匝云南山風送北山雲此是甚麼字妙印當空山改十字作卍字裁靴比腳僧畫此相以手托起如修羅擎日月勢云拈出了也此是甚麼字七不成八不就山畫圓相圍卻字出無路入無門僧作樓至勢山云如是如是伯牙遇子期不是閑相識拈云烏焉自別刁刀不同這僧點畫分明仰山體勢完備正眼看來且不識這個字在河洛交呈鳥蟲迭變剖羲畫之奇蹤劃蒼頡之異撰月印川以無痕珠入盤而自轉看具眼阿師薦不薦舉國師三喚侍者休休休侍者三應喏喏喏國師云將謂吾辜負汝且恁麼道誰知汝辜負吾且恁麼道拈云三喚三應那裡是辜負不辜負處檢點得出不致埋沒古人喚得聲聲應得來癡心一片絕疑猜多情豈道無情惱為是情多口易開舉臨濟一日問洛浦無事考鬼一人行棒打草驚蛇一人行喝無風起浪那個親那個不親浦云總不親猶少機關在濟云作麼生得親和尚請尊重浦便喝知而故犯濟便打犯而不知拈云不親不親臨濟洛浦不怕遭人檢點棒喝交馳總不親無端甘作弄潮人虧他父子傷心重見血刀刀忒認真舉僧問廣教是甚麼物頭象天腳象地學人不會我將謂你是個人教云生在冀州本地貨也不識拈云覓會覓能終沉情識說理說事總入邪途剿除知見不犯唇皮作麼生道幾竿竹舞搖清籟數點梅開吐異香劈腹剜心語帶玄分明道破沒中邊填溝塞壑非他物水在清池月在天舉僧問二祖學人只見和尚是僧莫眼花如何是佛是法汝少會在祖云是佛是法不可別道汝知之乎癡人面前休說夢拈云這僧當面蹉過二祖直捷指陳知之為知之不知為不知是知也本自無名那定名呼牛喚馬盡虛聲就中會得渾淪處李白桃紅一樣春舉僧問天童啟如何是應用無虧眼四方八面啟云恰似瞎一般普拈云覷著即不可白淚如傾眼不開金沙撥盡絕塵埃頂門光透三千丈南北東西任去來舉僧問興化皂白未分奈汝不辨乞師方便不向道化隨聲便打急急如律令拈云方便也且作麼分聻嶺外楓叢紅似火山前澗水碧如流萬里雲陰擬卜晴盆傾風雨可憐生征衫濕盡空含淚野水橋頭草自橫三山來禪師語錄卷十二頌古目錄疏山壽塔徑山殿裡石梯本分洞山負柴金峰階下臨濟歷然懶安牧牛椑樹親近洞山拈橋南泉遷化睦州何事雲門東山大士揮案維摩嘿然大慧桃符大光是祖洛浦歸鄉夾山青嶂保福麤心馬祖靠杖雲居僧堂趙州有佛青峰花落趙州布衫佛眼請益乾峰舉一淨眾蓮花荷玉禮拜曹山對賓仰山插筋大陽家風韶山棟梁上藍本事青原曹溪廣德浮囊洞山解夏龍牙隱身黃檗召眾首山寒食巴陵祖意禾山打鼓藥山異類法眼聲色資壽藏教雲門法身芭蕉拄杖國師驗藏青原真金保壽拈杖黃龍不易目畢
