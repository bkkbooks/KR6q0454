body:
  text: 書記普定編宗統頌南嶽第一世南嶽懷讓禪師金州杜氏子年十五出家謁嵩山安公指參六祖祖問甚處來師云嵩山來祖云甚麼物與麼來師無對退參八載復來答云説似一物即不中祖云還假修證也無師云修證即不無染污即不得祖云只此不污染乃諸佛之所護念汝既如是吾亦如是得法後侍祖一十五載復居南嶽頌甚麼物與麼來退參八載絶疑猜説似一物即不中平生心事總成灰間遊戲漫徘徊君不見挂瓢洗耳煙霞客懶臥白雲夢一堆南嶽第二世江西馬祖道一禪師漢州什邡人姓馬氏幼歲出家開元中習定衡嶽遇讓和尚問云大德坐禪圖甚麼師云圖作佛讓將磚一片於彼菴前石上磨師云磨作甚麼讓云磨作鏡師云磨磚豈得成鏡耶讓云磨磚既不成鏡坐禪豈得成佛師問如何即是讓云如牛駕車車若不行打車即是打牛即是師無對讓云汝學坐禪為學作佛若學坐禪禪非坐臥若學作佛佛非定相於無住法不應取捨汝學作佛即是殺佛若執坐相非達其理師聞開示如飲醍醐乃受心印開法南康龔公山僧問和尚為甚麼説即心即佛師云為止小兒啼僧云啼止時如何師云非心非佛僧云除此二種人來如何指示師云向伊道不是物其化盛行江西頌磨磚作鏡鏡難成坐禪作佛亦無因打牛打車分明處婆心展轉説向人不是心不是佛除此二種人來時向伊更道不是物咄江西馬祖肝腸毒南嶽第三世洪州百丈懷海禪師福州長樂人王氏子丱歲出家三學該練及參馬祖為侍者偶侍祖行次見野鴨飛過祖云是甚麼師云野鴨子祖云甚處去也師云飛過去也祖扭師鼻師負痛失聲祖云又道飛過去也師有省一日再參祖震威一喝師三日耳聾後黃檗聞舉不覺吐舌頌手頭毒口門寬馬師大用忒無端鼻頭痛耳門穿舌頭吐處受瞞盰受瞞盰一派淵流雪屈難南嶽第四世洪州黃檗希運禪師閩中人幼歲出家至京洛行乞吟添鉢聲一嫗出扉問曰太無厭生師云汝猶未施責我無厭何耶嫗笑而掩扉師異之後往南昌見馬祖祖已示寂時百丈為祖廬墓師見丈丈舉耳聾話師吐舌丈云汝嗣馬祖去師云某來參馬祖不料無緣因和尚斯舉得見馬祖大機大用若嗣馬祖恐以後喪我兒孫及開法上堂衆才集師召云大衆衆回首師云月似彎弓少雨多風頌施我飯太無厭一笑掩扉空覿面因此發足過嶺南悟徹大機開兩片兩片皮開迥不同看他新月似彎弓彎彎新月如弓樣召大衆云見麼少雨多風南嶽第五世鎮州臨濟義玄禪師曹州南華人姓邢氏落髮進具志慕禪宗初參黃檗三度問佛法的的大意三度被打及到大愚處悟徹於大愚脅下築三拳復轉黃檗打黃檗一掌後臨滹沱河側開堂建立黃檗宗旨號臨濟宗頌六十痛棒打不休老婆心切惹冤讎還拳奉掌承誰力萬古留來作話頭南嶽第六世魏府興化存獎禪師初在臨濟為侍者因訊洛浦來參機緣兩遭濟打及到三聖處為首座聖問師師便喝聖云須是你始得復到大覺處為院主覺問師師便喝覺便打師又喝覺又打次日覺又問師師亦喝覺亦打師再喝覺再打至脫下衲衣痛與一頓處直下薦得臨濟在黃檗喫棒底道理逮後開堂拈香云這瓣香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賒不如供養臨濟先師頌一個賒一個孤臨濟先師受也無不如不供亦無事説向人前豈丈夫南嶽第七世汝州南院慧顒禪師得法於興化獎開堂後有僧來參云敗也師引杖向其前僧無語師便打數棒頌引杖向前奪來恰好何故無語被伊打倒可憐這漢喫藤條敗也之言曷慎於蚤南嶽第八世汝州風穴延沼禪師餘杭劉氏子參南院於棒下無生忍話大徹玄旨開化風穴僧問如何是佛師云杖林山下竹筋鞭頌從來得意要忘言得意忘言仔細看問到如何云是佛杖林山下竹筋鞭南嶽第九世汝州首山省念禪師萊州狄氏子參風穴得承子印一日拈竹篦示衆云喚作竹篦則觸不喚作竹篦則背不觸不背汝諸人喚作甚麼頌觸背關頭鎖口問衲僧到此莫思量渾身放下都忘也拍掌呵呵笑一場南嶽第十世汾州太子院善昭禪師太原俞氏子幼有大智一切文字不由師訓自然通曉剃髮遊方遍參諸宿七十一人最後見首山問百丈捲席意旨言下大悟拜而起云萬古碧潭空界月再三撈摝始應知頌野鶴孤雲度遠山風霜踏盡腳頭寒碧潭月影空惆悵虧殺從前下手難南嶽第十一世潭州石霜楚圓慈明禪師全州清湘李氏子少為書生年念二得度母賢遣之遊方聞汾陽道望冒險往來依住二載未許入室一夕訴曰自至法席不蒙指示歲月飄忽己事不明失出家之利陽熟視罵詈舉杖逐之師擬伸救陽以手掩其口師大悟嘆曰始知臨濟道出常情頌霜眠露宿到汾陽詬罵無端沒下場不是杖頭開正眼那知祖道出尋常南嶽第十二世袁州楊岐方會禪師宜春冷氏子久依慈明未有省發每咨請明云庫司事繁且去他日又問明云監寺異時兒孫滿天下在何用忙為明適出師偵之小徑既見搊住云老漢今日須與我説不説打你去明云監寺知是般事便休語未卒師大悟即拜於泥途開法楊岐僧問少林面壁意旨如何師云西天人不會唐言頌面壁胡僧瞌睡多道他不會唐言麼含冤滿口無雪處賴有楊岐好大哥好大哥狹路相逢事若何不因磕破泥塗腦那得人前唱哩囉南嶽第十三世舒州白雲守端禪師衡陽葛氏子依茶陵郁披剃往參楊岐岐問受業師為誰師云茶陵郁和尚岐云聞伊過橋遭仆有偈能記否師舉云我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵岐笑而趨起師愕然通夕不寐黎明咨詢之岐云汝見昨日打驅儺者麼師云見岐云汝一籌不及渠師愈駭然云何謂也岐云渠愛人笑汝怕人笑師大悟頌愛人笑怕人笑雙頭一臉鏡中照照得分明仔細看平空射落翀霄鷂南嶽第十四世蘄州五祖法演禪師綿州鄧氏子年三十五始祝髮遍參名宿因浮山指見白雲問南泉摩尼珠話雲叱之師領悟獻投機偈後開堂僧問如何是佛師云口是禍門頌若遠若近若親若疏黃瓜茄子刀豆葫蘆口是禍門會也無南嶽第十五世成都昭覺克勤佛果禪師彭州駱氏子兒時日記千言見佛書如獲舊物出家首謁玉泉皓次依金鑾信大溈哲黃龍心東林度僉指為法器而晦堂稱他日臨濟一派屬子矣最後見五祖盡其機用祖皆不諾師忿然而去到金山染寒困極試以平日見處無得力者乃轉依五祖令入侍寮問舉提刑小艷詩話祖云他秖認得聲師云他既認得聲為甚麼卻不是祖云如何是祖師西來意庭前柏樹子聻師忽有省出門見雞飛上闌干鼓翅而鳴復自謂云此豈不是聲遂袖香入室通其所得祖云佛祖大事非小根劣器所能造詣吾助汝喜由此所至推為上首頌一度經霜一度寒鹹酸喫盡許誰謾一聲喚醒艱難夢徹骨傷心淚不乾南嶽第十六世臨安徑山大慧宗杲普覺禪師宣城奚氏子年十六出家十七落髮十九遊方初參曹洞諸宿繼謁湛堂後參圜悟聞薰風自南來殿角生微涼語省豁悟每舉有句無句話問之師擬開口悟便云不是一日師問悟云聞和尚曾問五祖師翁來不知道個甚麼悟笑而不答師云當時想是對衆問今日説亦何妨悟云我問有句無句如藤倚樹意旨如何祖云描也描不成畫也畫不就又問樹倒藤枯時如何祖云相隨來也師當下釋然悟云始知我不汝欺也遂著臨濟正宗記付之頌薰風自南來殿角生微涼雖省豁未相當相隨來也笑一場無端寐語傳流處纍及兒孫作禍殃南嶽第十七世福州西禪鼎需懶庵禪師郡之林氏子幼舉進士偶看遺教經嘆曰幾為儒冠所誤欲去家母以親迎難之師絶之以偈云夭桃紅杏一時分付春風翠竹黃花此去永為道伴竟依保壽禪師遍參名宿後依大慧慧問內不放出外不放入正恁麼時如何師擬開口慧拈竹篦連打三下師於此大悟厲聲云和尚已多了也慧又打師禮拜慧印以偈一日上堂云懶翁懶中懶最懶懶説禪亦不重自己亦不重先賢又誰管你地又誰管你天物外翛然無個事日上三竿猶更眠頌內不出外不入泥牛木馬抱頭泣竹篦連連不放休失卻驪珠當下拾懶庵懶懶庵懶地不管兮天不管最懶説禪卻説禪打破鉢盂又討碗南嶽第十八世福州鼓山木庵安永禪師閩縣吳氏子弱冠為僧謁懶庵於雲門懶問不問有言不問無言世尊良久不得向世尊良久處會隨後便喝師倏然契悟作禮云不因今日問爭喪目前機懶許之上堂拈拄杖云臨濟小廝兒未曾當頭道著今日全身放憨也要諸人知有擲拄杖下座頌有言無言良久處問得分明答得差全身放下較些子撥盡黃金眼裡沙南嶽第十九世杭州淨慈晦翁悟明禪師上堂舉夾山會下一僧到高亭才禮拜亭便打僧云特來禮拜亭亦打又拜亭又打趁出僧回舉似夾山山云會麼僧云不會山云賴汝不會汝若會即夾山口啞去應庵拈云高亭一期忍俊不禁爭奈拄杖放行太速這僧當時若是個漢莫道高亭夾山便是達磨大師出來也斬為三段何故家肥生孝子國伯有謀臣師云高亭夾山門庭施設各得其宜但中間一人略較些子應庵與麼道也是鞏縣茶瓶師纂修聯燈會要頌一曲無絃局調新輕輕撥動不相倫弄潮須是吳江客別語還他漢地人南嶽第二十世太原苦口良益禪師參淨慈慈問近離甚處師云瑞光慈云正與麼時光在甚處師便喝慈云且止汝道西湖水深多少師擬議慈便打趁出久之契悟作偈曰臨機一句不露絲頭吹毛才展大地全收慈云從上心印汝今得之宜處深谷俟時行化頌不露絲頭意若何吹毛展處任摩挲得來心印無差互猶是西湖水裡波南嶽第二十一世汾州筏渡普慈禪師初參徑山端高峰妙各有契處後北還過燕遊五臺禮文殊感大士放光居臺二年入太原參益和尚益云發足甚處師云五臺益云文殊與汝説甚麼師云腳下草鞋唱成一百文益云腳跟為甚麼不落地師云且喜老漢見得親切益云老僧罪過師喝一喝而出自此常造室中久之益囑云汝緣當在本處他後設大法藥宜號筏渡師禮謝歸汾州頌唱出草鞋價甚高腳跟底下不相饒針針刺骨針針痛一喝從茲恨未消南嶽第二十二世洛京相國一言道顯禪師鷹門人生而岐嶷穎悟英特年十二自願出家父母難之師云兒志決矣未可強留遂落髮於郡之西山聽講圓覺至知幻即離章頓然默契恍若舊識乃辭師遊汾州謁筏渡渡一見器之命入侍寮一日渡舉竹篦問云畢竟喚作甚麼師方進語渡驀頭便打忽然大悟禮拜云和尚且止古人道佛法無多子非虛語也渡云汝今方知吾意耶師云和尚大恩碎身難報渡囑云汝年且幼時至理彰師執勞座下一十七載頌十七年前事可憐當頭白棒恨彌天雖然佛法無多子爭奈捐軀報也難南嶽第二十三世西京小庵行密禪師初以白衣禮相國顯和尚凡見便禮拜顯一日謂云道人禮拜且止佛法在甚處師方舉首忽聞板聲鳴顯云只這是師從此有入遂求度顯云汝誠精進宜名行密力參三年顯舉馬祖三不是語未絶師云畢竟如何顯笑云已多了也師於言下得大安樂顯云佛法下衰正宜潛隱毋拘城隍得安身處最為佳耳頌板聲震處髑髏開座下三年夢未回不因馬師三不是何緣笑裡悟將來南嶽第二十四世二仰圓欽禪師禾之秀水人遍參諸方毫無所契入西京謁小庵密於旅舍密問浙中有個伶俐人汝還見麼師云圓欽鈍漢密云我要個鈍漢作監收汝還知麼師罔措密云數千里來可惜錯過師相依扣參一日見鼠從架上過撲翻油甕忽爾頓契走見密云某已捉得了也密搊住云道道師云一粒鼠糞污卻鍋羹密云瞎漢參堂去頌鈍漢監收費苦辛撲翻油甕惹埃塵污羹鼠糞休嫌少一粒從來膩殺人南嶽第二十五世壽州無念智有禪師蜀之漢州人發足南方遊四明登天目後參二仰欽欽云行腳甚處師云南方欽云彼中佛法如何師云山川無異欽云我手何似佛手師良久欽云莫道無異好後看興化打維那機緣始浩然大徹作偈云興化打維那平地遭殃禍昨夜南山雲飛向北山朵欽見為之助喜云不辜到此嘉靖初迤邐壽州十有二年頌踏遍山川也大難忽然悟徹太無端南山雲向北山朵贏得風光不費錢南嶽第二十六世荊山懷寶禪師渚宮人遊壽州謁無念有有云躐縣遊州畢竟為著何事師云生死大事求師拔度有云汝是荊州人麼師云是有云闍黎即今在甚麼處師擬對有云若便恁麼猶較些子佛法不是商量參堂去師潛心座下一日有喚云闍黎師應諾有云在甚麼處師於言下領旨乃云和尚大慈真天人師也有滅後師於嘉靖七年以法付鐵牛隱終南山頌不落商量猶較遲頻將片語下針錐一呼一諾無他事正是闍黎領悟時南嶽第二十七世秦嶺鐵牛德遠禪師得心印於荊山庵居秦嶺常披一紅布褲一日頂笠揮鋤地中月明聯池過之池見云這漢好似一頭軍師云看箭池作躲箭勢師近前攜手至庵留住三月謂云我乃大慧之裔在此待人數十年矣汝今既來當為我求人光揚祖道付偈云就身能打劫劈筈善奪窩三玄從此出三要不為多探竿影草主賓分獅子迷蹤奈我何頌頂笠揮鋤掘地時身披紅褲樹軍旗千鈞弩發功成也接得朝陽振祖機南嶽第二十八世敘州朝陽月明聯池禪師本郡范司馬之後幼居林下有僧過訪不遇題聯於壁師見厭世祝髮杖笠南遊過洛伽道逢一僧偉儀殊相師前行失腳念佛一聲僧云此敲門瓦子何不拋卻師云拋卻後如何僧云葉落歸根來時無口師有省後於秦嶺受印鐵牛返敘州居朱提山朝陽洞聚雲來參師問云如何是古佛心雲拱手云請和尚尊重師問不用音聲與色身將何喚作本來人雲默然師休去頌如何古佛心拱手請尊重不用色與聲本來全無縫是一個是兩個道得分明也話墮南嶽第二十九世忠州聚雲吹萬廣真禪師敘州宜賓人姓李氏父祖三世為婆羅門師生日有八僧臨舍一僧記曰此子乃八寶羅漢應真也母即厭腥食素三年離乳十五偶在窗下觀菊語同學云此花今歲凋謝明春復生人生一去不來讀書寧免生死竟往登少峨參浩翁久之返里得大慧録朝暮體究遇一僧見訪問如何是佛師擬對僧云不是師復進語僧云不是被此一劄塵念如灰屆午值僧磨剃刀師急問如何是佛僧云我今日磨剃刀不能為汝説且待別時來師以白衣參朝陽多載於萬曆癸丑乃落髮受具一日陽謂師云汝有一句未會在師問那一句陽云不用音聲色身默然良久與我現出真空來師拂袖便出自思此事不可草草此中必有玄要辭往別山苦參三年經行危坐脅不至席限滿復見朝陽問云畢竟如何現出陽引師手掩其口豁然大悟囑後涉海入吳穿閩過粵於瀟湘湖東開法解制還蜀闡化聚雲出世三十年五坐道場語録二十卷廣録五十卷先是法孫水部熊月崖居士鋟梓崇禎己卯七月晦日索筆書偈云朝打三千暮打八百要見聚雲眉毛出血危坐至午大喝兩聲而逝闍維煙至松羃結為五彩荷香襲人起骨得黃金鎖子三莖門齒化為紫色五色舍利三百餘顆平都地藏院迎十二顆建塔餘皆塔於本寺三目山之陽頌大冶精金色異常千鎚百鍊迸星光團成一柄金剛劍照耀人天迥不藏南嶽第三十世忠州治平慶忠鐵壁慧機禪師營山羅氏子家世業儒滿門科第師生而貌偉器骨不凡八歲父見背即隨母持齋稍長厭俗有元白道者辟穀邑之大鵬山師往來叩問玄理決志出家兄母留之於天啓壬戌二月潛遁大竹築室掩關每日食米二握五味俱斷者三年室中屢矚異相師懷疑出關欲追元白而終南路阻師乃剃髮雲遊參見聚雲雲問奚往師具實以白雲笑云子真昧於尋師者師依住滿夏一日雲出方丈師跪泣於前求雲開示雲笑而不答師謂遇至人而無緣得授不如捐軀赴水以待來生有諭以從講肆遊師聽畢復來相依後雲入金陵師隨之聞天童道望欲暫辭而往雲云去亦且從但恐錯過老僧宗旨師復侍雲歸蜀雲命總院事一朝念誦畢登塌一踢渾身骨碎大笑不止拈偈呈雲雲不之印又力究三年忽爾大徹入室密以啓雲雲云汝今日才會老僧意那師云和尚大慈為人徹底雲滅後師為廬墓四衆堅請開法平都地藏院十坐道場語録二十卷僧問如何是正法眼藏師云烏龜開夜市頌烏龜開市買賣當行輕重美惡貴賤短長明明正法眼誰許亂商量漫商量趙甲哥哥錢乙郎聚雲三目慧芝禪師忠州劉氏子自幼出家博通教典久參聚雲得法後六坐道場語録八卷刊行於世滅度嗣法者兩處建塔有講主來參問離名絶相以何為師師云蟭螟眼裡推石輥主云學人不會師云螃蟹腔中好泛船頌蟭螟眼裡推石輥螃蟹腔中好泛船絶相離名人不識從來師法古今傳鐵眉三巴掌慧麗禪師北直趙州柏鄉人中歲出家專修苦行入蜀禮峨眉過忠參見聚雲雲一見便曰我家人來了師深達玄理每於三伏裸身曬日遍體如冰人怪而問之師云曬曬日頭使莫生蟲時機和尚為雲首座謂師云你何不走上正路來師始參萬法歸一有省繼從聚雲三巴掌悟徹自號三巴掌和尚受雲囑開堂四次説法如流惜師目不識丁語多遺逸僅刊存録一卷上堂云日月照臨不到天地覆載不著腳頭底下問長安直捷便是逍遙路南山高北山低日出東來又轉西昨夜霜風露消息吹落林花三五枝示寂塔於湖廣施州衛三渡屯熊耳山頌渾淪個裡沒高低三三兩兩話不齊剛到轉身行一路忽聞高樹老猿啼四川向化侯養元談公諱詣捐俸刊自敘余己丑參學聖佛時偕二三知友間拈古人機緣著頌百則進呈慶忠本師本師叱曰用絡索作麼余唯唯而退越明年庚寅住楚之九峰休夏無事因西脈學人等請益復拈頌百則共前二百則止存其稿十數年來將為蠹魚窟宅未肯輒以示人大都頌古一途從上古錐沿為蹊徑其行世流傳者皆出宗匠名家一字一句堪為後進輩抽釘拔楔余何人斯敢妄附先蹤擅為遺臭奈諸及門殷勤三請不獲已乃出稿以災棗梨噫過矣來上座學淺才疏鮮所聞見一知半解臆鑿古人之高深是猶以管窺天而蠡測海也博大觀之鄙笑買明眼之譏彈有由然矣知我罪我余何辭焉恁麼告報設有個旁不肯底出來道這老漢是甚麼心行三十棒且教誰喫時康熙丁未初夏磐山道人三山燈來題於曇華方丈三山來禪師語録卷九頌古目録世尊初生世尊升座達磨不識馬祖一喝五祖稱錘藥山刀響道吾作拜三聖金鱗米胡肯仰百丈上堂馬祖西江趙州卻活黃檗噇酒法眼指簾石鞏張弓曹山不如無為豎拂玄沙親傳天龍一指巖頭起滅趙州四門青原米價善道拈杖南泉賣身柏巖車馬歸宗禪學九峰龜毛仰山雪獅法眼承嗣梁山無相風穴青蓮麻谷閉門雲門須彌雪峰拈杖首山新婦鹽官犀牛雲門燈籠慈明作字世尊良久仰山插鍬五祖著論黃連聲前趙州勘婆藥山石上文殊玻璃曹山死貓白雲深深馬師日面投子凡聖九峰頭尾目畢
