body:
  text: 書記普定編雜述拈三身說三身謂法報化身也法身毘盧遮那此云遍一切處報身盧舍那此云淨滿化身釋迦牟尼此云能仁寂默在眾生身中即寂照用也寂即法身照即報身用即化身金光明最勝經云一切如來有三種身具足攝受阿耨菩提化身者如來在昔脩行地中為諸眾生脩種種法得自在力隨眾生意隨眾生果現種種身是名化身應身者謂諸如來為諸菩薩說於真諦令其解了生死涅槃是一味故為除身見眾生怖畏懽喜故為無邊佛法而作本故如實相應智本願力故具三十二相八十種好頂背圓光是名應身法身者為除煩惱等障為具諸善法故惟有如如法如如智是名法身前二種身是名假有第三種身是真實有為前二身而作根本何以故離法如如離無分別智一切諸法無有別法復次諸佛利益自他自利益者是法如如利益他者是如如智又瓔珞經云五分法身以識性別戒香攝身定香攝意慧香攝亂解脫攝倒見度知攝無明是五分香瓔珞其身拈云諸經解說甚是分明祖師門下覺大遠在良久云喚作法身得麼振身云喚作應身得麼顧視左右云喚作化身得麼五分真香即不無要問諸人鼻孔在甚麼處頌云話到本來一物無無生面目何曾殊秖因這箇婆心重別相安名總一如拈四智說大圓鏡智如大圓鏡現眾色相平等性智觀一切法悉皆平等玅觀察智善觀諸法無得而轉成所作智成本願力所應作事轉八識則能成四智也拈云智亦不可得識又作麼生秘藏詮註云佛轉八識而成四智八為大圓鏡智七為平等性智六為玅觀察智五為成所作智識惟分別智能決斷拈云糊餅饅頭是一是二大乘莊嚴論云轉八識成四智束四智具三身師以拂子擊禪床一下云此是識復擊一下云此是智又擊一下云此是身汝等諸人作麼分解復擊一下古德云眼等五識為成所作智意為玅觀察智化身攝末那為平等性智報身攝阿賴耶為大圓鏡智法身攝拈云且道報化法身又以何為攝智通禪師問六祖三身四智旨要祖曰清淨法身汝之性也圓滿報身汝之智也千百億化身汝之行也若離本性說三身即名有身無智若悟三身無有自性即名四智菩提聽吾偈自性具三身發明成四智不離見聞緣超然登佛地吾今為汝說諦信永無疑莫學馳求者終日說菩提通曰四智之義可得聞乎祖曰既會三身便明四智若離三身別談四智此名有智無身也即此有智還成無智復說偈曰大圓鏡智性清淨平等性智心無病玅觀察智見非功成所作智同圓鏡五八六七果因轉但轉其名無實性若於轉處不留情繁興永處那伽定拈云將謂是箇祖師前五識轉成所作智第六意識轉玅觀察智前五識謂眼耳鼻舌身此乃四大和合而成皆各司其用之體本來無過止因外有色聲香味觸之塵內之根與外之塵相偶而識生焉罪業所由起也不轉則為識轉則成所作之功而各效其用矣第六意識乃意根而意為六根中之頭目意識一動則眼貪色耳貪聲鼻貪香舌貪味身貪細滑起遍計之情轉則玅於觀察見色非干色聞聲不是聲香臭不分甘苦不別粗細一體而成自然之智矣起信論云三界虛偽惟心所作離此則無六塵境界也毘婆沙論問曰心意識有何差別答曰無有差別即心是意意即是識祖師云遍現俱該法界收攝在一微塵識者謂之佛性不會喚作精魂雖然如是蹉過者多錯會者不少拈云用會作麼雖然如是蹉過即不可具眼底辨看第七末那識轉平等性智楞伽云末那者此云染污蓋由六識既動意根著處即成汙染七識亦名傳送識前粘六識後連八識七識無定體亦無定用因意識分別好醜七識即從而分別之故以此分好分醜傳送於第八識八識則受而含藏故云七八二識不相離倘意識轉為玅觀察則七識亦不分彼分此而轉為平等性矣染汙之名何自而得哉是以體清而用亦不濁也拈云本非汙染那求清淨原無分別說甚平等雖然如是若不撥轉關捩吾恐生死海中頭出頭沒無了期也欲不污染得乎第八阿賴耶識轉大圓鏡智第八多異熟性故名含藏識謂前世中以善不善業為因招感今生異熟心是果異熟者異世熟染之性不期然而自合也阿賴耶者即是真心不守自性隨染淨緣不合而合能含藏一切真俗境界如明鏡不與影像合而含影像亦名如來藏識伽陀云諸法於藏識識於法亦爾更互為因相亦互為果相若於含藏處破諸惡見捨我執等但如大圓明鏡物來則照物去不留影像都無能入如來真空玅藏與諸佛同證同得有何不清淨者哉故曰大圓鏡智性清淨拈云這箇是大圓鏡阿那個是含藏識這箇是含藏識阿那個是大圓鏡含藏識且置秖如打破鏡時又向甚麼處會取第九阿那識亦名純淨識合論云寄說阿那識此云執持為第九純淨識如五六七八等識常依九識以依止凡愚不了妄執為我如水暴流不離水體諸波浪等以水為依故六七八識常以淨識為依何謂九為淨識為二乘人久住在生死業種六七八識有怖畏故恐彼難信方便於生死種外別立淨識使令悲智漸漸得生達識成智則賴耶成圓鏡之體持功德之門末那為平等之源一自他之性第六起觀察之玅轉正法之輪五識興所作之功垂應化之跡斯則一心匪動識智自分不轉其體但轉其名不分其理而分其事但伏六識不取塵境故名識滅是故離心之境文理俱虛即識之塵詮量有據狂心不歇歇即菩提垢淨心明本來是佛拈云是濟世航登者得渡是起死藥服者得甦須知純淨就真體而言若染汙即不得矣實志脩行者勗諸評云如上三身四智並轉識成智之說歷據經論可謂詳明似乎落於教網而不知學者意識紛飛茫茫無定若能返觀自照不為塵境所搖是亦脩行證脩者得力處也這裡見得看破原來無一物其或未然自家人害自家人募建高峰禪院引忠南東北四十里許有高峰山境僻林幽較眾山為獨出有長松有脩竹有甘泉有磊石草坪可以趺膝而寓目山野采而居之非選勝也若曰將以習靜而安吾弟子也癸卯至止斯土爰為脩創事而力不贍募之諸檀而費亦不充茲則廣而求之蓋以補緣化之不及也夫建剎佛業也募引普事也布施功德也十方檀信倘從功德起見則山野之廣而求之非過也何也將以習靜而安吾弟子也費若充而剎以成即謂之選勝也亦何辭盂蘭會引作善以其地以其人以其時三者合而善以興弗可強也石寶善地居者善人盂蘭善會三者合矣是故有主之者而善以興有輔之者而善以興有一唱而眾和者而善以興善既興矣疇無本源之思而祖宗因之薦拔孰為功德之據而營盆仗作津梁僧歡喜也佛歡喜也三世宗親累生父母無不歡喜矣前有賜福之曹茲則以善而襲福後有解厄之帝茲則以善而厄解當斯時何罪不赦而尚有不濟拔之先靈也哉予故曰作善可謂因其時矣而其地之善人之善又不待予為之引也若僧但將是說以去心一禪人募建庵引一塊瓜田半間茅屋學道人處之泰然似亦可以無求於世山野曰不然無求者僧之志必求者僧之時當求者僧之理方今烽煙初罷滿目荒岡謀所以處之則必圖所以備之備之云何有茶甌有香鼎有粥桶菜缽石榻柴床正其方面前後百尺審其位次周圍十丈短墻磚砌不可減也竹壁茅簷不可缺也客來或置一座草凳几椅不可少也矧夫堂堂慈尊森森貝葉雖蓮花小國也須備極莊嚴況玕珀琅函尤當淨敷几案諸如此者以一雲水瓢衲而能自為辦乎山野曰勢必不可無求也若夫鋤畬芟草不煩其力掃地焚香不勞其功而湊腋成裘合木襄廈係阿誰事山野曰無往而不求者化主也無求而不應者施主也兩相需而互相成者此事此道也謂之時也理也亦無不可募安眾引芒鞋破衲溪山雲月平分踞象蟠龍草木叢林生色銅頭鐵額盡在山中糊餅饅頭從教咂碎普告十方檀度大家稱水和泥不拘粟帛金錢共發慈悲喜捨有緣同度無福不增重脩福田寺疏山水為域中之兩大吾蜀山水尤甲宇宙之奇觀探奇者惟緇流為最非好奇也蓋泉石之緣於彼似有巧遘耳巴渝而下巫夔而上官溪間有福田寺其來舊矣洪荒既闢之後此地猶然草昧迨宋而雲雷甫動矣閱元而鼎震繼起矣迄明而煥然改觀前之兩朝遠不可考明之文帝時墾斯土而創垂者厥僧繼純也佐若功而丕承者厥徒淨琳也一傳再傳及今十有二傳後先濟美而遞為住持者代不乏人也上下二百餘年靡不號為西國祗園稱盛浯江一帶奈何陽九之運梵土皆灰茲剎也臺砌宛然而樓閣煨爐矣階除儼若而磚影苔沒矣石梯竹徑彷彿依稀而藤蔓茅茨虯結龍盤於委蛇古道矣雖溪聲山色尚爾可親然鳥跡獸蹄不堪一視嗚乎興廢之際有猶然乎方今大清定鼎兵戈寢息野無風鶴之驚年歲豐盈室免懸磬之苦國運隆矣蘭舍不宜更新乎其僧性堅者慨然以重脩之事謀之諸檀諸檀曰善以導引之疏求之山野山野曰許或者曰天地蘧廬也古今傳舍也區區一剎胡以再建為山野曰不然其不可久荒而不治者福田也其不可終頹而不理者福田寺也其不可辜負而不應者福田僧之一片苦心也十方檀信顧名思義當必有鼓掌而勸成者朱提白粲各捐其貲碧瓦雕梁共增其麗異日功德告圓莊嚴悉備予將溯曹溪泛一葉登坳曲策瘦笻芒鞋到處一覽其勝而後知山野今日之言果非贅也輒援筆而弁於冊首脩萬松山天臺寺引松石禪人初參山野於崇聖繼而執侍興龍後先數載於一指頭禪少有見處別後五年山野出江寓雲巖洞松石來禮詢之則有住持事而且以土木之務相告乞山野為之一言因思帝釋隨世尊山行次世尊以手指地云此處宜建一梵剎帝釋拈一莖草插於地云建梵剎已竟世尊微笑此可謂一時建豎千載奇功世尊也自辜負帝釋不得今日山野無指地之事而禪人有插草之謀欲得不贈一言未免辜負禪人去也但拈一偈萬松山裡天臺寺墾土開基紺殿新拈草一莖誰作主今時猶是昔時人雖然如是畢竟施財助力十方檀那得無留念禪人其以是引告之補脩觀音殿引觀音大士以無邊願力濟度眾生為眾生者則應以無量莊嚴供養大士乃願力有餘而供養不足非知恩報恩之道也長安寺之觀音殿歷年深久梁桷傾頹幾乎有莫支之勢大士之金容則如故也像不可毀而殿不能存殿不能存而像亦不免於毀嗚乎創之難而毀之易豈眾生之所以云供養乎問之住持住持無力問之檀越檀越能無念耶有一方之香火則必有一方之護持有一方之護持則必有一時之垂創今則補脩也永而守之是所以云垂創也整殿宇以安大士供養之道亦幾得矣大士之願力不更弘乎將以此為一方勸重脩古剎引叢林興廢自古有之乃若劫火之後廢之獨苦興之最難倘非頭陀有廣大之悲心檀信有護持之願力未易言也僧某以募脩古剎求說於山野山野曰剎既古矣荒臺敗砌不問可知豐草茂林不亦難乎僧曰無難也緣有方便之門則募之云便疇無好善之念則助者良多得是說而募之其以襄厥美也一舉手耳山野曰似此則無難也予為是說也亦甚易高峰禪院垂誡文古來叢林之設所以供慈尊安僧眾養病老接四來之處也然有叢林則必有叢林之規矩有叢林之規矩則必有建立規矩之人有建立規矩之人則必有遵守規矩之法眾有遵守規矩之法眾而後規矩克行規矩克行而後叢林光大叢林光大而後檀信皈依檀信皈依而後香火永久香火永久而後法門興盛法門興盛而後建立規矩之人之心始安建立規矩之人之心安而後遵守規矩之眾之功始大然則規矩之關係叢林豈小哉山僧不德募諸檀信開創此山閱歲餘而功粗備其在造創之日也山僧亦行眾耳山僧之內外兩堂亦行眾之眾耳叢林未就規矩安行今則叢林就矣山僧方欲整理規矩安眾林泉而復受向化爵臺之請辭之不得而去豈遂忘情此山哉此山不可忘則叢林不可忘也叢林不可忘則叢林之規矩並不可忘也然有規矩而在叢林者叢林之法眾守之亦有規矩在叢林而為十方檀信所護念者十方檀信當因護念而共遵之遵之之功所以成守之之德也遵與守既有功德叢林之法眾十方之檀信何憚而不樂行乎是以人無論眾寡事無拘小大具列數款以貽將來今日信而行之異日守而不變光揚法苑垂範人天福利寧可量與咨爾法眾其恪遵勿忽袁寶善居士頌古序古來咬不盡底葛藤翻去覆來渾如嚼蠟那堪箇箇帶齒粘唇叵耐宗匠作家忍禁不過張抬李捺正打旁敲歷有頌古諸篇遞為流播輪到袁寶善大家技癢用棘枝向糞屎堆中一番挑剔忙冗之暇搜古宿機緣著頌成帙呈似山僧亦淺亦深亦直亦婉亦不在婉直深淺之列雖未盡媲美前休亦儘堪標榜後進近代居士中得毋有笑此饒舌者父聞子健恨不殺身因令自敘入道行由並傳之梓從茲遺臭諸方外揚家醜是誰之過與是誰之過與偶拈舉目看前岡前岡曙色曉老樹三五枝在在聞啼鳥雪後雲薄山猶見雪消路更新庵前樵子徑不見有人行晚眺夕陽何處是斜照九峰山無事看歸鳥霞天帶影還山居山低天也闊風細花微香不是居山者遊人那得嘗雪中玉甲憑空落銀花匝地飛青山一夜老茅屋數間厞邸寓懷戒欺兄聞君策轡來側耳道傍聽但遇往來人問君尚遠近靜觀洞空谷音傳石壁茅簷響落珠簾閒聽溪聲鳥語靜觀山色罏煙唐嵒志怪石原郊亂點荒煙老樹平浮遠水遶經野岸斜陽橫照山樓觀音渡宿鳥深藏高樹遊魚夜弄清波幾點鐘鳴煙寺一鉤月掛薜蘿城頭別舍方寸乾坤宇宙茅廬城市山林誰是閒中箇事焚香掃地煮芩送彭藎卿之渝州何自來書檄弓旌向蜀東掄才徵石虎應運起飛熊甘雨隨車後卿雲入道中莫言溪笑冷千里尚風同春日閱宗明誅病語感賦十首五雲閑沒事兀坐樂林丘懶芟堂前草慵收露地牛幽蘭欣自賞鳴鶴喜相投為唱扶宗曲同聲莫放休其二何名誅病語何病語能誅針灸惟盧扁膏肓盡野狐昏懵良可惜顛沛實難扶縱有回生手枉教樹掛壺其三慈衷因濟世同患不勝哀一杏隨心長三香信手裁藥良宜易服口苦應難開君獨何為者想乘悲願來其四末法云何救隨流實可嗟傴僂胡自爾俛仰為誰耶暮夜黃金貴清宵白酒賒承歡類若此那更問僧伽其五叢林多痼疾觸目俱沉痾麴糱滋顛鬼肥甘養病魔矜渠能合俗笑我不同他古哲疇如此今人奈若何其六近日宗門事君傷我更傷師多脈益亂法賤人皆狂杖拂為奇貨源流屬濫觴旁觀痛未已猶自賣馨香其七舉世人皆醉惟君為獨醒青眸窺肺腑毒手代參苓拔去眼中楔抽來腦後釘根株何日剪仁術實堪銘其八泉石無生氣君家氣獨豪剛腸直似箭辯舌利如刀剉藥宜於症求疵吹及毛何憂二豎子再得弄渠曹其九君有赤心腸危言匡祖道寧為白鳳鳴不學烏鴉噪振翮任譏彈翀霄忘惱懊悠悠一片心為復向誰告其十祖道何其薄老胡望益孤鮮為高尚侶類作俗流夫朱紫疇分也莠苗曷辯乎不知青白眼世亦有還無月夜觀漲忽聽曹溪水洶聲雜耳過怒濤吞石吼驚浪逐流梭岸闊岡腰短江平月面多夜來閑寓目不是舊山河遊雙峰幾度尋幽處雙峰次第開探奇隨上下遣興任徘徊薄霧籠蒼壁微陰映綠苔紅塵應隔遠獨坐把心灰偕野雲師弟如雲安雲安旅揖處抵塌共綢繆雖有賓朋思豈無城市羞炎風方怯暑細雨乍驚秋短棹不須買同舟喜上遊次韻復方仲魯豈謂相逢坐落暉曾經洙泗共聯幃籃輿數數堪乘興蓮社頻頻喜鬥機有帶不妨還借座無亭可是更留衣當年往事今猶在莫道溪頭一笑歸季秋別耳庵和尚西風落盡客歸忙野菊籬邊散晚香間綠秋楓紅似陣啣書北雁字成行買山計拙非圖隱誓井情深豈學狂何日蠻煙清遠道共攜干木再逢場贈髻庵居士住貓山入世猶同出世間乾坤僻處學癡頑廬依小澗村煙冷榻倚長松鶴夢閒煮菜烹茶支白石耕雲種月啖青山風塵脫盡無餘事不放清霜點鬢鬟黃登雲過梁感賦用贈踢破浮生一傀棚不辭九上與三登功名謝去嶺頭雪富貴看來水上冰夢入林皋身正穩時逢沙汰氣如蒸黃君過我五雲路向道曾僧仍姓曾贈楊連城別去渝安二十秋期君不見憶同遊風塵遍閱懷山水泉石隨呼應馬牛踏破鄉關都是夢掀翻井里更無憂相逢莫道巴江晚漫點輕波泛白鷗冬日懷金碧玉故人一去已南征幾度相思夢不成劍珮聲隨鐵騎遠煙霞色傍玉溪橫輕風亂舞淋霜竹細雨頻滋鬥雪英無數詩腸誰共語能教鳴鶴可忘情遊石寶歸寄林覲伯玉印江頭往復還歸來新月漸盈彎頻瞻北斗通宵坐獨倚南山盡日閒滿案殘經煙水色橫身破衲野雲班知君遙念情如許莫訝林丘樂隱頑竹庵值周望公索新詩題贈萬竹圍樓俗徑分偶來寓目自成文編籬植桂兼培菊砌塢栽花更種芸草色不妨閒裡玩禽聲何礙靜中聞菴頭大意應如此吟作新詩寫贈君
