body:
  text: 書記普定編頌古著拈舉僧與疏山造壽塔畢來白山這張公案如何了當山云汝將多少錢與匠人例不可越僧云一切在和尚師在則禮然山云謂將三文錢與匠人近日常住淡薄謂將兩文錢與匠人佛事人情一時周備謂將一文錢與匠人秖恐傷惠若道得與吾親造塔事付當家兒僧無語代云和尚莫辜負人後舉似大嶺更聽分斷嶺云還有人道得麼也須問過僧云未有人道得除你口啞嶺云汝回舉似疏山借口傳言道大嶺聞舉有語云切忌錯下註腳若將三文錢與匠人和尚今生決不得塔大慈大悲利人損己若將兩文錢與匠人和尚與匠人共出一隻手長短不二上下一般若將一文錢與匠人累他匠人眉鬚脫落得便宜處失便宜僧回舉似疏山就正有道山具威儀望大嶺拜嘆云是何心行將謂無人疏山眼小大嶺古佛放光射至此間有多少奇特雖然如是也是臘月蓮花遇貴必賤大嶺後聞此語云莫怪遭人檢點我當時恁麼道是非直為多開口也是龜毛長三尺煩惱皆因強出頭拈云疏山家常不斷累及他人過莫大焉大嶺自不守閑了人舊債是謂過矣這僧傳言送語致令此話大行且道一二三文畢竟作麼卜度萬古碧潭空界月再三撈摝始應知塞月銀空映白沙朔風凜凜動悲笳邊城鐵騎勞如織頻帶胡霜拂劍花舉僧問徑山這個是殿裡底南無佛馱耶那個是佛適纔道底聻山云這個是殿裡底家無二主拈云這僧不知那個是佛總不知這個是殿裡底徑山道這個是殿裡底更不道那個是佛還有方便處麼因風吹火無勞力就計行兵任自由巍巍堂堂結跏趺坐相好端嚴橫身擔荷朱題碧瓦兮掩映紫磨寶網雕闌兮圍繞蓮座休說破莫錯過仔細看來只這個舉石梯問侍者甚麼處去養子緣切者云上堂齋去不負尊慈梯云我豈不知汝上堂齋去但要和尚委悉者云除此之外別道甚麼切忌節外生枝梯云我秖問汝本分事已是為蛇添足者云若問本分事某甲實是上堂齋去別道即不可梯云不謬為吾侍者執事相羈未嘗學問拈云去則隨去齋亦任齋頻問頻對早不本分不知者多謂石梯多事侍者支吾還是麼棒打石人頭𥗋𥗋論實事恒居何事用針錐話到投機無異詞春暖風和花似錦金鶯啼出自然詩舉洞山聰嘗自負柴上山老不歇心路逢一僧撞著磕著問山上有柴你曾見得何故更將上去費手腳生聰便放下柴於地云會麼放下便罷用會作麼僧云不會當時何不掀卻聰云我要燒恁麼還將上去拈云洞山不遇阿僧解檐到底負重難丟雖是話出家常已被明眼看破何故聻山上有柴莫更將上去好負得來時放下看相逢幾個識艱難擬燒榾柮煨鐺火莫訝山翁語話謾舉僧問金峰四海澄清時如何漫道無事好峰云猶是階下漢室中事作麼生拈云若不恁麼爭得恁麼直須恁麼始解不恁麼合作麼生且教腦後著眼汗馬邊疆數十春曾經六國掃煙塵太平漫說將軍大坐著功勳總未親舉臨濟兩堂首座一齊下喝鵓鳩鳴狗子叫僧問濟還有賓主也無這裡恰好會取濟云賓主歷然咄拈云兩堂首座異口同音致令這僧分疏不下臨濟道個賓主歷然已是錯為註解畢竟那個是賓那個是主咦一聲喝起震如雷萬戶千門當下開話到主賓歷歷處青山綠水共徘徊舉懶菴參百丈問學人欲求識佛眼裡著不得沙何者即是劈口便掌丈云大似騎牛覓牛怪伊不得安云識後如何且喜且幸丈云如人騎牛到家一場懡㦬安云向後如何保任動著即不可丈云如牧牛人執鞭相似不是苦心人不知拈云分明向道無餘事識苦知甘能幾人鐵笛橫吹野外呼尋蹤訪跡在中途歸來無事溪煙晚但看清光月滿壺舉椑樹問洞山為甚麼來人將語探山云親近來特地參謁和尚樹云若是親近用動兩片皮作麼弟子齋宿而後敢言山無對為親近來拈云直饒不動兩片皮亦未是親近處椑樹恁麼道已是喪卻舌頭且道如何即得霜鬢堂前幾度秋晨昏定省正含愁青山豈為雲開眼一任終朝去不留舉神山與洞山過獨木橋今日有人喪身失命山先過了止圖腳快拈起橋云過來把斷要津推人落水神云价闍黎磚來瓦去山乃放下木橋知過必改拈云洞山謔而有情神山直而無禮不怕旁觀者笑兄兄弟弟也忒無端獨木橋頭淺水隈行人無數去還來誰知乘興風流處澗藻溪煙喜共陪舉陸亙大夫因南泉遷化來弔慰師資分上院主問大夫何不哭先師直須罵得骨出亙云院主道得亙即哭蒼天蒼天主無對不哭便罷拈云陸亙哭院主不哭與其易也寧戚誰道臨喪不哀法乳恩深何地尋夕陽落盡影沉沉自慚雙淚無流處一片空存鐵石心舉僧問睦州祖師西來當為何事不妨疑著州云你道為何事也要大家知僧無語瞎州便打為何事拈云睦州具祖師心行祖師令即置且道祖師西來畢竟為何復拈拄杖卓一卓一葦橫江花自開胡僧特地為誰來徘徊未解其中事且共推敲把賦裁舉僧問雲門如何是諸佛出身處頂𩕳觸地門云東山水上行三八二十五僧問幻有如何是諸佛出身處腳板朝天有云西河火裡坐九九六十三別云兩老指東指西入水入火猶未剿絕若是三山劈脊便打卻也有個活路東山水上行一掃晴空五色雲西河火裡坐盞子落地楪子破劈脊一棒兩條痕淚雨漣漣笑殺人休擬議莫沉吟諸佛出身處依舊可憐生舉梁武帝請傅大士講經口長舌短大士揮案一聲便下座下文繁長收歸上科帝愕然意作麼生誌公云陛下會麼更聽分解帝云不會齊聞楚語誌云大士講經竟錯下註腳拈云闡微抉秘持顛扶危大士誌公兩俱敗闕當時武帝若會豈不敗闕更多這裡見得分明也是飯飽弄箸揮尺花臺語意違爐煙空自繞龍衣佛心天子猶難薦更待旁觀理是非舉文殊問維摩仁者當說何等是菩薩入不二法門這問也不消得維摩嘿然大巧若拙殊云善哉善哉冰寒於水是為菩薩入不二法門難逃明鑑拈云理極忘情謂如何得喻齊要見不二法門須識維摩無口默默玄機懶話圖風流盡處意含胡平生伎倆渾無用始羨毘耶一病夫舉大慧上堂今朝又是五月五節侯不相饒大鬼拍掌小鬼舞逞盡神通驀然撞著桃符神冤家路窄兩手椎胸叫冤苦樂極生悲艾人云休叫苦泥佛勸土佛遂拈拄杖一卓方便第一止有一處堪回互太漏逗回互不回互放去收來回而更相涉事從無事起擲下云興盡則止不爾依位住方丈門前灰圍三道參教壞人家男女拈云正恁麼時何不以拄杖一齊打散免得渠等鬧亂家庭委悉麼事無曲直隨時定理若分疏轉見差天中火鏡拂塵開照破群氛絕點埃識得悲歡情欲盡主賓一笑任徘徊舉僧問大光達磨還是祖否試卜度看光云不是祖壓良為賤僧云既不是祖又來作甚麼不妨疑著光云為汝不薦忒煞婆心僧云薦後如何作麼生會光云方知不是祖明眼難瞞拈云達磨遭人檢點也是無事討事及乎做盡伎倆依然無位安排大光一語品評至今那能吐氣鐵面蒙塵心甚難許多委曲受譏彈救迷傳法成何事一任兒孫白眼看舉僧問洛浦學人擬歸鄉時如何回頭即是浦云家破人亡子歸何處未可安身僧云恁麼則不去也一喚便轉浦云庭前殘雪日輪消功高猶不住室內紅塵遣誰掃業罷實難居拈云不得放過過在甚麼處歷遍天涯念故鄉誰知家破與人亡雲山夢斷歸心歇燃得孤燈照夜長舉僧問夾山如何是夾山境切忌當面蹉過山云猿抱子歸青嶂外睜眼覷不著鳥銜花落碧巖前舉目盡皆窺拈云夾山境話擬者甚多總之道出尋常卻是渠家受用還見麼一般景物無人識兩處風流直自看卜得層山結草廬依依猿鳥與同居碧巖青嶂千尋出來往何妨任自如舉保福因僧侍立次莫放過福云你得與麼麤心被和尚細細檢點僧云甚處是某麤心處自屎不覺臭福拈一塊土度與云拋向門外著有意親相試僧拋了又道不麤心卻來云甚處是某麤心處再犯不容福云我見你築著磕著爭奈目前何所以道你麤心理無曲斷拈云瞎卻眼撞破頭喫飯喫茶見山見水未免宗師看破這般疚患如何得愈切忌築著磕著紅樓暗自侈新妝寂寞孤燈恨夜長得對多情愁應了莫拋珠淚濕霓裳舉馬祖見僧來便畫圓相平地鍬坑云入也打不入也打太覺無端僧便入踏破了也祖便打已展不縮僧云和尚打某甲不得痛癢不知祖靠拄杖便休悔悔悔拈云殺活機權在馬祖手裡且道能進能退知柔知剛如何是他遊戲處把定重關路不通芒鞋踏碎落花紅窮途莫怪風情薄懶意相看念更濃舉僧問雲居孤峰獨宿時如何險居云九間僧堂裡不臥隨眾些好誰教你孤峰獨宿回頭不較遲拈云水澄寒潦寂月滿道人愁合作麼生打當落落孤峰獨自眠霜寒露冷月當天誰知更有逍遙地一枕長鼾衲被穿舉僧辭趙州狂心不歇州問甚處去腳底茫茫僧云擬向南方學佛法去濟個甚事州豎起拂子云這個學得麼有佛處不得住藏身處沒蹤跡無佛處急走過沒蹤跡處莫藏身三千里外逢人不得錯舉珍重珍重拈云著則為膠厭而成寂腳跟下大有事在須是踢倒須彌掀翻鬼窟撥盡眼中金屑挑起黑夜孤燈方能出入縱橫無可不可到這裡還許商量也未罔象無心黃帝重卞和有智楚王嫌靈芝瑞靄莫宜矜鳥道玄途不可憑濃澹應隨雲水斷暮山煙鎖碧崚嶒舉僧問青峰大事已明將謂將謂為甚麼如喪考妣元來元來峰云不得春風花不開剛到歡娛處及至花開又吹落又著一場愁拈云不是苦心人不知高堂燈落思如麻風樹棲棲鳴暮鴉遙望白雲情未盡含悲愁對滿園花舉僧問趙州萬法歸一坐著即不可一歸何處大睜著眼州云我在青州造領布衫重七斤莫言不道拈云趙州被這僧一問信口道個青州布衫雖是一種平懷大似掂斤播兩這裡見得嶺頭怪石穿雲出其或未然溪畔迷煙夾岸橫萬疊層山小徑通到頭滿地落花紅不知何處吹橫笛唱起堤楊一帶風舉佛眼常請益五祖鏡不自照凡有所問口吧吧地祖即云我不如你已有船中月你自會得好更添帆上風或云我不會是甚麼心行我不如你還伊佛眼來眼愈疑放下便平穩遂咨決於元禮首座莫向他人舌頭討禮以手引眼耳有勞神用繞圍數匝未出圈子行且語云秖管說你自會得好秖管聽眼云有冀開發乃爾相戲耶休蹉過禮云你他後悟去方知此日曲折耳太叮嚀生拈云殺人要見血秖為騎牛更覓牛逢人叩問轉生愁若知曲折成多事山自青兮水自流舉乾峰示眾云說向人間不值錢舉一不得舉二直今舉也是一是二放過一著落在第二今朝失利雲門出眾云嘴尖先出頭昨日有人從天臺來竹密不妨流水過卻往徑山去山高豈礙白雲飛峰云明日不得普請一齊領過便下座得意濃時正好休拈云乾峰雲門說誰家語話沒絃琴操中秋月無孔笙吹上巳風知音底辨取扼斷玄關最上頭出身猶自隔林丘何人踏破煙霞路笑語相將樂未休舉僧問淨眾蓮花未出水時如何大好著眼眾云菡萏滿池流開也開也僧云出水後如何覷伊不著眾云葉落不知秋實也實也拈云藏頭露面劫外風光露面藏頭今時消息會得淨眾說話且莫判作兩頭青萍未破花先發綠沼纔穿葉正凋一段風光人不識池邊翡翠話無寥舉僧問荷玉如何是西來的的意無二無別玉云不禮拜更待何時氣急殺人拈云西來的意妄生一解萬水千山別措一詞千山萬水問處刻的答處分明切忌側耳低頭直須當下領會一句全提已是多熊峰山下莫蹉跎神光當日無思算斷臂曾經禮達磨舉僧問曹山五位對賓時如何請師答話山云汝今問那個位喚作對得麼僧云某甲從偏位中來白髮尋知己請師正位中接黑頭無故人山云不接能救世間苦僧云為甚麼不接何曾辜負你山云恐落偏位中去話得分明也是閑拈云接則兔倚雪巢不接則鴉棲煙樹且道如何對賓聻曹山答底甚麼年來守拙臥深山不耐清霜懶露顏客到無心相對語紅塵恐著鬢頭斑舉仰山示眾云一言說盡山河合取狗口僧問如何是一言何須重舉山以火箸插向爐中卻收舊處盡也盡也拈云也不消得說盡山河休更求爐邊插箸爐邊收而今翻笑西來老少室峰前讓幾籌舉僧問大陽如何是和尚家風客來須待陽云滿瓶傾不出太儉生大地沒饑人太奢生拈云打破瓶來本無一物直饒大地盡饑且教何處下口問到家風竟若何常將白眼看婆婆衷情一段難傾出那有知心話得麼舉僧到韶山禮拜了叉手而立別有長處麼山云大材藏拙戶可惜許僧又過一邊抱頭狂走山云喪卻棟梁材失利了也拈云這僧胡不禮拜了退卻又左之右之韶山兩度捺渠要且不識好惡伎倆頻呈俊不禁一擒一縱縱還擒長材喪卻徒惆悵枉費工師一片心舉僧問上藍如何是上藍本事日用而不知藍云不從千聖借承誰恩力豈向萬機求少個甚麼拈云對客數家貧本事圓成一物無堆山積嶽未曾沽平生俠氣凌霄漢那個男兒不丈夫舉石頭問青原和尚自離曹溪甚時到此間忘卻了也原云我卻不知汝甚時離曹溪與和尚一路頭云某甲不從曹溪來各人打掃門前雪原云我已知汝來處莫管他人屋上霜頭云和尚幸是大人且莫造次溫言軟語仁義道中拈云石頭問事得事青原就機奪機莫道知和而和可稱父父子子一別曹溪不記年乘鸞跨鶴兩翛然庭除敘樂情無限共坐松陰待月圓舉僧問廣德波浪之中如何得玅移舟諳水勢德云橈棹不施兼脫底咦往來終不借浮囊妙妙拈云不居尊貴頻入驚濤深歷艱難優游自在且道是甚麼人事逐浪隨波到處遊不呈橈棹渡滄洲滿艇風月都收盡倒駕銀河萬里流舉洞山解夏上堂云放開布袋口諸兄弟東去西去看腳下直須向萬里無寸草處去太潔白生石霜云出門便是草荒田不揀明安云直饒不出門亦是草漫漫淨地迷人拈云靜沉死水動落今時俱未十成穩當欲不話作兩橛切忌坐著一頭明眼衲僧各請方便細草疑煙帶露濃輕柔滿地拂東風經霜莫謂成衰落暗裡何知造化工舉僧問龍牙二鼠侵藤時如何愁殺人牙云須有隱身處始得珍重珍重僧云如何是隱身處不在內不在外不在中間牙云還見儂家麼莫顯乎微拈云朝聞夕死此外別無消息原始要終就裡大有機關莫教縮腳藏頭不妨丁名卓字還有識幻知歸者麼須有隱身處始得玉兔金烏急似梭石人駕浪入雲窩山前嶺外無消息惟有青松掛碧蘿舉黃檗上堂欺誑平人大眾方集落伊圈繢復召云大眾呼牛喚馬眾回首逐響隨聲檗云月似彎弓少雨多風一任卜度拈云黃檗喚東家人說西家話太弄舌劍唇鎗一時大眾如何抵敵向道莫由沙場過果聞鼙鼓好愁人風信高懸赤幟幖竿頭五兩任飄飄東西南北烽煙亂鐵馬橫嘶度小橋舉僧問首山如何是學人親切處豈有他哉山云五九盡日又逢春舌頭不出口僧云畢竟如何從來無異路山云冬去寒食一百五牙齒三十六拈云算得清數不的欲知親切一句不如當下忘言暑往寒來春復秋夕陽西下水東流分明道破無餘事直待當人自點頭舉僧問巴陵祖意教意是同是別疑殺人陵云雞寒上樹羊便乾處臥鴨寒下水驢便濕處尿拈云瓶盤釵釧酥酪醍醐融而為金攪成一味須是過量人始得且道巴陵答處意作麼生清濁分時涇渭辨高低盡處乾坤同屈指當胸總是拳無端左右列成邊攀花折柳尋常事到處風流信自然舉僧問禾山即心即佛即不問問亦得如何是非心非佛不問亦得山云解打鼓還聞麼拈云聞禾山鼓而不嘔吐者也是鐵石肝腸閑雲淡淡繫山腰細雨濛濛灑石礄荒徑不知人跡冷一聲愁緒聽鳴鴞舉雲巖問藥山如何是異類中行牛頭沒馬頭回山云吾今日困倦且待別時來倒身斜臥巖云某甲特為此事來何不向異類中行山云且去喏喏巖便出抽身有分拈云南頭買瓠北頭賣瓜東廊作揖西廊拱手若不戴角披毛爭解迴途護轍還見藥山麼慵簪鴉髻修花貌暗整鸞粧對月娥博得名花園內栽天香國色那堪陪紅顏應是和風綻無事臨軒擊鼓催舉僧問法眼聲色兩字如何透得切忌隨他去眼云大眾若會這僧問處聲不是聲色不是色透聲色也不難未敢相許拈云透得過滿眼滿耳透不過不睹不聞這僧問處且置畢竟聲色兩字作麼生透擊竹觀花也大奇透關消息有誰知目前無法無非法不逗聰明處處宜舉僧問資壽一大藏教葛藤窩還有奇特事也無一任鑽龜打瓦壽云恐汝不信和尚道就是僧云如何是奇特事要會有甚難壽云白底是紙黑底是字恁麼那恁麼那別云白底不是紙黑底不是字若信得及奇特事也直尋常大藏從來事不差雲煙落紙走龍蛇分明直個成奇特莫教重添眼裡花舉僧問雲門如何是清淨法身拖泥帶水門云花藥欄錯問不錯答僧云便恁麼去時如何且莫造次門云金毛獅子錯答莫錯問拈云出自現成深以曲折有權有實非易非難自是玅應隨機莫道雲門口快花藥欄眼中千尺噴流泉金毛獅子腳底清煙平地起韶陽老較些些醉時慣唱哩哩囉醒來還是囉囉哩舉芭蕉示眾云正經道一句你有拄杖子認著即不可我與你拄杖子土上加泥你無拄杖子拋卻即不可我與你奪了拄杖子空中掘啇拈云將金博金以水洗水芭蕉別有接物利生手段且將甚麼喚作拄杖子若見有無分明與奪也不消得予奪隨宜用最親多情疑是薄情人君家醉臥紅塵裡也著扶持費苦心舉大耳三藏得他心通有多少奇特朝見肅宗帝且莫炫長帝命國師驗之恐妨納敗藏見國師禮拜了側立於右賤避貴國師云汝得他心通是否國師不得他心通藏云不敢且信一半國師云汝道老僧即今在甚麼處莫動著藏云和尚是一國之師何得在西川看競渡船許汝左眼明國師再問汝道老僧即今在甚麼處只這是藏云和尚是一國之師何得在天津橋上看弄猢猻許汝右眼得國師第三度問汝道老僧即今在甚麼處咦藏罔知去處相見了也國師叱云這野狐精國師得他心通他心通在甚麼處不敢不敢拈云三藏不具自心通所以第三度不見國師然則國師還自知也未若也自知猶較三藏百步若也不知又爭怪得伊覿面相看總一如愈親愈近愈成疏饒君通得他心事何似心除事亦除舉神會到青原處無事莫空行原問甚處來和尚合知會云曹溪來源不昧原云曹溪意旨如何探竿在手會振身立覿面呈機原云猶帶瓦礫在早是不堪會云和尚此間莫有真金與人麼也不消得原云設有與汝向甚處著久荷尊慈今朝乃見拈云直為慈悲之故有落草之談振身立曹溪意旨徒把執瓦礫真金一樣看當機劈奪何太急何太急雨散雲收風習習舉保壽上堂拈拄杖云人天眾前重新打算得自天臺絕比倫孤迥迥從來無葉又無根赤條條有時扶過斷橋水承渠恩力幾度伴歸明月村少伊不得雖然如是還見這個麼也不得放過仔細從頭一二三擊禪床一下百雜碎便下座劄拈云保壽老漢口吧吧地把一條拄杖十分分疏不怕旁觀檢點若是有人奪來燒灰颺卻且又如何折合楖栗拈來仔細看從頭話出齒牙酸天然種草無倫匹卓破虛空盡膽寒舉黃龍和尚因化主歸陞座云法不孤起仗境而生有五種不易且聽分解一施者不易頭目髓腦又作麼生二化者不易一粒須彌甚麼心行三變生為熟者不易三德六味供佛及僧四端坐食者不易正恁麼時動著不可且道第五不易是甚麼人看看問到臨頭處面目依然可憐生良久云聻直饒渾身露出終是有口難言便下座今日機緣一場敗闕時翠巖真為首座座中既有江南客藏主問第五不易是誰重向人前唱鷓鴣真云腦後見腮莫與往來不因茲舉幾乎錯過拈云施者易化者易變生為熟端坐受食者俱易直是第五果然不易畢竟是甚麼人莫道黃龍描畫不出翠巖指點不真即天眼龍睛也覷他不著若也覷著日費斗金非分外其或未然時餐滴水也難消易不易兮難不難許多愁戚許多歡饑餐渴飲無餘事一任諸人仔細看
