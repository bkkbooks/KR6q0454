body:
  text: 書記普定編五宗頌臨濟小參云我有時奪人不奪境我有時奪境不奪人我有時人境兩俱奪我有時人境俱不奪拈要見縱奪機關麼君子之中庸也君子而時中如何是奪人不奪境答王孫一去芳草綠頌奪人不奪境胭脂和紅粉大地與山河在在呈圖影如何是奪境不奪人答洛陽春罷洞賓來頌奪境不奪人把手夜深行相逢不相識覿面沒疏親如何是人境兩俱奪答漁翁夜宿三更晚頌人境兩俱奪虛空那摸索無形金彈子落盡翀霄鶴如何是人境俱不奪答牧童遙指杏花村頌人境俱不奪脫灑灑脫脫腳板踏峨眉舌頭談五嶽總頌縱奪臨機用不差電光影裡活如蛇睜眉擬覷從中事十萬程途路轉賒僧問臨濟如何是真佛真法真道濟云佛者心清淨是法者心光明是道者處處無礙淨光是三即一皆空而無實如有真正道人念念心不間斷達磨大師從西土來只是覓個不受人惑底人後遇二祖一言便了始知從前虛用工夫山僧今日見處與佛祖無別若第一句薦得堪與佛祖為師第二句薦得堪與人天為師第三句薦得自救不了別第一句薦得半夜撞倒漆崑崙第二句薦得藕絲孔裡翻筋斗第三句薦得三歲孩兒跛挈行如何是第一句答遠頌第一句閉門打瞌睡未曾開眼時遊戲成三昧如何是第二句答近頌第二句嬰兒剛有氣㘞地一聲來眼耳鼻舌具如何是第三句答差頌第三句取火待鑽燧燎卻面門毛到底成何濟總頌一句二句三句始終覿面難遇直饒薦得分明白日青天著魅臨濟云大凡演唱宗乘一句語須具三玄門一玄門須具三要有權有實有照有用汝等諸人作麼生會拈那個是三玄三要句飛彈打黃龍眉毛遭鼠咬如何是第一玄答金剛半頭肩頌第一玄烏龜飛上天單剩一隻腳踏著威音前如何是第二玄答空手把金鞭頌第二玄騎馬上高竿噴地翻筋斗弔下一文錢如何是第三玄答虛空打鞦韆頌第三玄囫圇沒中邊東洋飄大海架個無底船如何是第一要答頭頂烏紗帽頌第一要寥廓空浩浩路斷煙水寒行人那得到如何是第二要答午夜金雞叫頌第二要妍媸一齊照縱橫玅用分秦鏡當臺耀如何是第三要答城市街頭鬧頌第三要漫把朱絃操流水與高山彈出無生調總頌三玄三要事如何擬涉思惟蹉過多揭諦揭諦僧揭諦娑婆娑婆娑婆訶臨濟一日問僧我有時一喝如金剛王寶劍有時一喝如踞地獅子有時一喝如探竿影草有時一喝不作一喝用汝作麼生會僧擬議濟便喝拈當時這僧便與一喝管教臨濟擬議不來如何是金剛寶劍答觸者皆喪頌金剛寶劍無容思算直下揮時虛空血濺如何是踞地獅子答力重如山頌踞地獅子觸著便起突出爪牙那容得你如何是探竿影草答神出鬼沒頌探竿影草知醜知好張家哥哥李氏嫂嫂如何是一喝不作一喝用答思量不及頌不作喝用顛拈倒弄擬問如何全然無縫總頌四喝還如一喝同雷轟電掣跨神龍虧他臨濟口門闊觸著機關處處通臨濟示眾云參學人切須仔細如賓主相見便有言論往來或應物現形或全體作用或把機權喜怒或現半身或乘獅子或駕象王有賓看主主看賓主看主賓看賓者山僧所舉皆是辨魔揀異知其邪正拈賓主相看就師資兩人而言賓中賓等就師資各人而言秖如賓主不立又作麼生如何是賓中賓答客路作遊人頌賓中賓眉目得人憎拍手長安去寸步實難行如何是賓中主答反鞭策鈍駑頌賓中主寒山顛作舞不辨來端由笑伊目如瞽如何是主中賓答暗室沒明燈頌主中賓甘作外遊人東西路不辨南北豈能分如何是主中主答當軒塗毒鼓頌主中主紅日正當午寶劍高提時觸殺佛與祖總頌賓主相逢事不同一番雨過一番風輕風細雨頻頻度李自白兮桃自紅臨濟示眾云我有時先照後用有時先用後照有時照用同時有時照用不同時先照後用有人在先用後照有法在照用同時驅耕夫之牛奪饑人之食敲骨取髓痛下針錐照用不同時有問有答立主立賓合水和泥應機接物若是過量人向未舉以前撩起便行猶較些子拈云也不消得如何是先照後用答點燈喫飯頌先照後用老龍出洞電卷雷奔魚蝦腦痛如何是先用後照答鑿壁偷光頌先用後照敲翻破灶靈從何來速道速道如何是照用同時答無南無北頌照用同時痛下針錐魂驚膽喪血染須彌如何是照用不同時答或東或西照用不同伐鼓考鐘箕星好雨畢星好風總頌照用施行有後先不同同處事難詮饒君舉足奔千里影未窺時已著鞭洞山接人有正偏五位君臣五位功勳五位王子五位四賓主內外紹等事以明向上一路拈見麼有無不涉常回互無端嚼碎又成團如何是正中偏答夜半星河斗柄懸頌正中偏沉沉古殿鎖蒼煙漏聲欲盡更初罷澹澹蟾光映碧天如何是偏中正答天曉不見行人徑頌偏中正滿天星斗雲攢鏡隨他萬象自森羅無影光中含混沌如何是正中來答紅塵堆裡百花開頌正中來木人踏破古蒼苔縱橫不礙平原闊朵朵蓮花信步開如何是兼中至答柳綠桃紅增佳致頌兼中至妙用無方詮理事戛玉敲金韻冷然希音透徹雲天際如何是兼中到答兩頭截斷通玄玅頌兼中到及盡有無還大道撒手迴途不露蹤歸家拍掌呵呵笑總頌五位正偏絕玅奇旁通回互露先機當頭不犯寰中禁內外和融總不知如何是君答鳳閣龍樓儼至尊頌獨鎮寰區凜聖顏九重端拱化無偏至尊自是亡倫匹落落深階露日鮮如何是臣答文經武緯玅裁成頌公卿白屋異常流豪氣三千射斗牛不為功名矜釋褐了知才幹駕千秋如何是臣向君答一片葵心捧聖明頌瀝膽披肝事莫窮夢魂常自誓孤忠勳華豈獨誇鴻烈為羨傾誠對九重如何是君視臣答出獵曾經渭水濱頌相卜何因到傳巖龍車御處野雲開鹽梅為借調羹手不負從前夢一回如何是君臣道合答風雲聚會處千古慶明良頌盛德鴻猷壯帝畿泰交此日慶都俞欲知一德咸孚處玅用無方絕顯微總頌霧鎖巖廊瑞色開堂簾喜起共徘徊千秋大業歸無住漫把勳名仔細裁如何是向答凝眸長不瞬爭肯抱頭眠頌著眼凝睛未是親中懷繾綣自殷勤回頭不謂雲煙杳肯負依依一片心如何是奉答赤心常捧日雲水自依山頌掩著柴扉閉著關拋笻可是畏峰巉山翁此日何思算漫煮黃薤但酌泉如何是功答不須閑氣力撒手到凌煙頌平生辛苦有誰知喫盡寒酸未足奇及至承當無個事得來依舊笑當時如何是共功答生殺同條出春秋總不知頌天高地厚勢難窮就裡誰分造化工自是鈞陶盈大冶行生總在不言中如何是功功答帝力云何有謳歌忘太平頌底定河山數十秋弓拋劍掛自優游皇風帝德知何處社飲村歌樂未休總頌五位功勳知不知有功恰到無功時一條布袋都囊卻笑倒長街老古錐如何是誕生王子答前星光宇宙貴胤自天然頌生來尊貴號儲君位正中宮沒比倫玉葉金枝非別種轉身猶自出王庭如何是朝生王子答才猷堪贊化酬勳不住功頌潛心養志在深山學邁才超不等閑大用一朝來帝眷承顏豈獨侍朝班如何是末生王子答清白非為苦堅貞節不移頌落落孤貞清且貧肯將毫末惹埃塵登科不懈平生志始信雲衢展步輕如何是化生王子答威揚宣正令中外化親傳頌不動巍巍仰聖明傳持閫外賴將軍太平底定無多事玅印高懸不露文如何是內生王子答入宮無異體對面不相逢頌無作無為渾似癡功勳不犯醉如泥而今已出青霄外紫禁重闈那得知總頌同生同死絕疏親名貌何分是幾人踏破來時多少路都盧共到法王城如何是主中賓答我無你不成頌主中賓長江玉浪生不因風皺面如何得成紋如何是賓中主答你無我不得頌賓中主是子還歸母為問呱呱兒來自甚麼處如何是賓中賓答月色冷風聲頌賓中賓渾身都是塵烏能明大用怪殺野狐精如何是主中主答渾淪不須補頌主中主不聞亦不睹兒孫向後看誰是爾宗祖總頌賓中主也主中賓賓賓主主不相倫會得主賓混融處不萌枝上辨秋春如何是內紹答深宮無敵體玅用解承當頌天然尊貴異常流寶位傳持事未休不是人王無別種那能物物與頭頭如何是外紹答風塵無異路曉夜據征鞍頌剎剎塵塵事不差拂開煙霧與晴霞見得分明無異路何妨盡摘洛陽花洞山謂曹山曰吾在雲巖先師處親印寶鏡三昧事窮的要今以授汝汝善護持母令斷絕遇真法器方可傳授直須秘密不可影露恐屬流布喪滅吾宗末法時代人多乾慧若要辨驗向上人之真偽有三種滲漏當機切須具眼拈出此三種又作麼生第一見滲漏拈放下著頌山重重復水重重萬水千山一目中若道水山常在目行人依舊路濛濛第二情滲漏拈活潑些好頌擔板從來見一邊何如到處眼雙圓滿腔繫戀還須吐一落思量便不堪第三語滲漏拈道底甚麼頌有言須是悟無言開口成雙落二三況復游揚迷玅義堪悲堪笑口頭禪曹山云凡見聖解是金鎖玄路直須回互去夫取正命食者須具三種墮一者披毛戴角二者不斷聲色三者不受食稠布衲問披毛戴角是甚麼墮山云是類墮不斷聲色是甚麼墮山云是隨墮不受食是甚麼墮山云是尊貴墮拈秖如不墮三種看來正好喫棒如何是類墮答雖行畜生行不得畜生報頌披毛戴角瀟灑得過一入荒丘尋他不著如何是隨墮答見色非干色聞聲不是聲頌見色聞聲終不是塵鶯啼綠樹別有知音如何是尊貴墮答不裝珍御服來著破籃衫頌禮絕百僚非是尊高無人侍立常自逍遙南陽忠國師作圓相九十六種以授侍者耽源源承識記傳於仰山山既得遂焚之源一日問仰曰向所傳圓相宜深秘之山云焚卻了也源曰在子即得來者何如仰乃重錄呈似一無差失拈失也失也頌國師父子太無因識記傳來直到今畫得圈圈九十六青天白日換人睛仰山親於耽源處受九十六種圓相後於溈山處因此相頓悟有語云諸佛密印豈容言乎又云我於耽源處得體溈山處得用謂之父子投機故有圓相辯的於人或畫此相或畫此相或畫此相或畫此相或畫此相或點破或劃破或擲卻或抹卻皆是截斷眾流也拈如許絡索是甚麼弄猢猻家具雖然如是也要大家知委頌覿面相呈事最奇隨宜縱奪在臨機一輪明月輝霄漢照破河山影畫眉仰山因五冠了悟禪師相與立玄問玄答故畫此相此相此相此相此相都在臨機應用若是靈利底對面分付擬之則不見也拈不見更玅頌一人拈起一人圓兩兩相將各一邊識得兩邊符合處收來依舊自團圞一日梵僧來參仰山於地畫此相僧近前添作此相復以腳抹卻山展兩手僧拂袖便出拈仰山鉤頭著餌梵僧一釣便上易曰鳴鶴在陰其子和之我有好爵吾與爾靡之其仰山梵僧之謂與頌好幅畫圖不屬紙墨仰山梵僧多生枝節展手兮無言無言拂袖也難說難說賊賊據款結案放伊不得仰山設九十六種圓相開為百二十合為九十六共一十九門設施圓收在於六門一圓相二義海三昧機四多字學五意語六默論拈種種圓相雖是多門設施不過師資辨驗臨機拈出毋論是生是佛情與無情那能越得圈子去莫道九十六個即百千萬億剎剎塵塵種種變現無過一個包羅得其意者但識其序勿執其本庶幾用而無礙可也咄莫𡱰沸頌秖個從中辨假真一門闢起許多門門門施設誠何事貴在臨機玅用親雲門示眾云函蓋乾坤目機銖兩不涉萬緣作麼生承當眾無語自代云一鏃破三關後德山圓明密禪師遂離其語為三句函蓋乾坤句截斷眾流句隨波逐浪句密嗣雲門函蓋乾坤句拈總在裡許頌函蓋乾坤事莫窮頭頭物物露真風頂門亞豎摩醯眼萬象森羅一鏡中截斷眾流句拈不通一滴頌截斷眾流意若何算來一字已成多推排解會徒勞力肯把要津放得過隨波逐浪句拈一葉扁舟頌隨波逐浪過前川綠笠青蓑把釣閑一曲漁歌江際晚高低棹破水中天雲門宗八要一玄拈燈籠騎露柱頌幾度乘風泛小舠彩雲影裡漫撐篙舉網撒破虛空面又向山頭釣巨鰲二從拈柳絮隨風頌桃紅李白鬥芳妍一夜東風色更鮮滑蝶狂蜂何處去慣尋香氣到花前三真要拈六月日頭到處熱頌腳底茫茫路轉賒東西南北盡天涯風塵踏遍無閑思畢竟回頭始是家四奪拈不遇無情霹靂手掃蕩煙塵將屬誰頌拓土開疆也大難幾回血汗染征衫可憐三尺魚腸劍漫假雄才手靖邊五或拈我到這裡卻不會頌習習香風過樹頭去來何處覓蹤由行人無數空惆悵幾度尋思恨未休六過拈一分心悻一分慈頌狼毒心腸何太孤提刀仗劍忍於屠命根斷處難思算幾個男兒是丈夫七喪拈貪觀眼前浪失卻手中橈頌弱喪窮兒實可哀家珍拋卻自何來可憐別去娘生面落落長途喚不回八出拈天上人間自在飛頌鳥道羊腸路太多腳頭腳底任蹉跎隨他曲折芒鞋滑步步如龍疇奈何雲門三種病動止因三種偏枯著二邊一未到走作拈你恁麼驢年去頌東去西來無了日南奔北走到何年紅塵擾擾忘歸路夢斷家山實可憐二已到住著拈密移一步未為分外頌長安雖樂實難居到處優游任卷舒若教閉門高枕臥養成痼疾倩誰除三透脫無依拈恁麼不恁麼始得頌不入塵牢不受纏拋枷打鎖許多年誰知作個長流客蕩蕩無依去不還雲門二種光不透脫疑情猶未盡回首到家遲一切處不明面前有一物是一拈瞎頌白雲朵朵翳雙睛一線青天也是塵撥盡黃金知何日不愁寂寞不愁貧透得一切法空隱隱地似有個物相似亦是光不透脫拈放下著頌夢破方知一物無法塵盡處亦何孤誰知暗裡相逢處依舊從前障眼珠雲門一字關僧問雲門如何是雲門劍門云祖如此之類凡有所問但以一字酬之拈雲門恁麼道謂是齒不關風謂是舌頭太短有人透得此關許他親見雲門頌一字關一字關何不成雙獨成單單單一字誠難測一字誠難測也難難難目前隔個須彌山抽顧雲門見僧來每以目顧之即曰鑒或曰咦而錄者曰顧鑑咦後德山密刪去顧字但曰鑒咦叢林目之為抽顧拈非父不生其子頌雲門鑑咦德山抽顧方便機關父作子述擾擾叢林卒不休而今猶在欣相慕法眼依地藏決策一日呈見解說道理藏曰佛法不恁麼眼云某甲辭窮理盡也藏曰若論佛法云云眼於言下大悟後因行腳話不知最親切始悟徹作偈曰三界唯心萬法唯識唯識唯心眼聲耳色不到耳聲眼觸何色耳聲難成眼色何立色心不二彼此無差有人會得騰煥吾家乃立華嚴六相義拈不是一番寒徹骨爭得梅花噴鼻香此乃華嚴六相義舉一齊收於一一法中有此六義經中蓋為初地菩薩說也拈六相即不無還出得這個麼頌桃李枝頭色色新紅如胭抹白如銀雖然笑破東風面都是園林一樣春法眼六相義頌華嚴六相義同中還有異異若異於同全非諸佛意諸佛意總別何曾有同異男子身中入定時女子身中不留意不留意絕名字萬象明明無理事拈恁麼道未免裂破舌頭頌六相由來義不同不同同處玅相通同中有異同無異兩岸蓉花映水紅法眼宗四機箭鋒相拄拈不是好手頌兩陣交鋒莫可當彎弓架矢豈尋常箭頭的的相逢處脫卻征衣笑一場泯絕有無拈猶有這個在頌大用臨機不可窺卷舒出沒玅相隨更無面目教人見誰向虛空強畫眉就身拈出拈直恐弄巧成拙頌自從關破祖師關掣電轟雷任往還不識當機拈弄處低頭已隔萬重山隨流得妙拈未敢相許頌祖意明明百草頭相逢到處逞風流隨家待客隨豐儉把箸拈匙一笑休
