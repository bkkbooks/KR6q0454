body:
  text: 書記普定編上堂順治甲午上九日總戎袁寶善居士請師於忠州崇聖禪院結制上堂拈香云這瓣香乾坤篤鍾海嶽生成爇向罏中奉祝當今皇帝聖躬萬歲伏願開天闢地大一統而乘六龍邁古超今靖八荒而寧萬國這瓣香秀葉群英芳同衆甫爇向罏中奉為滿朝文武各郡宰官伏願聲應氣求喜見拔茅而連茹雲龍風虎欣瞻隨類以從王這瓣香培於梓里種自桑田爇向罏中奉為期主袁公遠邇檀度伏願相助相扶鑿井耕田娛歲月興仁興讓含哺鼓腹樂升平這瓣香小似須彌大如芥子劈非為兩捏不成團昔在熊耳庵中輕輕舉著熏破巴掌和尚鼻孔今朝信手拈來供養本師上鐵下壁和尚用酬法乳伏願喝下雷霆震醒群生之幻夢棒頭雨露灑開大地之覺華拈畢據座維那白槌云法筵龍象衆當觀第一義師云第一義沒屎屁棒打石人頭𥗋𥗋論實事青山頂上草芃芃翠竹籬邊風習習那管李四張三不問趙甲錢乙耳朵原是兩片皮一個鼻頭兩孔氣山僧恁麼告報若有伶俐衲僧出來道曾老師莫屎沸一棒打折你驢脊僧問爐鞴新開鉗錘初舉何處是聚雲心印師云山前山後溪西溪東進云因甚落在和尚手裡師噓一聲進云即今普對人天如何施設師便喝僧禮拜師云問來問去帶水拖泥豎指豎拳添釘著楔如或懡㦬而散未免辜負今時且聽木上座道個開場偈子卓一卓云囉囉哩哩哩囉囌嚕㗭哩娑婆訶維那再白槌云諦觀法王法法王法如是師下座上堂僧才出師便打僧擬議師打云汝從甚處去來僧云三日不相見莫作等間看師復打僧出師打云還見前僧麼僧便喝師便打僧又喝師又打問人天聚會凡聖交參拄杖頭邊有何意旨師亦打進云和尚也不消得師連打僧禮拜師打云山僧棒頭頗毒打殺一窠一窟一任放去收來個裡了無回互無回互鵓鳩樹上鳴唱出無生曲谷谷孤上元上堂天上月正圓人間號月半山僧沒來由且自間打算單見拆拆見單坤六斷乾三連大來小往上地下天卜得正月卦乾坤顛倒顛頂𩕳觸地腳板朝天非龍非鬼非仙上堂冬至寒春至暖生漆盤琉璃盞戴雪烏雞深夜翔吞煤玉兔天明卵多多拜上李四娘看趙大哥轉也未轉上堂喝一喝云雷以動之噓一聲云風以散之卓拄杖云雨以潤之畫相云日以暄之此是衲僧機關因甚注以羲經妙義秪緣華野鄧居士具贊化才猷於茲飯衆祈嗣越例與諸人露個消息還見麼先天弗違後天奉若彩鳳五色毛祥麟一隻角上堂松直棘曲鳧短鶴長眉先鬚後舌柔齒剛點頭三下自肯承當承當個甚麼績麻滿筐上堂問不問不答作麼分解師便打問十方同聚會個個學無為既是無為用學作麼師亦打問樹倒藤枯句歸何處師打云一二三四五五四三二一屈指五個三剛剛十五日不用如何若何何必不必只許老胡知不許老胡會祈嗣請上堂天地人物根宗渾淪橐籥乾坤六子奧竅摩蕩生成這裡薦得一切衆生俱為鼻祖十方諸佛猶是耳孫不則也須疑著良久云吞日精啖月華降星斗走龍蛇卓一卓云分明記取朴素道人持經請開示上堂驀拈香云此是藥能殺能活爇向罏中云此是師絶聖絶凡指香煙云此是琉璃光無背無面合掌云此是如來本願不增不減朴素道人轉如是經究如是旨恁麼功德還有證盟也無十二大願隨心足恆沙餘慶自然來上堂三山不會佛法逢著虛空一摑拄杖眉長丈三拂子眼橫尺八四四三三七七八八寶善誕期上堂拈拄杖云無量壽來也將軍身宰官身居士身身身應現過去世現在世未來世世世圓成作麼生説個圓成底道理陽數九陰數六惟有這個數不足金龜嚼碎鐵崑崙夜半日輪當午出具眼者看看問如何是世尊初生句師云翡翠踏翻荷葉雨如何是居士懸弧句師云鷺鷥穿破竹林煙且道居士世尊是同是別師云玉印山磊磊落落曹溪水曲曲灣灣進云恁麼則皇宮現瑞石寶呈祥師云桃花紅李花白冬瓜瓠子撞泥鐘六月炎天下熱雪昔日今朝事若何踏著稱錘硬似鐵上堂此事如鬧市裡揚石頭著首者便知山僧今日揚下石頭了也還有著首者麼上堂河水湯湯河流蕩蕩風敲翠竹日照堤楊觸境觀不足明明無回互卓拄杖云莫將黃葉當金錢貓兒原解捉老鼠上堂般若居士出師震威一喝士掩耳歸衆師云騎龍頭把虎尾飛天鐵馬三條鬚走地金烏一隻膇會麼會麼復舉龐公云難難十石油麻樹上攤不是苦心人不知龐婆云易易百草頭邊祖師意甚處得這消息來靈照女云也不難也不易飢來喫飯困來睡寐語作麼直今張將軍闔宅熏修遠來供衆道與昔人相去多少連喝三喝解制日慶忠老人送法衣信拂至上堂眉滿虛空眼滿地遼天鼻孔難回避舌頭嚼碎大雄峰踞地金毛成隊隊知麼慶忠老人心行狼毒耳菴和尚出師便打師誕期上堂四十年來顛倒顛穿衣喫飯別無言現成公案人不識更道父母未生前寶善問無生一句鬼神不知因甚被諸人覷破師云燈籠頭觸地進云覷後如何師云露柱尾朝天善禮拜師云九八六十七蝦蟆鑽象鼻六九七十三烏龜上樹顛惟有向上難委悉一二三四五六七八九十生數成數不相十衲僧切忌知端的卓一卓云習順治乙未師受請住夔州府梁山縣興龍禪院結制上堂拈香畢維那白槌師擲下拄杖云莫言不道便下座楊副戎請上堂相逢一笑乃是作家列陳排兵未為好手與興龍作麼相見僧問單刀直入時如何師云險僧便喝師亦喝僧又喝師云苦哉佛馱耶僧作禮師云草賊大敗問和尚慣向異類中行成得甚麼邊事師云今日不與交鋒進云剖腹剜心即不無如何得完本體去師云汝班師回朝僧歸位師云知彼知此百戰百勝九天九淵計出非常有時減灶添兵有時減兵添灶但能逢強即弱自是遇柔則剛塞北江南一任橫嘶鐵馬邊關險隘何妨倒豎金矛正恁麼時作麼生是折轉旗鎗一句呵呵大笑下座上堂喝一喝云若道是早已不是若道不是即此便是衲僧不用巧思量大用明明無回避復喝一喝上堂牛種田馬喫榖雪峰輥毬道吾舞笏雞上樹鴨下水長沙大蟲楊岐驢子石鞏熟處最難忘張弓架箭射當陽真誠不作小兒戲八十翁翁入試場以拂子作揮毫勢上堂師作吟哦聲僧出師低首僧云蒼天蒼天師云不是知音不與彈上堂高更高青山頂上火流潮低更低緑水波中發迅雷驚起燈籠掩耳聽惹得露柱合眼窺就中自有真消息問取諸人知不知拍膝一下上堂問如何是法身師倒卓拄杖如何是報身師豎起拄杖如何是化身師云拄杖子無端惡發觸著釋迦老子鼻孔忍禁不過倒騎虛空顛走走入山僧方丈裡依然平怗怗地何故百年三萬六千日面目本來是娘生上堂正因老比丘住在貓兒石昨宵傳信來今向東山去恁麼去也戴角披毛恁麼住也藏蹤斂迹總不恁麼時如何道道上堂山是山水是水別有甚事驢頭馬嘴水非水山非山恁麼薦得北斗南看良久撫掌三下上堂拈拄杖云玄要主賓絶異同縱橫殺活不通風擊禪床云關捩敲翻無個事青天白日聽雷轟震威一喝上堂祖師心印狀似鐵牛之機去即印住住即印破不去不住合作麼生僧出禮拜了退師云本自無瘡勿傷之也祈福淨信請上堂南無佛馱耶不向佛求南無達磨耶不向法求南無僧伽耶不向僧求直此三轉語已為諸淨信修因植福了也座元出連喝三喝師吐舌元禮拜師下座臘八説戒上堂落落疏疏午夜星無端照徹釋迦文雖然直在面門上爭奈眼中又著釘衆中若有為伊拔得底則啓不關口動不關意觸不關身何犯何持又復何戒設或未然須向自家屋裡仔細檢點遂説戒上堂上大人丘乙己圓是規方是矩看將來無彼此麥裡麵兮穀裡米止止佳作人也可知禮上堂三世諸佛不知有狸奴白牯卻知有三世諸佛為甚不知有不見道他是三世諸佛狸奴白牯為甚卻知有不見道他是狸奴白牯恁麼會又爭得僧出師云道道僧云某甲亦道亦不道師云因甚亦道亦不道僧云和尚莫忘了話頭師云諾元旦上堂昨日雨今日晴一般西來意睹境自分明雖然如是第恐境觸心生心因境轉心境相緣因緣而礙汝等須悟境亦如幻心亦如幻幻亦如幻如幻亦幻諸法何存所以道心生種種法生心滅種種法滅生滅俱泯心法雙忘作麼生道但聽康衢歌擊壤不聞杞國更憂天解制上堂屈指凡來九十期塵埃滿面額沾泥憐兒不覺儂家醜自惜區區手撥眉山僧今日知過必改諸人分中又作麼生順治丁酉姚聖瑞總戎率將士等同布金檀越請師住梁山縣五雲禪院土地祠鳥道羊腸一徑通高高山頂露儀容相逢覿面不相識問訊云元來元來三門闢謂之乾闔謂之坤地天門戶內不放出外不放入佛祖機關且道向上一步聻佛殿顧視云但恁麼不是不是畢竟如何乃展具作禮方丈覆天載地容納虛空四方八面處處玲瓏一條無情棒操縱活如龍卓一卓結制上堂拈香云君恩也臨我親恩也生我檀信恩也護持我總此一瓣同伸報答次拈云得人一馬還人一牛人平不語水平不流自遭慶忠本師毒害不由滿口含冤今從那沒奈何處三番拈出用酬法乳上首白槌師云古人升座説法都要開陳鋪面山僧説法升座不免鋪面開陳豎拄杖云還有識貨者麼僧出師云交錢是買主僧擬問師云合價是間人又僧出師云住住宗中辨的句裡呈機具眼阿師才聞舉著便掉臂而去不然也是鞏縣茶瓶布金施主請上堂前屬利後屬元仲冬節氣十分嚴寒為憐苦海人難渡乘時駕個般若船以拄杖作撑舟勢云渡來渡來僧出云放下著師云順水推船則易進云如何是末後句師云逆風把柁則難僧禮拜師云一半水一半山別行一路自古皆然昔日世尊與衆行次以手指地云此處宜建一梵剎帝釋拈一莖草插於地云建梵剎已竟即今陶太宇叔侄捨宅為寺不須汝等重新修建且道山僧還有指地分也無向後師作弟隨也須記著上堂祖師西來意滿眼滿耳是擬議思量扶籬摸壁不然不然如是如是上堂山僧夜睡一夢正欲舉似諸人第恐無人原得僧出師云今日上弦僧云恭賀和尚上堂師云汝不解原一僧畫此相師畫此相僧云謝師答話師云汝不解原僧拂袖歸衆師靠拄杖作鼾聲上堂一是一二是二三五一十五九九八十一剖腹剜心説向人又道囈語匪端的誰端的一丈凡來有十尺冬至上堂畫一畫云七日來也復其見天地之心乎天何心百昌榮地何心萬物生唯有衲僧無思算地逢雷處是令辰飲玄酒茹太羹倒翻月窟獨露天根正恁麼時如何慶祝一線初添增錦繡聖明何處不當陽上堂東村梅西村柳節候從中要知有泥牛木馬滿天飛草木叢林獅子吼眉分八字鼻遼天牙齒原來只在口佛成道上堂圓陀陀非歉非餘光灼灼無遮無障世尊昔日睹星悟道嘆曰一切衆生具有如來智慧德相皆因妄想執著而不證得山僧看這迦文古錐無端寐語覺得有些不平見亦不著睹個甚麼原不曾迷悟個甚麼本自平常嘆個甚麼奇哉以何為智慧德相以何為執著妄想以何為衆生如來雖然如是還知老瞿曇落處麼上堂朔風微雨凍山寒林木蕭蕭眼倦看為報梅花驚歲早枝頭幾點露天斑豎拄杖云春色向山僧手中來也先天事後天事渾淪個裡難分析明明拈出任君看面目本來只這是僧禮拜師云錯下注腳元旦上堂大哉乾元萬物資始一團和氣誰堪比擬東君意若何呵呵笑不止有甚奇特消息聻三陽運轉乾坤泰六合春同草木新解制上堂衲僧全沒勾當九旬恰好算帳眉毛廝結東倒西歪疊膝跏趺裝模打樣囫圇圇眼生頂門口吧吧舌挂壁上而今解卻枷繩一任隨緣放曠雖然如是也不得離俺這裡問作麼生是隨緣放曠師云春遊芳草地進云此後如何師云夏當緣荷池進云恁麼則往而不返也師良久進云始信個中無解結戶外庭前總道場師云喏喏問開口成雙橛如何是聲前一句師云不向汝道進云秪道龜毛紅似漆誰知兔角黑如銀師云汝從那裡記得來問三月期制今已解對衆一句作麼生師云山前有土那非地進云大法意旨如何師云嶺外無雲別是天結制上堂極目霙花片片飛紅爐有火正投機因時及節歸何處一點銷鎔知是誰顧視左右上堂彈指一下云佛法秪是尋常若作奇特商量錯過了也僧出師下座師誕期上堂小陽月念四期山僧母難無可話題但舉則古人機緣拈頌幾句供養大衆貴圖報我雙親昔人謂世尊未離兜率已降王宮未出母胎度人已畢恁麼道還是麼聽取一頌玉質冰姿嶺上梅孤根暖蒂望春回誰知含笑三冬裡不待東風花自開大衆也須委悉此事始得何以故盈天地之間者皆物也飛潛蠕動姑置不論但就本乎地者而言之你看那千巖萬壑木樹草花為夭為喬總受鈞陶於造化一般生意覆載為功迄乎元運既往通復將來金風吼震於長天白帝乘權於西極嚴威正凜肅殺方張正恁麼時長林極目以蕭條木葉隨風而飄墮撫時者未免睹物而有造物不仁之譏師隨拈拂子點數點云獨這個侶松友竹鬥雪披霜點綴北陸風光漏泄東皇消息不惜寒侵徹骨先傳春信到枝頓使道上行人間中個士欣瞻顏色快睹芳姿驚且嘆曰天心見矣向之所謂造物不仁者非至論也我釋迦如來乘慈悲願力具相好莊嚴示現群生梯航苦海來此娑婆界中一番遊戲皇宮降誕雪嶺修行睹明星證道果超度宗親提攜庶類降伏外道摧折天魔大孝能仁於今為烈真所謂亭亭老斡迥焉秀出群英鬱鬱清香卓爾芳騰衆甫乃有不識好惡底猶欲一棒打殺忒放癡憨底更道吾不喜聞嗚乎家肥生孝子國伯有謀臣但具公心咸應讚嘆伊固何心而忍毒至此此無他知恩報恩故爾山僧恁麼告報道是扢揚先德道是埋沒古人具眼底揀辨看如上間言剩語都與佛法不相干涉豈不虛消信食枉度時光畢竟如何折合良久云情因比類情無限話到投機話更長以拂子擊禪床一下上堂之乎也者難措一辭良久默然和盤托出委悉麼家有犢牛兒價值十二兩上堂天是天地是地東家垣墻西家籬壁有個機關杳無消息既道有個機關因甚杳無消息昨宵野馬來被逐雲飛去上堂舉汾陽驗人有三種獅子句後浮山遠舉示衆云獅子句有三種一超宗異目二齊眉共躅三影響音聞若超宗異目見過於師方堪傳受若齊眉共躅智與師齊減師半德若影響音聞野干倚勢異類何分五雲今日權借他人探竿向獅子窟中輕輕撥動莫有覿面相呈者麼座元出喝一喝師云影響音聞元復喝師云齊眉共躅元又喝師云超宗異目元云兩堂雲水又作麼生師合掌云我不敢輕於汝等元顧視左右師下座佛成道上堂一二三四五金木水火土佛立山上起雲白兔亭前下雨南鄰北舍擊鼓敲鑼西市東街敲鑼擊鼓跳底跳舞底舞一齊報道臘月八夜半明星釋迦得睹睹底事作麼生展手下座上堂甚麼物與麼來不從人借匪自天排孤迥迥全無依仗赤條條絶沒塵埃休擬議莫疑猜夜來拄杖子將東村張三當胸一拄纍及西村李四痛忍難捱五雲院裡有齋上堂有句無句隔山出氣樹倒藤枯黃瓜落地中後二語不曾參會得底出來道看上堂一不成單二不雙六門緊閉沒收藏有時鬧市街頭過三歲孩兒喚作娘頭短小尾粗長既無背面又絶肝腸若人識得打他無妨罵他無妨入隊上堂山僧昨過萬松山見惺世道人菴梨偈云萬松菴裡一株梨滋味平常甘且奇四方八面無遮障獨立乾坤不用枝五雲且與批判一上萬松菴裡一株梨如何是樹倒藤枯一句滋味平常甘且奇吞卻不如吐卻四方八面無遮障風吹不入雨打不著獨立乾坤不用枝卻也遮天蓋地即今和盤托出且道如何下口解制上堂一上一二上二三下五除二五起五還一從頭算將來看看九十日解開布袋頭橫行順行東去西去還記得麼咦
