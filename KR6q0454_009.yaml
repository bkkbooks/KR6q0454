body:
  text: 書記普定編頌古著拈舉世尊初生禍胎出也一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊面皮厚多少雲門偃云我當時若見一棒打殺與狗子喫貴圖天下太平是甚麼心行拈云千古含冤一朝雪恨都是事出無端未免遭人檢點若檢點得出許你有知恩分貴出天然迥異常堂堂氣宇儼如王誰知更落英雄手掃盡煙塵定八荒舉世尊升座作麼作麼文殊白槌云諦觀法王法法王法如是尊鑑不錯世尊便下座好不慚惶拈云世尊無風起浪文殊白日枯睛至今依例攀條底總未識機關在曲彔床頭夢未開一聲槌響喚將回風流無限都拋卻盡把情思當下灰舉梁武帝問達磨如何是聖諦第一義向上些問來磨云廓然無聖劈腹剜心帝云對朕者誰蹉過了也磨云不識儘力道不出帝不契蒼天蒼天遂渡江到少林面壁九年一場特地拈云鐵獦狚無容下口頑石頭未免懷疑話不投機別圖方便且置大小祖師一經頓挫莫道冷坐九年直至而今無轉身吐氣分邀得春風入畫樓銀床更罷悶悠悠曉來依舊東窗下滿目青山總是愁舉百丈一日再參馬祖馬祖一喝潑油救火百丈三日耳聾雪上加霜黃檗聞舉不覺吐舌耳裡著不得水拈云三俱不了且作麼生喝一喝歷歷長征強據鞍朔風吹動骨毛寒窮途落寞情多少幾度行人淚不乾舉僧問五祖戒如何是佛問阿誰祖云踏著稱錘硬似鐵下腳時一場懡㦬拈云多虛不如少實尋芳有意入林幽賺得香魂繞樹頭莫教驚殘蝴蝶夢從前仍是一莊周舉藥山與雲巖遊切忌隨他去山腰間刀響還聞麼巖云甚麼作聲也須問過山抽刀劈口一斫險拈云雲巖耳根不清殊覺探頭太過藥山據令而行要且不是好手何故我王庫內無如是刀草色萋萋煙色橫山鳴谷應話無生誰知杖履追隨處驚起狂猿夢不成舉僧問道吾如何是和尚深深處淹殺闍黎吾下禪床作女人拜云老婆禪謝子遠來無可祗待餿飯祭間神拈云九重密處禁殿苔侵丹陛升時綸音下降欲叩深宮意旨須聽暗裡傳宣還有識得此消息底麼海底泥龍何處尋雲封古洞影沉沉滔天白浪騰空出幾負殷勤一片心舉三聖問雪峰透網金鱗未審以何為食埋兵掉鬥峰云待汝出網來即向汝道撥草瞻風聖云一千五百人善知識話頭也不識引得狼來屋裡屙峰云老僧住持事繁火到頭來忙撥撒拈云事窮則變理極無私膽大如斗輸他三聖冒敵衝鋒心空若谷賴有雪峰讓人退己冰稜上走馬劍刃裡橫身幸爾毫髮無傷且喜精神倍躍這裡見得竹連煙霧和雲亂溪接松濤夾玉鳴如或未然切莫枉屈先德罷業忘功奉重難減伊聲價忒無端高山流水期相識洗耳挂瓢獨自間南山石北山田君乘馬兮我乘船煙波弱柳開新緑兩樣風流一樣看舉米胡令僧問仰山合同文券何須勘驗今時人還假悟否你若無心我也休山云悟即不無太平本是將軍定爭奈落第二頭何不許將軍見太平僧回舉似米胡胡深肯之將錯就錯拈云悟之一字衆妙之門悟之一字衆禍之門且道入此門底是出此門底是第一頭如何薦取悟到猶居第二頭兒時做出老知羞寶花不上輪王頂葉落金梧天下秋舉百丈有時上堂衆才集蟻從羶處聚云喫茶去便下座口乾舌渴有時上堂衆才集蠅向臭邊飛云珍重便下座儘力收拾有時上堂衆才集隨群逐隊云歇便下座今日勞倦衆罔措甚處去來拈云百丈弄盡伎倆都是些驢糞氣若有人出來掀倒禪床管教抽身無路利害在甚麼處悲歡離合太無端傀儡場頭興未闌曲罷酒殘人不薦空餘仙子下瑤壇舉龐居士問馬祖不與萬法為侶者是甚麼人太尊貴生祖云待汝一口吸盡西江水即向汝道太饒舌生拈云龐公向萬仞峰頭置一問千巖俱墮馬祖從大洋海裡措一辭萬派齊吞既識脫體無依更要和根打斷為甚如此白雪飄時山色老清霜落處樹枝寒幾度橫身冷似冰誰知有興尚堪乘而今坐在春風裡凍嶺梅花綻未曾舉趙州問投子大死底人卻活時如何酒逢知己飲子云不許夜行投明須到詩向會人吟拈云死之與活霄壤也夜之與明吳越也而不知天地一氣南北同區兩老異口同音懸空話出詞簡而盡理約而該只是謾我三山不得鼙鼓聲聲擂不休幾人歡笑幾人愁何時冷卻征衣汗一枕高歌到白頭舉黃檗示衆云淨眼裡撒沙汝等諸人為憐三歲子盡是噇酒糟漢不惜兩莖眉我當時若與麼行腳貧兒思舊債何處更有今日將謂有多少奇特還知大唐國裡無禪師麼具甚麼眼便恁麼道時有僧出云只如諸方匡徒領衆又作麼生打鼓弄琵琶檗云不道無禪是甚死貓頭秪是無師珍重黃檗老漢拈云黃檗眼空天下冷口熱腸雖是引正後昆不怕諸方檢點還免得自己分上麼身為浪子偏憐客慣愛貪杯識醉人緑柳紅桃次第開風流豪俠正徘徊誰知一片邙山土賺得英雄盡活埋舉法眼以手指簾牽藤引蔓時有二僧同去捲簾認影迷頭眼云一得一失惑亂不少拈云二僧總不伶俐若向未指以前薦得只合拂袖而行豈至落他圈繢法眼縱有殺人刀活人劍終是明眼難瞞賣卜何心買卜難畫眉樓上倚闌干多年不盡相思恨把筆重新帶淚看舉石鞏張弓架箭以待學者今日如何舉似人三平詣之赤身挨白刃鞏云看箭不是好手平乃披襟當之喪身失命鞏云三十年來張弓架箭只射得半個漢且莫壓良為賤拈云聲應氣求即不無正眼看來未免弄巧成拙間來沒事理瑤琴嘯月吟風一片心漫撥冰絃呈巧手高山流水貴知音舉僧問曹山佛未出世時如何佛山云曹山不如大卑生僧云出後如何非佛山云不如曹山太尊生拈云威音那畔恰好逍遙現世門中止堪遊戲坐著則仰望不及走殺則猶落後塵豈真貴賤分途但要後先合轍曹山道個如與不如也直是較長比短靜夜佳人睡錦幃起來含笑拂羅衣何如打破香銷夢免使檀郎説是非舉無為泰豎拂子云金屑雖貴落眼成翳會得喚作禪明明百草頭明明祖師意不會果然難一片白雲橫谷口許多歸鳥盡迷巢難難銀山鐵壁目前隔個須彌山面壁而立易易屙屎放尿信口道來無不是那塊不是精底別云不會喚作禪會了果然難須彌山開眼即是信口道全沒來由放下著一齊破要問諸人如何是一齊破夢裡關山行路難醒來依舊據征鞍為問長安多少客幾人踢倒玉闌干舉僧問玄沙如何是和尚親傳底事低聲些沙云我是謝家兒面赤不如語直拈云問到至情傾心吐膽固是還知面皮厚處麼家醜不可外揚問到親傳事不干分明話出太無端從教諱名不諱姓一派淵流下口難舉一僧過天龍圖個甚麼龍豎一指示之不因樵子徑僧大悟爭到葛洪家後示寂云吾得天龍一指頭禪過後思君子一生受用不盡三十年不少鹽醬拈云一指頭禪有甚交涉賺殺阿僧終身活埋而今豎指者多矣得此受用者幾人哉千載而下令人浩嘆暗裡傷人不用刀十分痛處是誰遭玄猿墮下和腸淚亙古流來恨未消舉僧問巖頭起滅不停時如何家鬼作祟頭咄云合取狗口是誰起滅識得不為冤拈云巖頭有定亂機謀且無太平贊畫這僧被這一咄不知腦後重了多少三尺神鋒未慣經離離草色滿荒庭勸君莫向沙場過直恐聞風帶血腥舉僧問趙州如何是趙州曾到此間麼州云東門南門西門北門莫言不道拈云本分為人還他趙州始得雖然蹉過者不少行腳多年歸去來幾番辛苦對城隈四面門開無鎖鑰誰能踏破古蒼苔舉僧問青原如何是佛法大意占南問北原云廬陵米作麼價指東劃西拈云青原一期方便且從雖然有利無利不離行市高抬時價作麼為駕輕舟泛五湖雲山海月不曾殊歸來一段風流況但把冰心對玉壺舉善道遭沙汰時退身有分常以拄杖示衆云不勞拈出過去諸佛也恁麼一二三未來諸佛也恁麼四五六現在諸佛也恁麼七八九拈云恁麼也得不恁麼也得汝等諸人切忌拄杖子換卻眼睛千尺長松耐歲寒亭亭老幹任君看等間識得其中意漫把枯桐對月彈舉南泉示衆云王老師要賣身窮思變阿誰要買不是冤家不聚頭一僧云某甲買也須照貨還錢泉云他不作貴價千金不換不作賤價一文不值汝作麼生買上下些僧無對鈍滯殺人趙州代云搶行奪市明年來饒賣不賒與和尚縫個布衫切忌粗針大線拈云南泉趙州失利了也好與一齊打殺免得鬻短炫長特特賣身賣不成何言水怪與山精當行幸遇承家子不借權衡識重輕舉僧問柏巖如何是道腳下底巖云徒勞車馬迹何不早道拈云尋蹤訪迹程途轉賒涉水登山白雲萬里直須離卻行市珍重腳頭庶幾少分相應不然青天白日走殺多少人腳底茫茫去復來長安路上幾徘徊何人識得風塵苦好把狂情當下灰舉僧辭歸宗云某甲往諸方學五味禪這山望著那山高宗云我這裡有一味禪為甚不學飯籮邊餓殺多少人僧云如何是一味禪鈍鳥逆風飛宗便打有甚奇特處拈云這僧貪多嚼不爛歸宗拈葉止兒啼別有知甘識苦底麼莫將間學解埋沒祖師心策杖何須度遠山芒鞋脫處任幽間滿瓶薄醋隨君喫滋味從來總一般舉僧問九峰如何是西來意忘卻了也峰云一寸龜毛重九斤不信道拈云權然後知輕重度然後知長短九峰恁麼道曾經權度也無美則美矣西來意未夢見在馬首斜陽影漸低無端幽鳥亂峰啼行人莫作尋常調多少聲聲韻不齊舉仰山指雪獅子云還有過得此色者麼認著即不可衆無對代云和尚莫眼花雲門云當時便與推倒秋去枝頭瘦雪竇云只解推倒不解扶起春來樹底花拈云三老各見一邊何曾道得越格一句更殘夜盡青鴉亂好把風流對曉粧寒蛩噪砌三更夢野鶴啼枝半夜天雞唱一聲人睡起愁看曉月落前川舉子昭首座問法眼長老開堂承嗣何人撩蜂剔蝎眼云地藏冤有頭昭云太辜負長慶先師黨理不黨親眼云某甲不會長慶一轉語是何言與昭云何不問自坑自陷眼云萬象之中獨露身意作麼生生澀鑰匙投舊鎖昭豎起拂子似即似眼云此是長慶處學得底是即未是首座分上又作麼生更與一捏昭無語早知今日悔莫當初眼云秪如萬象之中獨露身是撥萬象不撥萬象撲牛不用索昭云不撥頂門上去了三魂眼云兩個車不橫推參隨左右皆云撥萬象腳板底鑽了七魄眼云萬象之中獨露身聻理無曲斷拈云臨場話墮當面熱瞞惹起許多鬧亂如何得打斷去似訥始平分別路如愚方塞是非門聞説長安路不平揮鋤幾度氣如烹到來無數衷情亂愁聽鶬鶊深夜鳴舉明安問梁山如何是無相道場睜眼覷不著山指觀音云這個是吳處士畫底白日換人睛安擬議猶隔一重關山急索云這個是有相底那個是無相底放過即不可安於言下有省穿過髑髏禮拜了歸位也不消得山云何不道取一句還我話頭來安云道即不辭恐上紙墨點污了也山呵呵云此語上石去後果上碑莫是遭他授記來拈云一槌兩槌便當再三再四叮嚀機關在甚麼處枯龜妙入孫臏手一灼爻分十字文幾枝西向幾枝東濃淡由來致莫窮遲日園林藏不住無言桃李笑春風舉風穴示衆云昔日世尊以青蓮華目顧迦葉正恁麼時且道説個甚麼不勞重舉首山便下去失卻一隻眼拈云風穴雖是憐兒塗乳苦其實眉毛去了大半首山縱然伶俐猶覺不堪種草何故從門入者不是家珍抱得瑤琴月下彈曲終人醉玉樓寒朱絃撥動深深意幾個知音肯受謾舉良遂座主見麻谷今日且罷講谷閉門不接老婆心切遂次日再往不得封侯志不休谷復閉門再斯可矣遂乃叩門金龍失水谷問阿誰妙翅急提遂擬應名如是如是忽然有省不是不是乃云和尚莫謾良遂向你道甚麼良遂不來見和尚失腳了也幾被經論賺過一生又被麻谷賺過谷乃印可土上加泥拈云大小良遂便恁麼去也若是麻谷輕輕放過那能痛快平生狼毒心腸何太孤殺人見血事難扶偶拈一味相應草起死回生更別無舉僧問雲門不起一念還有過也無且信一半門云須彌山平地起孤堆拈云這僧將謂把火燒山一燎便盡雲門拈個沒量底攔路頓著令伊出入無門這裡稍作商量未免滿腔荊棘雲門突出須彌山聳崒嵯峨任躋攀筋斗倒翻君莫惜更乘紫氣度玄關舉雪峰拈拄杖示衆云這個秖為中下根人放下著時有僧出云忽遇上上人來時如何自有方便峰拈拄杖便去今日失利拈云雪峰一放一收反成多事若是遇著作家奪來拗作兩段又看如何轉身一枝開綻傍銀墻半惜芳英半送香分付東風收拾去免教遊子樂春忙舉僧問首山如何是佛抱鏡問卜山云新婦騎驢阿家牽一場笑具拈云喉中討氣絃上覓音到底無伊入處會得本地風光一任隨時瀟灑要見首山答處麼二八佳人美少年隨風蝴蝶勢翩翩夜來撲碎紅羅夢始笑從前顛倒顛舉鹽官一日喚侍者與我過犀牛扇子來用他作麼者云扇子破也真語者官云扇子既破還我犀牛兒來只恐觸忤和尚者無對切忌動著資福畫圓相於中書一牛字破也破也拈云鹽官追索過情侍者若解當面奉掌豈不團圞拈出更待資福補綴終是頭角不全此外有別呈伎倆麼還我犀牛兒來玩水觀山興欲驕斷橋風雨恨無聊誰知野色猶堪賞一聽丹青任意描舉雲門云乾坤之內宇宙之間大好著眼中有一寶祕在形山是甚麼拈燈籠向佛殿裡囌嚕囌嚕將三門來燈籠上㗭唎㗭唎拈云雲門若無後語幾乎話墮雖然未免拂迹成痕古岸船稀野渡空韶陽一葉慣乘風數聲歌起滄江上喚出雲雷吼玉龍舉慈明冬日榜僧堂作此字節候嚴寒何勞神用其下注云蛇腹添足若人識得不離四威儀中猶有這個在首座見云和尚今日放參覷破了也明聞而笑之一場懡㦬拈云理無蹴至功不浪施金繩裡外牢拴玉液當頭迸出一陽丁來復梅開雪嶺生香七日見天心水涸冰河解凍到這裡泥牛歡笑石女謳歌須是恁麼人始解恁麼事試看慈明作字雖然體勢未完要且意隨筆到首座一言道破謂復具眼不具眼三千劍客今何在獨許莊周見太平剝盡群陰返自然後天天復先天天風花雪月平生趣興罷歸來抱枕眠個中事對誰傳援毫淡淡點雲煙承家有子應須薦笑語相將學賣顛舉外道問世尊不問有言不問無言止止不須説世尊良久謝答話外道讚歎云世尊大慈大悲莫謗伊好開我迷雲不因柳毅傳鄉信令我得入何緣得到洞庭湖拈云外道被世尊一杓惡水脫盡皮膚單留三寸舌頭頌恩讚德雖然如是也是白日著鬼野老家常盡日間柴門雖設不曾關白雲幾度來相訪笑倚青山任往還舉溈山問仰山甚處來老老大大來處也不識仰云田中來如實通供山云田中多少人較甚多寡仰插鍬叉手而立暗裡抽橫作山云南山大有人刈茅費手腳生仰拈鍬子便行明中坐舌頭拈云功勳邊事坐則成偏向上關頭踏著便轉機前接引格外承當除是溈仰父有喚不回頭底立地死人如麻似粟貽謨燕翼事非常一度經來一度忙雨散雲收生晚翠遙瞻秋色映南岡舉五祖演舉一秀才著無鬼論只恐杜撰得來一日鬼現身云你道無我聻咦秀才無語啐拈云見怪不怪其怪自壞叵耐這秀才有心無膽若能當面便唾教伊逃竄無門十載藝窗意氣豪舌頭如劍筆如刀誰知話到傷心處鬼魅無端白晝號舉僧問黃連如何是聲前一句劄連云聲前無句又恁麼口喃喃聲後問將來不禮拜更待何時拈云入理深談委曲不少前後際斷聲句都捐又作麼生咄朔風凜凜不停吹正是東君熟睡時偶來驚破枝頭夢梅花開笑杏花遲舉臺山路上有一婆子冤家路窄凡有僧問臺山路向甚麼處去看腳下婆云驀直去喏喏僧才行蹉過了也婆云好個阿師又恁麼去也口是兩片皮僧舉似趙州好話通六耳州云待我與勘過老不歇心州亦如前問將謂別有婆亦如前答再來不值錢州回上堂云我為汝勘破婆子了也明眼難瞞拈云此段公案卜度者盡道婆子止得一橛之機不知如大冶精金終無變色畢竟趙州勘破在甚麼處良久云將謂無人搖唇鼓舌傍層巒多少行人被熱瞞潦倒趙州旁不肯一回勘破太無端臺山路去者難白雲覆處數峰寒茅蘆草徑依然在踏破莓苔露未乾舉藥山一日在石上坐動著即不可石頭見問云在這裡作甚麼隨分納些些山云一物不為今日勞倦頭云恁麼則間坐也水浸麻繩一股股緊山云間坐即為也火燒竹筒一節節熱頭云汝道不為不為個甚麼且聽分解山云千聖亦不識舉此話也大難拈云石頭針針刺骨藥山句句傾心不是本分衲僧未免臨機話墮傍石臨巖寄此身蒲團換得一生貧有人問到從中意衲被蒙頭不記春舉無著到五臺草鞋錢聻喫茶次湯水錢聻文殊拈起玻璃盞放下著問南方還有這個麼不道不道著云無文殊失利殊云尋常將甚麼喫茶無著失利著無語代云手中底聻誤入桃源一洞天枝頭紅綻鬥芳妍花開莫教隨流水蕩漾臨波那直錢舉僧問曹山世間甚麼物最貴這個山云死貓兒頭最貴好惡也不識僧云為甚死貓兒頭最貴不妨疑著山云無人著價道破不值錢拈云是即是且將甚麼喚作死貓頭莫道著價無人即天眼龍睛也覷他不著曾把奇珍處處尋一朝拈出血淋淋四七二三沽不盡從教鈍滯到而今舉僧問白雲藏如何是和尚深深處為伊不薦藏云矮子渡深溪出頭道一句來拈云白雲當時不措一辭猶較些子恁麼道來深深處總未見得古洞寒泉曉夜流千尋潭影沒荒丘行人莫向溪頭渡腳底茫茫有許愁舉馬大師不安有不病底在院主問和尚近日尊候如何師資分上大師云日面佛月面佛何不忌口拈云馬師一言之下針劄不入水泄不通且作麼生卜度本自無瘡勿傷之也日暮斜陽影翠微草花木樹自依稀間來懶話山中事但啓柴門嘯落暉舉僧問投子凡聖相去幾何咄子下禪床立一時頓斷拈云投子裝模作樣手腳不穩若待這僧問時痛與一頓免得向凡聖相去處躲根還識伊做處麼天隨明月淨水共白雲間柴床竹榻結相知懶下蒲團不記時客到無心間共語一番特地動深思舉僧問九峰如何是頭草枯鷹眼疾峰云開眼不覺曉切忌隨他去僧云如何是尾雪盡馬蹄輕峰云不坐萬年床迢迢與我疏僧云有頭無尾時如何漁翁就市忘家冷峰云終是不貴奴兒婢子徒勞力僧云有尾無頭時如何野老關門獨自眠峰云雖飽無力露柱燈籠話寂寥僧云直得頭尾俱稱時如何峰云兒孫得力借君拄杖登山水祖父不知衲被蒙頭萬事休拈云靈枝劫外覆卻今時現世門頭終歸實際老漁串錦扁舟一葉泛渺茫牧子橫牛鐵笛數聲吹巖畔若終始路絶先後途窮合作麼生夜深不向蘆灣宿迥出中間與兩頭雲從龍風從虎陰陽變動興雷雨指南一道智猶疏瑞草無根德亦腐過量人沒區宇午夜常懸帝網珠當軒慣打細腰鼓二山來禪師語録卷十頌古目録臨濟吹毛德山托鉢洞山非佛龍牙行拳雲門杓柄法眼曹源東印請祖仰山法身洛浦伏膺臨濟真人洞山尊貴趙州庭柏德山及盡趙州放下溈山牸牛幽棲敲鐘洞山孔竅雪峰覆盆投子彈指雲門糊餅疏山大黃三聖逢人長慶展手法眼毫釐趙州曾到南泉斬貓資福圓相德山寐語洞山麻斤仰山攜杖護國洗面首山此經大隨劫火趙州玄殺石霜奪笏長慶捲簾芭蕉法身歷村煎茶圓通囊寶趙州大道仰山驗僧長沙竿頭南泉牧牛投子歸庵魯祖面壁雪峰住庵洛浦大悟雲門鉢飯翠巖不點石頭恁麼目畢
