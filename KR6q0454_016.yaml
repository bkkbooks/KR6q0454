body:
  text: 書記普定編康熙八年冬月朔六日師受請住浙江嘉興府天寧禪院三門這個門頭舉足便是欲得腳根點地老僧到處都向這裡來佛殿有佛處不得住無佛處急走過古人恁麼道只成得個灑脫底漢子看這一堂師師弟弟終朝都盧著嘴也須代出口氣始得喝一喝護法殿你無我不得我無你不成檢點將來除非鐵打心肝庶幾略較些子祖師殿左也是你右也是你一個破沙盆從新又扶起咦方丈這所在任是佛來祖來無你劄腳處無你抽身處若是個中人不妨同出入橫按拄杖據座上堂拈請啟云嘉禾諸紳士一段護法之誠溢於楮墨諸人如未聞見且聽維那宣揚復拈云兩幅雲箋一張公案此又是本山耆德請啟也要大家知那讀畢師指法座云這寶華王座盡大地承他不起今日天寧院裡於一毫端憑空湧出且道有甚奇特事遂陞拈香云當今之世主聖臣賢民安物阜不須饒舌粉飾太平惟拈一瓣端祝吾皇萬壽次拈云這瓣香奉為當路宰官縉紳檀越用酬護法之恩次拈云這瓣香奉為本山耆碩遠近宗師用報助揚之德次拈云這瓣香拈也不得不拈也不得何以故只為來上座與勤巴子雖是生不同時要且鄉情猶在憶昔昭覺門庭得我徑山慧祖顯大光揚而今展轉相酬未為分外次拈云灣灣巴水落落岷山自西自東自南自北都是我慶忠先師法化盛行之所燈來今向檇李鴛湖略將些子氣息熏開諸人正眼道有報恩分也無靜聞禪師白槌云法筵龍象眾當觀第一義問人天景聚四眾雲臻大好一期賓主師便打進云清風白月即不問主中之主事如何師又打進云也直得主看主竊恐不是主中主師云老僧今日失利進云喝散大眾推倒禪床與老漢互換去也師云你得恁麼那僧禮拜問昔日東坡借座留帶鎮山今朝護法傾誠和尚有何法要師云當年此日此日當年進云恁麼則法席弘開山門有賴師云也不消道得問祖印高提即不問天寧片席法眼開山洞宗振統如何是法眼一句師云闍黎恁麼問老僧恁麼答進云洞上宗風更請別開手眼師云夜半正明天曉不露汝作麼生會進云三玄戈甲震乾坤師連打三棒進云大眾辨取始得便禮拜師云這拜恰好徐敬可居士問灩澦大如象瞿塘不可上如何得旁通一線去師云居士將欲禮峨眉進云灩澦大如馬瞿塘不可下如何得平高就下去師云老僧六月到此間進云恁麼則兩岸猿聲啼不住輕舟已過萬重山師云快便難逢進云且道武侯峽內兵書畢竟有何奇特師以拄杖撥云看進云看取令行時師打云靈利漢士禮拜師舉臨濟大師云大凡演唱宗乘須一句語具三玄門一玄門具三要有權有實有照有用老僧撐他戶口門頭卻又如何舉唱良久喝一喝云若向這裡薦得則知臨濟大師面目現在則知昭覺勤翁面目現在則知徑山慧祖面目現在則知慶忠先師面目現在既知從上諸老面目現在不用金針玉線便可穿卻諸佛諸祖鼻孔便可穿卻天下衲僧鼻孔便可穿卻現前四眾人等鼻孔便可將天上天下此土他方塵塵剎剎不可說不可說山河大地草木叢林飛潛蠕動情與無情諸般鼻孔一齊穿卻畢竟如何以拄杖指露柱云這是甚麼人便下座附嘉興諸縉紳請啟伏以妙喜宗風五百載雲深雙徑當陽竹篦十六傳氣壓諸方淬鼓山七星之寶劍迢迢普覺分燈挂趙州東壁之葫蘆滴滴西禪法乳赫爾朝陽啟耀遐哉秋月凝輝流法化於錦江巫峽之間樹崇標於劍閣銅梁之上咸聞萬籟交吹泥牛作舞共仰孤峰壁立鐵漢低眉西乾東魯真詮並契於如蘭北秀南能密識早懸於二桂恭惟三山大和尚西川華胄渝郡英靈趨法社以明心棄儒冠而入道小釋迦騰空降誕念法華乘願再來剎竿倒處遂披金縷之衣踏碓翻時獨佩羅文之印並駕五侯不羨二龍爭供全提四句何殊九會談玄兼之料揀森嚴莫測針錐妙密道絕階梯揭蠶叢而並峙法無常住乘鷁首以東來茲者天寧禪寺法席久虛名藍森蔚堪為飛錫之區鴛水汪洋雅稱泊船之地冀法雨之遙霑三根普潤聿慈雲之賁降四眾歸心溶等蓮侶無緣葵傾有素敬三薰而布悃詢百爾以僉同伏祈老和尚乘寶閣之弘開稍紆象駕憶靈山之授記大振獅音將令蠡湖勺水遙映青衣赤甲之奇從教檇李香林齊明翠竹黃花之旨允屬千秋之勝事毋虛萬里之良緣臨啟曷勝翹切之至法末曹溶張天植王庭吳鑄楊雍建俞之琰莊日思陳祚昌何其仁朱茂時錢江莊鏻徐世淯朱一是張三省李丹衷朱介許宗渾朱昇沈大詹曾王孫盛民譽卜陳彝陳之遵姚原溈項玉筍懷應聘沈廷勱顧鵬濮芬仝頓首拜答諸縉紳啟伏以檀樹森森玉露濃霑於檇李祗園濟濟金磚密布於嘉禾道場廠自名區十五國尤稱獨步法筵襄從大老二千年更較前籌波泓洙泗之淵源記受靈峰之付囑俗真並仰儒釋兼崇恭惟各位護法鴛湖龍鳳鹿苑金湯身現宰官葵忱共效酬天子願乘居士藿悃同傾對覺王人人懸肘後靈符個個具頂門正眼本來面孔不教障入浮雲直下腳跟頓令踏翻幻夢透無隱之旨黃太史此日重逢探捷近之原白侍郎今朝再遘諸方衲子競過李楊之門當代宗師仗啟馬黃之席山僧燈來裔承鷲嶺派續曹溪伐竹巴山一向提刀弄斧拋綸字水幾曾舞棹呈橈慚為普覺之遠孫萬里而來鐵石肝腸正熱愧作天涯之遊子十旬而去冰霜氣骨非寒況邀青盼於悉檀三世奇緣真不偶矣矧奉丹塗於上剎千秋盛業詎徒然哉顧鬱鬱林深雖曰鷦巢可借而轔轔車重敢云螳臂能撐伏冀鑒此微私姑聽拽回鷁尾納茲愚款且隨撥轉蘆頭池邊別自栽蓮莫因某苾草難扶遂忘卻護持弘誓泥裡從新布髮惟願公檀施不蘄越發起廣大慈衷播善因而為正因將佛事而作家事爭看蘇公解帶借座鎮乎天寧咸誇韓子留衣創亭高於佛閣俾宗風永扇歌功頌德自是人有口碑而雅望遙瞻佩志銘懷疇謂予無心版敬陳謝狀肅達辭悰臨啟無任感切之至附嘉興天寧諸耆德請啟恭惟三山老和尚傳佛心宗知儒法要一條竹篦子直由妙喜親承從上破砂盆端的西川扶起當大道衰微之日作吾人皈仰之師瞎驢邊滅卻猶存灰裏蛇痕棒頭上打翻飛出火中鷂子因緣會而杖履南來時節至而鼓鐘東應荒荒莊忌拜祖師於百草頭邊嶽嶽裴休敘賓主於官人手內蒲團禪板會看衲子雲奔露柱燈籠共與金剛作舞詩題黃鶴百千諸佛同奉指揮人在水晶東西兩頭並含光照孫承祖業勤巴子確有鄉情子就父歸楊翰林不為分外二千年之叢席此日維新三十世之宗猷一時丕振矣嚴等無任歡喜踴躍之至天寧衣末清嚴成易智湘達經如康清修慧穎智閑真白通涵圓慶真護道臻明義勝渡淨御淨璐智沂海昱昌裔真演道凝明紀如珪仝頓首答諸耆德啟恭惟眾位禪師名山碩德勝地耆英秀水河干將幻泡一齊擊破嘉禾畔上把空花幾度敲翻根同鷲嶺之靈苗並蒂聯枝既蔥蔥而蔚蔚種共陀林之寶樹分香列秀復楚楚而彬彬父子祖孫一時稱盛伯仲昆弟千載流芳舉動悉範乎準繩應求咸通於聲氣盟心撐大廈豈云一木難支協力綴輕裘自是千狐易湊門庭煥采遠邇觀光某居在岷山來由錦水而楚而吳而越八千里衝白浪於江心歷夏歷秋歷冬百四期分餘涼於殿角棲遲蓮社晨鐘暮鼓早夜懽聞寄寓精藍勝友高朋往來笑聚得竊芝蘭之臭曾經盻以青睛匪同邂遘之交何敢酬將白眼只為手頭干木擬向西川拽回故爾腳底芒鞋欲從南湖別去伏冀許以言旋毋為挽駕我餘客館異日公能卓錫定當倒屣以迎君有旅亭今朝某且擔瓢但願長揖相送經年促膝恐未能焉計日分襟籌之預矣辭衷莫罄別悃聊將臨楮可勝感謝茶話老僧性多懶僻自從輥入這水牯牛隊中十七年來拖泥帶水只想向秀水江頭一番洗濯誰知水中著水泥上添泥何時洗濯得淨秖如今夜且教如何說話以應其請乃以手指燭云只這個輝煌滿室晃耀一堂照見諸人各各頂𩕳朝天腳跟踏地眉橫鼻直形正影端更無些子覆藏得著若把這點靈光薦得分曉豈不佛法現成這些且置今日陞座事繁且待老僧向藤床布帳裡一覺齁鼾明朝起來另與諸公通個消息久坐謝茶為錢府誥封高太宜人對靈小參幻化場頭著些幻人𨁝跳幾能踢醒幻夢入如幻三昧耶錢府高太宜人幻而有生即今覓有生底了不可得幻而住世即今覓住世底了不可得幻而入滅即今覓入滅底了不可得既是皆不可得則知生亦幻住亦幻滅亦幻所以道知幻即離不作方便離幻即覺亦無漸次還委悉麼師復高聲喚云高宜人惺惺著能知如幻幻亦幻不勞彈指證菩提以拂子擊禪床一下為嚴𨍏轢居士對靈恁麼來恁麼去恁麼恁麼如是如是喝一喝云是之謂𨍏轢居士文水禪人請讚彌勒肩負布袋腳穿草履鼓腹袒胸張牙露齒逢人但乞一文錢鐵石肝腸臭如屎已而已而可止則止不知爾笑何人其實有人笑爾讚慶忠老和尚吾師慶忠沒箇神通橫身是口喚雨呼風拈白棒開人天之正眼用舌頭闢末世之邪宗有照有用天青月皎為縱為奪電掣雷轟隨覿體而相見實對面以難逢吾師大段良如此兒孫供養則不同何不同喝一喝芮居士請題壽松西母之桃兮九千年而一熟東海之竹兮變滄桑而一籌彼尚有曆數之可紀此則非歲月之能求清音籟發翠色光浮是以仰栽培於造化而植榦於林丘又友梅友竹如虯如龍珠垂帶露操響吟風歷春秋而不老計年歲於何窮松松人稱爾為十八公吾以比夫耆耇之山翁讚布袋和尚你見人笑人見你笑人笑你如癡如醉如狂你笑人有權有實有要且道要底甚麼乃伸手喚云乞我一文錢登千佛閣二絕千佛樓頭萬象空憑高一望興何窮眼中不覺低城市但看蒼煙化作龍其二翠閣亭亭秀水隈千尊座列寶花臺簷高放得斜陽入不待莊嚴笑欲開題畫菊叢菊誰將墨染成筆花綻處細煙輕莫嫌紙上無顏色不逐風狂帶露傾示明齊字鋤雲世路從來踏不齊鋤開雲霧沒高低一條驀直長安道看得分明是舊蹊題韻石比丘壽松圖大椿八百蟠桃三千何如此物永矣忘年盤根於地吸露於天蒼蒼秀色鬱鬱奇顏用以寫韻石無生之面而作有生看示齊東白銀河夜半斗星懸玉彈輕拋漾碧天清磬一聲人睡起齊看東白映眉端聞鐘二絕鐘聲靜夜入樓頭陣陣頻敲撞客愁欲唱無生曲一調不知那個是同儔其二長空新月掛銀弧幾點疏鐘晚氣孤客夜不堪愁睡穩經霜可是自鳴無為朱葵石先生題夢葵化石圖有序葵石先生應夢而生因夢而號繪圖紀事既已詳明何容復贅夫先生貴胄也先生貴人也先生之功在朝廷之澤在百姓之名在鄉國之德之福在厥躬而貽子孫先生之事也先生為之山野今歲自西川來六月寓禾之天寧未遽謁先生先生顧焉一接貌言有古君子風味厥後往來數四一日出斯卷示之且索鄙言山野愧不能作而亦不敢辭原夫葵之夢文恪公之夢也文恪公之夢也葵也非葵也先生也石之夢先生之夢也先生之夢也石也非石也先生也葵乎夢乎幻乎真乎先生乎石乎夢乎幻乎真乎先生乎吾無以知之以葵知之不第以葵知之則即以先生知之吾無以知之以石知之不第以石知之則即以先生知之知之云何葵也先生也其心之潔而赤也有如此也知之云何石也先生也其性之介而貞也有如此也請為之讚曰何為葵兮何為石石之白兮葵之赤赤心一片喜朝陽白石磷磷若干尺是夢非夢夢何來葵花先自夢中開此心不變身可變依稀又作補天才一石江頭為砫礎堅貞之節向誰語風濤浪裡出頭來惟有葵心直自許君不見彌勒門至今存一回夢到見慈尊無生面目依然在大地山河一口吞機緣有僧來參禮拜起問不動干戈如何得勝師云今日冷如昨日僧云不是這箇道理師云畢竟如何僧無語師便打組綬沈居士同師茶次問如何是未生前面目師舉起圓果如何是已生後面目師舉起圓果如何是生與未生時面目師舉起圓果士發笑師云且莫詐明頭曹秋嶽沈赤肩同師坐次話及布袋和尚機緣師向嶽索云乞我一文錢嶽云這一文急忙拈不出在赤肩云請向弟子乞看師云你做窮官底人向你乞箇甚麼師問徐敬可居士秖如道不動干戈又作麼生士云上糧事繁師云甚處得這消息來士云將謂和尚錯過師顧秋嶽云今日徐居士為我證盟嶽呵呵大笑師云傍觀者哂題陳如愚行樂圖手執梅花謂非如愚意致清孤謂是如愚手胡為乎磐石一箇梅花一株翹足而坐倚樹而扶偉哉面貌美矣髭鬚一見而知為陳君行樂之圖題可權禪人小像蒼蒼樹古綠綠苔鮮花間石上綽爾少年手握如意案列簡篇可與學可與立可與權佛乘禪人請讚觀音渾身衣文細書觀音經一卷瞻禮玅相玅相難形編經作服滿服皆經非紅非白非紫非青莊嚴極其精緻畫工通乎神靈虛空為座軸為屏令人懽喜讚嘆而宛涉乎滄溟偶詠二首古木森森枝亂斜夕陽落盡噪栖鴉風霜夜宿知何處想是叢林別有家其二雲澹天低晚樹清寒鴉幾箇對人鳴愁衷無奈連宵坐又聽蛩聲度五更夜坐二首好把青燈向晚挑更深無火豎寒毛呼童添得爐中炭儘著冬霜盡夜鏖其二傳燈讀罷又吟詩正是更敲四鼓時一覺和衣鼾睡穩床頭明月為誰移慶忠先師遺命分舍利於高峰囑予建塔己酉歲暮予寓天寧懷感四偈高峰別去已經年及到南湖又一天剛整絲綸纔下釣慈恩依舊暗中牽事死曾聞如事生當初悔不奉師行雲山未斷腸先斷隔斷雲山夢亦驚豈為離師學賣乖千觔檐子屬吾儕吾師面目今猶在肯把吾師受活埋慈命而今不可辜何妨到處建浮屠風濤萬里巴江上一介能將有也無與朱葵石居士吾宗無別旨但從直捷根源處一眼覷破自是頭頭上顯物物上明如僧問趙州如何是祖師西來意州云庭前柏樹子便是這箇道理也老居士昨云別處妥當一件只是一件這裡會得一處妥處處妥豈不是從直捷根源處著眼又云看得本來面目分明原無貴無賤無貧無富無喜無怒無死無生只此數語可謂見到說到矣但要時時保任念念操存直做到大休大歇底田地得大自在得大受用施為運轉出沒卷舒任性而流無可不可連這保任操存四字一並忘卻更有甚麼參差錯謬關礙生死大事而不一了百當者哉竹篦子也是這個柏樹子也是這個世尊拈花拈底也是這個天龍豎指豎底也是這個老僧連日所說說底也是這個居士近日所見見底也是這個畢竟如何是這個聻題讚書鐵門限冊首書字之法著不得半點意思須是筆與手忘手與心忘心與書忘如行雲如流水如神龍出洞如渴驥奔泉電卷星馳不知不覺純是一團精神運轉流動直到筆意俱不到處庶幾略較些子鐵門限古來名筆摹寫者多規矩儼然風味自別臨池者若於出格入格之外別作商量纔得不為筆墨所苦雖然如是智永禪師面目現在珍重諸人大好著眼讚達磨咄哉這漢著甚來由熊耳山下長坐不休指人心見性成佛賺神光斷臂而求肝腸太熱面貌可羞仔細看來也是西天東土一大魔頭題連城耆宿小影曠野之間蒲團之上磐石可趺老梅可傍手握春箑有收無放澹澹儀容疏疏意況可謂純任乎天真而悠然自暢題俞右吉居士行樂圖不衫不履獨坐匡床有書不展有扇不颺寬胸大肚自在清涼似閒似逸似疏狂面貌堂堂令人望鬚眉而想見其肝腸題金天木居士金剛忍字跋金剛以無相為宗旨讀金剛者則應以破相為了義以言相不獨四相相也宗旨亦相也了義亦相也全卷金剛皆相也但著一字亦皆相也破云乎哉無云乎哉破與無又安得而非相也哉山野到此直得無起口處天木金居士受持此經於經文中單拈一忍字則即於自心中獨證一忍字就經文中暢演一忍字則即欲人心中共證一忍字是忍也良亦自度度人之寶筏也山野曰天木居士可謂受持而有得矣儻從忍字而進求之不又有得焉者乎儻從忍字進求而並忘之不更有得焉者乎迄乎得無所得而宗旨了義其庶幾矣然亦不可謂非自度度人之婆心也即謂之無相也亦可也山野是以懽喜讚嘆而樂為之跋楊艾田居士題刻藏經疏曰客問刻大藏經與焚青龍鈔是同是別余曰焚不過刻不盡請質之俍亭禪師俍亭禪師曰艾田問余余曰刻即儘刻燒即儘燒請更質之明眼靜聞師復請師題師曰恁麼也得不恁麼也得恁麼不恁麼總得明眼底辨取
