body:
  text: 書記普定編頌古著拈舉僧問臨濟如何是吹毛劍利濟云禍事禍事險僧禮拜謝和尚慈悲濟便打血濺梵天拈云這僧不顧危亡甘自當鋒觸鍔臨濟慣弄神鋒殺人手段伊即不無活人機關未敢相許吹毛利劍射斗光鋩觸著磕著事出非常禮拜也好承當輕輕放過有何妨直謂能撾塗毒鼓幾曾爇得返魂香舉雪峰在德山作飯頭侍官千日一日飯遲失在一朝德山托缽至法堂餓斯炒峰云這老漢鐘未響鼓未鳴節候也不識托缽向甚麼處去上堂齋去山便歸方丈明知好酒故意放輸峰舉似巖頭路見不平頭云大小德山未會末後句在旁人剷削山聞春雷貫耳令侍者喚巖頭問云汝不肯老僧那好作商量頭密啟其意一字入公門山乃休去九牛拔不出至明日陞堂將謂將謂果與尋常不同元來元來頭撫掌笑云一家有事百家憂且喜老漢會得末後句證父攘羊他後天下人不奈伊何有多少奇特拈云用無義手打不防家雪峰可稱孝子以屋裡人說家常話巖頭真是逆兒德山平地鍬坑兩度將人賺過具眼底試揀辨看末後句妙難量春風一度百花香歸丈兮非南非北陞堂也何短何長薜蘿巖畔篩新月影落銀花半夜霜舉洞山垂語云撒出贓私體得佛向上人年尊不敢動著方有說話分說得也不親切僧云如何是佛向上人本來無一物山云非佛垢膩汗衫皂角洗法眼云方便呼為佛將高就低未為分外拈云貴賤異位出入同途轉位迴機眉橫眼上隨途得妙耳掛腰間物外清閑寰中遊戲大似分疆列界一隊無孔鐵鎚還見洞山法眼麼掉唇弄舌有甚交涉處眠雲臥月幾春秋懶入風塵作浪遊夢破不因泉石動乘流依舊泛輕舟舉僧問龍牙十二時中如何用力拈匙把筯喫飯穿衣牙云如無手人行拳見麼石門聰云龍牙只道得一半那一半聻乃云如無舌人解唱歌聞麼天童慧云石門也只道得一半這一半聻直須通身如舌手始得會麼拈云龍牙半斤石門八兩天童亦未全在直須舌手如通身始得幾番岐路泣亡羊堪嘆時人話短長放下歸來無個事烹茶掃地爇罏香舉雲門問直歲今日作甚來隨分歲云刈茅來且對說門云刈得幾個祖師和尚善忘歲云三百個錯算不為謾門云朝打三千暮打八百天地玄黃東家杓柄長西家杓柄短宇宙洪荒作麼生唵啞吽歲無語慚惶殺人門拈拄杖便打氣急殺人徑山杲云直歲無語有三百個祖師證盟又得徑山老漢雲門令雖行有甚著處要且棒頭無眼知人之哲自古為難拈云徑山手抬手捺不惟冤屈直歲亦且冤屈三百個祖師雲門令既行自是棒頭有眼棒頭無眼翳雙睛三百祖師空證盟莫教再從山下過恐聞猿叫斷腸聲舉僧問法眼如何是曹源一滴水小官多念律眼云是曹源一滴水老將不談兵拈云法眼恁麼答話可謂簡而文溫而理其實傾出曹源又是惠而不費還有直下承當底麼一目長空不夜天疏星幾點映前川霜寒懶拾溪頭釣不脫簑衣抱月眠舉東印土國王請二十七祖般若多羅齋大好供養王問云何不看經湯水錢算多少祖云貧道入息不居陰界明歷歷底一場懡㦬出息不涉眾緣孤迥迥底一場懡㦬常轉如是經百千億萬卷恁麼那拈云如是經如是轉正眼看來總不若一無心道人何故直饒道得分明未免遭人檢點掃卻金沙任運行不將些子障青睛自從識破啼兒夢萬壑聲消秋水平舉僧問仰山湧如何是法身寶本來無一物湧云百舌未休枝上語鳳凰爭肯共同棲放下便平穩拈云坐著墮在法身蹉過迷卻家寶如何得相應去良久云我到這裡卻不會清淨本然事莫分何須著意太殷勤一朝弄得丹霞斧帶霧連雲一掃焚舉洛浦參夾山不禮拜當面而立行腳勞倦山云雞棲鳳巢非吾同類出去一手推一手拽浦云自遠趨風乞師一接如狸拜鷹山云目前無闍黎相逢不相識此間無老僧相識不相逢浦便喝只這個更別有山云住住且莫草草匆匆雲月是同溪山各異從頭一二三截斷天下人舌頭即不無洛浦陣勢爭教無舌人解語夾山家風浦無語一場敗闕山便打他日骨疼怨伊不得浦從此伏膺拳打心下事拈云洛浦不遇夾山幾乎一生蹉過還知夾山鉗鎚處麼絕後再甦欺君不得龍門千尺為誰開吸浪長鯨任去來燒尾莫教徒點額雷轟電掣正徘徊舉臨濟示眾云有一無位真人鬼面神頭嘗向汝等面門出入東湧西沒初心未證據者看看高著眼時有僧問如何是無位真人本來非皂白濟下禪床擒住何處辨青黃僧擬議原教看看濟托開云險處推人無位真人是甚麼乾屎橛識破不值錢拈云有殺有活有縱有奪臨濟可謂痛快為人不料返成鈍滯如何得不辜負去未證據者看看王孫芳草目萋萋細綠成茵襯馬蹄一望平原誰是主隨風楊柳絮沾泥舉洞山到北巖圖個甚麼巖云甚處來問取腳跟好山云湖南來今日舉似和尚巖云觀察使姓甚麼忘卻了也山云不得姓無人喚著巖云名甚麼寧可截舌山云不得名共住不相知巖云還理事也無無為而治山云自有廊幕在股肱良哉巖云還出入否莫動著山云不出入元首明哉巖云豈不出入頻煩則亂山拂袖出去別日再商量巖來日侵早入堂召洞山云老婆心切昨日問上座話不稱老僧意一夜不安未了公案今請上座別下一轉語更聽分解若愜老僧意不可別道便開粥相伴過夏秪恐勞煩主人山云卻請和尚問有本者如是巖云不出入事如何丁一卓二山云太尊貴生分在則禮然巖乃開粥同過夏得盤桓處且盤桓拈云峰前怪石綠苔不侵劫外靈枝春風難到龍樓鳳閣夜深燈落銀缸甘雨鹽梅日用羹調玉鼎輔相惟資佐弼垂拱不動尊嚴畢竟如何是尊貴一句聲色泯時群囂戢紫微深處眾星攢君自君兮臣自臣九重深密孰相親叮嚀問到其中事漫把從前仔細陳舉僧問趙州如何是祖師西來意分明記得州云庭前柏樹子只這是僧云和尚莫將境示人喚作境得麼州云我不將境示人且信一半僧云如何是祖師西來意疑則別參州云庭前柏樹子適纔道底拈云明明百草頭明明祖師意雖然如是切忌幾個柏子換卻眼珠偶來無事啟柴扉處處山花點翠微但得從中開兩眼莫教喪卻目前機舉德山示眾云及盡去也還有這個在直得三世諸佛口掛壁上略較些子猶有一人幾乎忘卻呵呵大笑是何意旨若識此人瞎參學事畢未敢相許拈云好好復徵云且道那一個好分辨得出與德山把手並行如或未然不得放過寒潭寂煙水秋行人落寞野老風流徹骨寒梅香噴鼻笑殺東風卒未休舉嚴陽尊者問趙州一物不將來時如何莫道無事好州云放下著痛處加錐嚴云一物不將來既如彼放下個甚麼又如此州云放不下擔取去是伊討得底拈云前箭猶輕後箭深茅舍蓬門守志孤半生辛苦纖塵無輕衫莫教煙霞染脫體風流靄畫圖舉劉鐵磨到溈山不是閑相識山云老牸牛來也探竿在手磨云來日臺山大會齋和尚還去麼影草隨身山放身臥靴裡弄指頭磨便出去怪伊不得拈云兩牛鬥額勝負未分道是溈山絆倒鐵磨腳跟其實鐵磨穿著溈山鼻孔竟作麼生開散收放卷舒意已諧好將心緒對同儕更闌夜靜無閑思各自抽身各賣乖舉幽棲一日敲鐘上堂有條攀條大眾纔集今日普請棲云甚麼人打鐘設網捕魚僧云維那是非只為多開口棲云近前來張弓待兔僧近前煩惱皆因強出頭棲便打冤及平人卻歸方丈又恁麼去也拈云呼牛喚馬恕鱉傷龜殺活並行機關莫測這僧禍出非常且教阿誰代解雲岡野徑日初斜風急春殘看落花陌上行人悲路晚遠村猶自隔煙霞舉僧問洞山如何是衲僧孔竅我有一機山云十八女兒不繫裙瞬目視伊拈云恁麼道不怕瞎卻天下人眼煆盡頑軀萬象空玲瓏透體絕形容堂堂大露從君看不語含情一笑中舉雪峰在洞山做典座淘米次賢者多勞山問淘沙去米淘米去沙有一無二峰云沙米一齊去忒是拋撒常住山云大眾喫個甚麼秖管下口峰覆卻盆來日不得普請山云得即得須見別人明眼難瞞後果見德山靈山授記不似今日拈云及盡今時孤危險墮欲得轉身吐氣還須分火照鄰雪峰得處既見德山然則洞山處又如何打當荒丘跡絕苔空綠踏破芒鞋別有天凜凜寒霜木葉疏顰眉野老暗嗟噓金梭織轉三春絮芳草萋萋不用鋤舉僧問投子三身中那身說法木上座口喃喃子乃彈指如是我聞拈云投子彈指道是那身說法諦聽諦聽劈破虛空口若眉一聲彈指玅難思無絃音韻隨敲唱幾個知音許共期舉僧問雲門如何是超佛越祖之談若將耳聽終難會門云糊餅眼底聞聲始得知拈云深談實相帶齒沾牙玅解玄微和油合麵雲門恁麼道且教如何領略聻分明香在梅花上尋到梅花香又無鼓角樵樓午夜催金雞啼斷禁城開綸音播處王言重待露銜香遍九垓舉疏山冬至夜有僧問如何是冬來意一陽初動處山云京中出大黃大小往來都如此道拈云真語者實語者若向這裡下得口嚼得碎管教臭惡肝腸一齊瀉盡還有肯服此藥者麼冬日陽回一線長夜深相對月當央有人問到山中事野菜藜羹滿頰香舉三聖云我逢人即出久仰尊慈出則不為人官不容針興化云我逢人即不出甚麼心行出則便為人私通車馬拈云偏處不逢玄中有路兩老漢狼毒不少且道為人在甚麼處逢場作戲幾時休換面改頭任自由離合悲歡今古事一番唱出一番愁舉僧問長慶如何得不疑去參慶展兩手直為分明極拈云山青水綠李白桃紅恁麼薦得千足萬足其或未然且向長慶肘下翻個筋斗個事明明說向君打開八字太區分等閑識得娘生面萬語千言總不聞舉法眼問修山主毫釐有差天地懸隔汝作麼生會金將火試修云毫釐有差天地懸隔蟭蟟雖脫殼未免抱寒枝眼云恁麼會又爭得曹溪波浪如相似無限平人被陸沉修云某甲只恁麼和尚又如何欲窮千里目更上一層樓眼云毫釐有差天地懸隔不因重舉修便禮拜幾乎蹉過拈云去縛解粘敲枷打鎖從尋常識量外起死回生須是法眼始得還有別通一路者麼毫釐無差天地懸隔同途異路別山溪谷口雲深下腳迷歷盡崎嶇風月冷鄰雞一任五更啼舉趙州見僧來便問曾到此間麼花徑不曾緣客掃僧云不曾到踏破了也州云喫茶去月照平湖闊又問僧曾到此間麼蓬門今始為君開僧云曾到趙州路滑州云喫茶去雲垂華嶽低拈云接待往來隨家豐儉雖係趙老本色其實醍醐毒藥一齊並舉若要些子沾唇未免喪身失命土壁茅簷亂砌階客來不用巧安排相逢但教喫茶去無限情思且放懷舉南泉一日東西兩堂爭貓事從根起泉提起貓云道得即不斬放下著眾無對斬即任斬道即不道泉斬貓為兩段殃及無辜後舉似趙州失之東隅收之西隅州脫草鞋頂出一場漏逗泉云子在恰救得此貓何人證盟拈云東西兩堂難兄難弟南泉趙州是父是子雖是一期方便未免鬧亂家庭各與三十拄杖何故不合因小失大沙場漠漠戰初停雨暗雲愁草木腥不有英雄三尺劍烽煙能得幾時寧舉僧問資福如何是古人歌不妨洗耳福畫相舌頭不出口徵云誰是知音者淡淡晴山晚谷低野橋煙樹語黃鸝玲瓏囀出無生調問到人間幾個齊舉臨濟侍德山次師資分上山云今日困猶自說兵機濟云這老漢寐語作麼分明聽得山便打恃公凌人濟掀倒禪床倒戈返刺拈云無事討事以禮答禮直在其中矣若論父慈子孝兩老猶歉一著在庭闈無事漫商量語話投機齒頰香情義疏時恩義重一時千載永流芳舉僧問洞山如何是佛鼻孔下頭垂山云麻三斤貨賣當時拈云識取鉤頭意莫認定盤星還有知重識輕底麼麻麻擬問長安路轉賒芒鞋踏碎洛陽花雲山歷歷無遮障古徑蒼苔映日斜舉仰山攜一杖子登山涉水少伊不得有僧問甚處得你且疑著山拈向背後收拾不暇僧無對代云和尚莫謾人西天小釋迦攜杖不著便問來向後拈不識頭和面拍盲禪見不見拄地撐天如閃電舉僧問護國心法雙忘時如何枯木倚寒嚴國云不洗面漆桶僧云月落寒潭時如何夜半絕行人國云不洗面漆桶僧云光境俱忘時如何明月蘆花看不見國云不洗面漆桶拈云護國答處直為這僧病中膏肓且作死馬醫還會漆桶話麼易分雪裡粉難辨墨中煤心不存兮法不留梧桐葉落海天秋三關一鏃憑君透古鏡研磨莫放休舉僧問首山一切諸佛俱從此經出且道此經又從何出如何是此經山云低聲低聲只怕齒不關風僧云如何受持你秖管看山云不染汙何勞立功課拈云圓陀陀無稜縫光皎皎沒纖塵能現金臂紫摩莫作白紙黑字畢竟如何受持聻樹底不妨飛黃葉溪邊何礙漱清流本自無生無不生渾淪橐籥卒難明任從十號周塵剎莫把纖雲點太清舉僧問大隨劫火洞然大千俱壞未審這個壞不壞試定當看隨云壞真語者僧云恁麼則隨他去也汝還信麼隨云隨他去不異語者僧問龍濟劫火洞然大千俱壞未審這個壞不壞不妨疑著濟云不壞實語者僧云因甚不壞再問即錯濟云為同大千不誑語者拈云一個順水推船一個逆風把舵莫道分門別戶其實異口同音還知壞不壞底道理麼徑開葉落秋常滿山靜雲深水口流這個壞雲山海月依然在這不壞虛空爛卻無邊界隨他去也水綠山青同大千兮地擎天蓋穿頂破帽兩頭空從教顛倒一齊戴舉僧問趙州如何是玄中玄木馬上高竿州云汝玄來多少時也看病用方真是國手僧云玄之久矣三十年來腳踏地州云若不遇老僧幾乎玄殺放下來時猶較些子拈云這僧撞頭磕額知進不知退趙州狼牙虎爪解推不解扶若能就下平高且與因邪打正妒雨春深落夜長繁花唯逐亂風狂曉來滑蝶東墻過何事尋香苦太忙舉裴相國一日訪石霜掛冠一朝也是快事霜因取笏問云和尚莫閑賤在官人手中為笏你知我知在老僧手中喚作甚麼無二無別裴無對一時忘卻乃為留下永鎮山門君子不奪人之所好拈云石霜傷廉裴公傷惠二俱失利裴公且置那裡是石霜失利處不妨再舉狹路相逢事異哉面皮熟處口難開雖然不語情無限到底輸他一笏來舉長慶一日堂前捲簾兩手十個指忽然大悟白日見鬼作頌呈雪峰云開眼說夢也大差也大差知過必改捲起簾來見天下眼花作麼有人問我甚何宗屁也不值拈起拂子驀口打且莫造次峰可之誰人不愛子孫賢拈云酒不醉君子長慶當時何不一笑而休因甚呈贓聽斷我也知你忍禁不得平生辛苦太無端喫盡窮酸徹骨寒不是捲簾開正眼幾乎辜負七蒲團舉僧問芭蕉如何是透法身句高著眼蕉云一不得問陰山背後二不得休十字街前僧云學人不會不會最親切蕉云第三度來與你相見十萬八千程拈云不犯尊嚴是非莫到曲垂方便消息旁通芭蕉已是說如來禪何故阿僧到底懵懂步步登高易心心放下難嵐光煙霧接雲樓一徑中分草色幽何處流鶯啼不住春殘猶自話枝頭舉歷村煎茶次今日渴僧問如何是祖師西來意便請攢柴把火村舉起茶匙拋沙撒土僧云莫這個便當麼但恁麼會村擲向火中當得當不得拈云歷村因地起倒竭力為人若向舉起擲下處一眼覷破庶不辜負婆心不然空納一場敗闕忘機無事臥煙霞折腳鐺中漫煮茶祖意明明收放處幾乎認作兩頭蛇舉僧問圓通秀知師久蘊囊中寶死貓頭鐵獦狚今日筵前略借看秪憑眼裡無珠秀云君子愛財取之有道人人有分拈云這僧貪觀分外圓通愛惜家珍不是趙璧燕金非同玄珠碧玉直饒和盤托出且道作麼著眼無相無名獨自珍非形非色那堪陳囊中縱有千般物此物如何舉似人舉僧問趙州如何是道攔街逐塊州云城外底月圓當戶僧云不問這個道蹉過也不知州云問甚麼道不妨再說僧云大道訪跡尋蹤州云大道透長安日出連山拈云曲不如直表不如遮詎知直中藏曲表裡有遮反疑節外生枝以至當前蹉過欲會長安大道麼復高聲云看腳下數十年來江上遊乘船幾度去尋舟踏翻滄海金波濬更泛星槎帶月浮舉溈山問仰山忽有人問一切眾生但有業識茫茫貪觀眼前浪無本可據失卻手中橈子作麼生驗試金石不勞拈出仰云若有人來也在眾生數裡即召云某甲頻呼小玉原無事僧回首啐乃云是甚麼只要檀郎認得聲待伊擬議鷂子過新羅向道非唯業識茫茫亦乃無本可據勘破了也溈云善哉日放此話大行拈云仰山腰懸明鏡胡漢難逃若是遇著衲僧驀面一掌亦且業識茫茫無本可據遊人一去水茫茫流蕩湖山蝶夢長雞唱五更眉未展回頭不見舊家鄉舉僧問長沙百尺竿頭險如何進步秖管放腳沙云朗州山高處低處澧州水深底淺底僧云不會教你秖管放腳沙云四海五湖王化裡重說偈言拈云竿頭坐著漁父棲巢縱步橫行十方瀟灑正恁麼時那裡是衲僧巴鼻普天星月臨河漢大地風光映斗牛踏遍風霜滿路寒腳頭腳底受誰謾可憐三十年前眼近把河山一並看舉南泉云王老師自小養一頭水牯牛今日如何舉似人擬向溪東牧不免食他國王水草左不得擬向溪西牧不免食他國王水草右不得如今不免隨分納些些將錯就錯總不見得無可不可拈云南泉太生顛倒若論牧向東西也非分外即云隨分納些些亦是國王水草畢竟如何始得但恁麼會取自小養來水牯牛幾番辛苦幾番愁而今鼻孔無穿索天地為欄夜不收舉投子因雪峰侍立次切莫當閑指菴前一片石云也不消得三世諸佛總在裡許張三李四聻峰云須知有不在裡許者還是甚麼人子乃歸菴中坐退假免參拈云若逢同道須拈出不遇知音且覆藏投子即置且道雪峰還知音麼須是恁麼人始解恁麼事參差薄霧鎖煙岑路接高低一徑深出沒山翁何處去徒教辜負水雲心舉魯祖見僧來便面壁別峰相見南泉聞云我平常向他道好作商量空劫以前承當無伊擔荷處佛未出世時會取無伊下手處尚不得一個半個下坡不走快便難逢他恁麼驢年去著甚死急拈云做得刻的道得分明兩個老漢不知甚麼心行頻來扼斷上頭關慣學偷閑秖自閑兀坐蒲團君莫笑恐留聲色落人間舉雪峰住菴時有二僧來參有隙地覓一塊峰見以手托菴門放身出云是甚麼攔路鍬坑僧亦云是甚麼就機打劫峰低頭歸菴三步雖活五步須死拈云看破了也且道這三處在那一處看破獨坐茅廬擁翠微客來特地啟柴扉相逢話出深深意回首無情對落暉舉洛浦在夾山做典座禮下於人必有所求三年喫百頓棒不是一番寒徹骨後來大悟爭得梅花噴鼻香云斬新日月水向石邊流處冷特地乾坤風從花裡過香來拈云洛浦恁麼正好再喫一頓莫有放過底麼珊瑚枕上兩行淚半是思君半恨君竭力忘勞念更親凄凄風雨度三春不因槌破虛空鼓那得聲聲震遠鄰舉僧問雲門如何是塵塵三昧瞎漢問甚麼門云缽裡飯桶裡水只這是更別有拈云睜眼覷著舉手摸著何曾被蓋囊藏雲門方便點與阿僧莫教向飯籮邊餓死於海水裡渴殺這裡薦得略較些子其或未然未免當面蹉過歷盡風塵兩鬢斑凝眸看得幾何般青山綠水年年在一任遊人自往還舉僧問翠巖還丹一粒鼠子藥點鐵成金不是好手至理一言莫寐語轉凡成聖有甚交涉學人上來請師一點喪身失命巖云不點口不關風僧云為甚不點猶待第二椎巖云恐汝落凡聖說破不靈徵云翠巖恁麼道還是點是不點定當得出有話當面說鬥白競黃幾度空成陰綠葉自玲瓏幽情愁對秋楓老染著清霜滿樹紅舉藥山問石頭承聞南方有直指人心見性成佛之旨入耳無根深不可拔是麼錯會不少頭云恁麼也不得切莫住不恁麼也不得急走過恁麼不恁麼總不得只在此山中別云恁麼也得不恁麼也得恁麼不恁麼總得因甚石頭儘力道不出逢人且說三分話未可全拋一片心嚼碎通紅鐵一團和盆托出任君看相逢說個何年事慶喜門前倒插竿四川向化侯養元譚公諱詣捐俸刊
