body:
  text: 書記普定編機緣師同耳菴和尚遊觀音寺至殿門菴云沒得觀音師云這不是菴云總不見得師與一掌菴作躲勢師云觀音觀音范惟一問除卻煩惱即是清淨時如何師云除曰一切俱除除個甚麼師震威一喝一佇思師便打衆隨師遊水月菴師以拄杖畫云不得踏著不得越過不得四面之繞作麼生過一僧徑過師云打失一隻腳裴文學問未生我時誰是我師云張三李四曰既生我後我是誰師云李四張三士沉吟師驀面兩掌一僧入室師云汝道問汝那一句僧擬開口師叱出腳才跨門師召云來向汝道僧擬轉身師復叱出師入堂見一貓走過師問衆當日南泉斬貓道是真否後堂云他原不作假師復問首座設若趙州遇南泉舉似時答個我在青州造領布衫重七斤此貓還救得不座云設若僧問趙州一歸何處時趙州脫草鞋頂出和尚以為何如師云不是這個道理元旦遊山監院作禮云新年出隊萬象生輝伏請和尚垂慈得共山靈歡笑師云正月一無個事緩步行來何拘繫烹茶傍嶺折疏藜襲坐臨崖趺小石拍掌唱個太平春也賢賢親親樂樂利利院云即今眼底一句又作麼生師云山頭惟見長松緑道上仍看舊草黃師久不說法維那白云明日望旦請和尚上堂師云我即今為汝升座侍者云諦觀法王法法王法如是師云各司其事好一僧自江南來參師云汝甚時到此僧云昨日夜分師云不許夜行你因甚知而故犯僧便喝師云落在甚處僧召侍者云上座師云參堂去師入堂衆作禮師云作禮且置山僧有一字書向汝等認看維那度香板與師師於地書一佛字那以腳抹去師向那問訊那亦於地書一佛字師以腳抹去那向師問訊師云維那今日觸忤堂頭大衆一齊舉罰那云和尚不得奪某甲執事師云山僧罪過那作禮師呵呵大笑總戎袁寶善居士從派慶忠老人隨師參叩力究多載一朝點胸更名性煒師與別號香蓮有頌古刊行於世新寧縣尹沈赤肩居士參師師痛加錐劄士低首良久師云曾見夾山參船子機緣麼士云見師云試舉看士舉至夾山辭行頻頻回顧處師驀豎掌云將謂別有耶士當下釋然後見貓捕雞雞飛入草中師取磚一片置地云是甚麼士作雞鳴聲師云這話猶未圓在士將磚一腳踢去師乃印可元旦遊山維那舉盒云裡許是雲門公案更有曹洞宗旨請師揀辨以便下口師驀拈一片云臨濟兒孫不許說他家語話那云也須嘗過師喚侍者與大衆普傳師以三句語驗衆衆下語不恰師自代云如何是迸開頂門句瞎如何是扭轉鼻孔句常如何是脫體逍遙句苦書狀別云不不不師云錯說為當僧問如何是末後句師云呦呦鹿鳴食野之蘋僧云恁麼得到牢關也無師云汝作麼生會旁僧云也要記著師云也要記著師一日令侍者將墨硯一塊清水一鍾置法堂上三日後師入堂問日前公案還有圓得底麼衆下語不恰師以硯覆鍾口作女人拜歸方丈師山行次指水田問一沙彌云有水無水曰有水指旱田問一沙彌云有水無水曰無水復指片地問云這個聻沙彌相視而笑師云本色沙彌衆僧唱韻次師豎掌云這字作麼生唱一僧撫桌師云歸那個母曰請和尚指示師云待汝切得字時即向汝道一僧過九峰師云九峰山前有一關道得即去僧便行師召云禪和僧回首師云猶未過關在朴素道人見師師問魯祖因甚見僧來便面壁素便喝師云一口氣不來又作麼生素云藕斷絲不斷師云參師出方丈偶召一僧僧擬議師喝退復召一僧僧近前師呵呵大笑囑玉維那機語師云耳菴師兄受衣鉢於巴掌先師開堂四剎不輕授受一朝示疾囑令門人等參隨山僧並以衣鉢轉托交代菴逝後亮維那華侍者定學人聖化主同參山僧於五雲不數年定住高梁華亦脫去聖以原執事充入高峰及山僧受請盤山亮復隨焉十載未離行履見地勘驗有素應以轉托山僧之衣鉢代耳菴付囑於亮夫耳菴兄山僧之手足也亮維那耳菴之弟子也山僧於菴則兄視之於亮則侄視之法門分誼凜然千古今以耳菴之弟子仍接耳菴之衣鉢匪獨不忘耳兄也亦且不負掌師也亮維那其永續菴嗣而昌厥後聽吾偈養成頭角自耳菴牙爪深藏又十年珍重熊山獅子子長流法乳續燈傳李居士問天地未有何物為先師豎起拂子士云只這個更別有師放下拂子士禮拜師云且莫詐明頭勘辨一僧來參師云如何是腳跟下事僧頓足師打云十萬八千程又一僧至師云近前來僧近前師便打僧便喝師又打僧云某甲親見和尚師復打僧禮拜師云喫茶去師問佛幻文殊見個甚麼便白槌幻云本是無孔笛何用楚歌吹師休去至晚又問汝早間祇對話意作麼生幻云和尚問他作麼師又休去一僧過師前師召云還記得話頭麼僧撫掌師云作麼作麼僧云還和尚話頭師便打師舉百萬劍戟逐猛虎至壁立崖不損皮毛如何脫身問僧作麼會僧云正要問這話師云昨日晴今日雨師問一僧汝還疑麼僧云焉能不疑師云明日十六那僧云十六師云有甚疑處師驗衆這一句作麼生道衆競下語師展兩手二僧來參師問一僧云是甚麼僧豎一指師云不是僧云是甚麼師豎一指一僧云這僧不是難道和尚又是師云是不是師問僧拋兒婆子因甚道這個也不消得僧低首師驀面一掌僧云也不消得師云不與麼卻與麼一僧下禪床師擒住云話頭聻僧茫然旁僧敲引磬師云落在甚處僧遲疑師云寒山睡重拾得起遲師問一僧如何是十五日以前事僧云老鼠鑽牛角如何是十五日以後事僧云三腳驢子弄蹄行正當十五日如何僧便喝師云何不道取一句僧云木魚三尺口師云恁麼那師問僧麻三斤意旨如何僧云說破不值錢師云如何是佛僧云石香罏師云脫體道一句看僧云這殿二百年師云三日後問汝師問僧如何是親切句僧云月半是十五如何是轉身句僧頓足如何是異類句僧云兩貓一犬如何是末後句僧顧視左右師連打四棒師問僧父母在堂如何奉養僧便喝師云得恁麼忤逆那僧作禮云今日罪過師不顧一僧喫飯次師見云汝一頓喫多少僧云三碗四碗師云還將得口來麼僧問訊師召侍者云教廚下再著些米一僧參師師云我已知汝來處僧展兩手師便打僧云和尚放行太速師云原來原來師問僧前夜消息聻僧豎一指師云放下著僧放下師云又在甚麼處僧拍左肘師云一邊漢師一日垂語云密密處沒商量悄悄地無回互鼻孔有氣者相見二僧齊入師云那一個先道一僧喝師云再喝一喝看僧又喝師云野干鳴又問一僧汝又作麼生僧亦喝師云他喝汝亦喝僧云也要和尚委悉師云一隊野狐一僧入師放下竹篦云道僧云既放下道個甚麼師云我放下汝試道看僧云滿口道不出師云放汝三十棒師問侍者如何是你日用事者云堂前一罏香師云不顧和尚了者云尊重些好師云是師問僧不用音聲與色聲將何喚作本來人僧云適才見兩人出山師云莫亂統僧云也不得辜負某甲師打云也不得辜負山僧師驗水維那云古鏡未磨時如何那云古鏡師云磨後如何那云非古鏡師云著一僧行腳歸師云這漢又來也僧便喝師云咦僧作禮師便打一僧歸禮師師云這幾年來見個甚麼僧云某甲今日行路勞倦祗對不得師云饒你勞倦也要道取一句僧禮拜師打云幾乎放過衆隨師納涼次夜月正明一僧云好月師云畢竟月在甚麼處有畫圓相者有振身立者有問訊作禮者有答話先後不一者師云總未見月在一僧問云畢竟月在甚麼處師云畢竟月在天上衆作禮師云當面熱瞞師問僧長三丈闊八尺都來有甚交涉巴鼻處道將一句來僧云不道不道師云因甚不道僧以手掩香罏師打云又道不道師問僧三日不答話無人道汝是啞漢速道速道僧便喝師便打僧云蒼天蒼天師打云蒼天蒼天一僧進方丈才展具師便喝僧云特來請益和尚師驀面一掌僧云痛快痛快師復打僧擬進語師以手引僧耳推出方丈師驗衆云開口即錯不妨據實答來舉步即非但要依序行到正恁麼時如何打當一僧禮拜了退師云將錯就錯一僧近前師云問過了也僧禮拜師云將錯就錯又一僧出師云合作麼生僧禮拜師云將錯就錯師問世沙彌這一指如何會世呵呵大笑師云明日再來師召蓮沙彌云進前些來便於打你蓮退後三步師復召云退後些去莫等打你蓮進前三步師云汝因甚腳跟不穩蓮云和尚問頭太悻師顧旁僧云你看這沙彌恁麼道師問一行者云汝近日作個甚麼僧云農務師云甚麼喚作農務僧作掘地勢師云汝不合欺誑山僧師問一沙彌云適才少段機緣汝何不湊上彌作訝聲師云蹉過了也彌云幾乎蹉過師云爭奈山僧不會何師問僧默然良久汝作麼生會僧云某甲只作默然良久會師云恁麼又爭得僧噓一聲師云這個阿師因甚沒得鼻孔問答僧問如何是清淨法身師云泥豬癩狗僧問路逢達道人不將語默對未審將甚麼對師云今日見兩人舁野豬一僧問念佛底是誰師云念佛底是誰又僧問念佛底是誰師云念佛底不是誰二僧禮拜師云一得一失僧問如何是不睹不聞句師良久僧云無言無說又作麼生師云重下注腳僧問人人盡道見性成佛成佛即不問這見字還著得麼師作嘔吐聲僧問古人道不疑言句是學人大病未識可疑底是甚麼句師云哩哩僧問如何是三世諸佛師云馬牛羊僧問擬心不得時如何師云放下著僧問六道衆生還具佛性也無師云嗄僧問如何是為人一句師便打僧云恁麼則辜負某甲也師云山僧今日失利僧問某甲沒奈何時如何師云怪事怪事僧問如何是事事無礙師云上單下單喫茶喫水僧問如何是超生死不相干句師云山菌子僧問儘力道不得底句卻請和尚答師云汝獨苦我以難僧問如何是知有事師云日出東方僧問如何是寶藏庫師云空空僧問尊者策眉意旨如何師云太長生僧問如何是未開口時消息師云道道僧云開口後如何師云不道不道僧問如何是生前面目師云描不成畫不就僧問古人斬貓意旨如何師云苦哉佛馱耶僧問抱璞求鑒時如何師云汝是甚麼人僧擬議師云頑石頭僧問古人道不是心不是佛不是物是個甚麼師云七東八西僧問悄悄地因甚又無回互師云低聲些僧問喫茶去意作麼生師云人情分上僧云趙州因甚慣用此機師云沒奈人情何僧問慶忠道達磨是異鄉人是否師云是僧云以何為驗師云碧眼絡腮鬍僧問覿面不逢時如何師云汝從甚處去來僧云未離當處師云又道覿面不逢僧問如何是聚雲三關師云險僧問如何是佛師云木雕泥塑僧云莫這個便是麼師云放汝三十棒僧問如何是西來意師云滿眼滿耳僧問達磨面壁意旨如何師云分明記得想不起來僧云和尚莫瞞人好師云汝莫瞞人好僧問如何是獨透聲色句師云一二三四五僧問學人有個見處請師鑒師云不鑒僧云因甚不鑒師云怕底是汝有個見處僧問漆桶穿時如何師云烏龜三隻腳師同衆坐次偶噓一聲一僧云和尚有不平底事麼師云是僧云如何是不平底事師趨向前云汝打殺我僧作怕勢師云又爭怪得山僧僧問如何是六不收師云叱僧問心法雙忘時如何師云油鹽醬醋僧問美食不中飽人喫止如終日不喫此人還飽麼師云他原不饑僧云不饑底人在甚麼處師云十萬八千程僧問如何是二六時中事師云穿衣喫飯僧問大事既明因甚如喪考妣師云這問也大難僧問不掛唇皮一句作麼生道師云好大哥僧問徑山大悟一十八遍小悟不知其數未審悟個甚麼師云驢糞子僧問搬柴運水喫飯穿衣是甚麼人行履師云尋常人行履僧云此人還成佛否師云土上加泥僧問惟此一事實是那一事師云與我過扇子來僧問打破鏡時作麼相見師云背抵背僧作禮云請和尚向異類中行師下禪床跳一步僧問如何是轉身句師喚侍者者應喏師云是你招惹底僧問心佛與衆生是三無差別因甚有凡有聖師云喫桃喫李僧問三眼烏龜因甚跳不出圈子去師云誰在圈子裡僧云而今跳出了也師云還我三眼烏龜來僧禮拜師云帶水拖泥漢僧問古人擊竹觀花有甚交涉便云明心悟道師云若要圖個交涉未免辜負古人僧云某甲罪過師撫掌僧問深深句即不問請和尚道句淺淺底師云我卻要道句深深底僧云請和尚道句深深底師云我卻要道句淺淺底僧云道道師云不道不道僧問四十九年未曾道著一字三藏十二部從甚處來師云向道莫行山下路果聞猿叫斷腸聲僧問頂門具眼時如何師云瞎僧問年窮歲盡時如何師云家有家主僧問長三丈闊八尺僧金吒波羅蜜此是甚麼語話師云赤洪崖打白洪崖僧問古人因甚見僧入門便棒師云不打不成相識僧問雨堂首座一齊下喝那個是賓那個是主師云夜來老鼠嘵啾啾拖犁拽耙過床頭僧問李四唼著舌頭因甚血在張三口裡師云鼕鼕僧問如何是一味相應草師云觸著也是死僧問三世諸佛同一鼻孔這鼻孔還尋香逐臭也未師云昨日有僧從胡南來也不曾道著僧問擎叉輥毬是同是別師云菩薩蠻僧問根塵俱泯時如何師云寶塔子僧問如何是楊岐驢子師云頭大尾巴細僧問隻履西歸意旨如何師云來得好不如去得好僧問菩提道心作麼相契師云問得恰僧問如何是那伽大定師云山悠悠水悠悠僧問訶佛罵祖是甚麼人師云闡提漢僧問如何是歷代相承事師云說破不值錢僧問那邊事作麼生師云黑僧問如何是密意師承師云紫羅帳裡撒珍珠僧問最上乘事還許話會也無師云許僧繞禪床一匝師云玉帛云乎哉僧云諾諾師云鐘鼓云乎哉僧問從上古錐以何相傳師云破草鞋僧問如何是多字學師畫是相僧問如何是遊戲三昧師拍掌高歌僧問績麻滿筐是何意旨師云問取胡張三僧問如何是五雲境師云門前緑竹嶺後青松僧問智不到處時如何師云寐語作麼僧問生死以何為舟航師云沒底籃僧問如何是學人用心處師云饑者甘食如何是學人著力處師云急水灘頭緊纜船如何是學人放身處師云千丈崖前翻筋斗僧問離卻言語請師道師云胡錠鉸是幾時人僧問兩眼看兩眼是甚麼人師云作家作家僧問萬象之中獨露身意作麼生師云只這是僧問如何是雲門扇子師云清風滿握僧云𨁝跳了也和尚大須仔細師云我與他有甚冤讎僧叉手向前云鑒師作女人拜僧轉身立師云汝且將去著僧問歷代祖師是何面目師云鼻直眉橫僧問這場大夢誰先覺且道覺後如何師起舞僧問如何是大圓鏡師云一切在裡許僧云恁麼則說道理也師云山尖僧問三際俱斷時如何師云十字街前輥繡毬僧問天龍豎指意旨如何師云剖腹剜心僧問如何是禪師云不向道僧問如何是日用安身處師云這邊那邊僧云離卻二邊請師道師云莫靠山僧好僧問樹倒藤枯句歸何處師云不禮拜更待何時僧問止止不須說是說不是說師云世尊世尊僧問如何是現成公案師云不借借僧問觸著磕著時如何師云一場痛快僧問如何是末後句師云山僧今日困僧云學人不會師云好風僧問如何是主中主師震威一喝僧禮拜師便打僧問如何是殺人刀師驀頭一棒如何是活人劍師云汝須會得好如何是塗毒鼓師云聞者皆喪如何是探竿影草師云神出鬼沒僧問如何是了生脫死底一句師云赤腳踏崑崙
